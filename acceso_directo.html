<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 ACCESO DIRECTO - Votación</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-4xl font-bold mb-8">🚀 ACCESO DIRECTO</h1>
        <div class="space-y-4">
            <button onclick="goToVoting('luciano')" class="block w-full bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded font-bold text-xl">
                👤 Entrar como LUCIANO
            </button>
            <button onclick="goToVoting('machito')" class="block w-full bg-green-600 hover:bg-green-700 px-8 py-4 rounded font-bold text-xl">
                👤 Entrar como MACHITO
            </button>
            <button onclick="goToVoting('manu')" class="block w-full bg-purple-600 hover:bg-purple-700 px-8 py-4 rounded font-bold text-xl">
                👤 Entrar como MANU
            </button>
        </div>
    </div>

    <script>
        // Obtener eventId y eventName desde URL
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId');
        const eventName = urlParams.get('eventName') || 'Evento';
        
        function goToVoting(juror) {
            let url = `votacion_jurados_FINAL.html?juror=${juror}`;
            if (eventId) {
                url += `&eventId=${eventId}&eventName=${encodeURIComponent(eventName)}`;
            }
            window.location.href = url;
        }
    </script>
</body>
</html>
