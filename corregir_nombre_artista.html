<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corregir Nombre Artista - ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-2">🔧 Corregir Nombre de Artista</h1>
        <p class="text-center text-gray-400 mb-8">Actualiza el nombre en todos los documentos de Firebase</p>

        <div class="bg-gray-800 rounded-xl p-6 mb-6">
            <div class="grid gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-1">Event ID</label>
                    <input id="eventId" type="text" value="WvnaxCEqzahWvndRe1S9"
                        class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 font-mono text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-1">Nombre ACTUAL (incorrecto)</label>
                    <input id="oldName" type="text" value="Brizel"
                        class="w-full p-3 rounded-lg bg-gray-700 text-white border border-red-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-1">Nombre CORRECTO</label>
                    <input id="newName" type="text" value="BRISAY"
                        class="w-full p-3 rounded-lg bg-gray-700 text-white border border-green-500">
                </div>
            </div>
        </div>

        <button id="btnCorregir" 
            class="w-full py-4 text-xl font-bold bg-yellow-500 hover:bg-yellow-400 text-black rounded-xl mb-6 transition">
            ⚡ CORREGIR NOMBRE EN FIREBASE
        </button>

        <div id="log" class="bg-black rounded-xl p-4 font-mono text-sm min-h-32 whitespace-pre-wrap text-green-400">
Esperando acción...
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase_config.js';
        import { signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { 
            collection, getDocs, doc, updateDoc, query, where 
        } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const log = document.getElementById('log');

        function logMsg(msg) {
            log.textContent += '\n' + msg;
            log.scrollTop = log.scrollHeight;
        }

        document.getElementById('btnCorregir').addEventListener('click', async () => {
            const eventId = document.getElementById('eventId').value.trim();
            const oldName = document.getElementById('oldName').value.trim();
            const newName = document.getElementById('newName').value.trim();

            if (!eventId || !oldName || !newName) {
                alert('Completa todos los campos');
                return;
            }

            log.textContent = '🔐 Autenticando en Firebase...';

            try {
                await signInAnonymously(auth);
                logMsg('✅ Autenticado');
            } catch (e) {
                logMsg('⚠️ Auth falló: ' + e.message + ' (continuando igual)');
            }

            let totalActualizados = 0;
            const colecciones = ['artists', 'jury_evaluations', 'jury_votes', 'votes', 'participants'];

            for (const col of colecciones) {
                try {
                    logMsg(`\n🔍 Buscando en events/${eventId}/${col}...`);
                    const snap = await getDocs(collection(db, `events/${eventId}/${col}`));
                    let encontrados = 0;

                    for (const docSnap of snap.docs) {
                        const data = docSnap.data();
                        const nombreCampos = ['name', 'artistName'];
                        
                        for (const campo of nombreCampos) {
                            const valorActual = data[campo];
                            if (valorActual && valorActual.toLowerCase() === oldName.toLowerCase()) {
                                await updateDoc(doc(db, `events/${eventId}/${col}`, docSnap.id), {
                                    [campo]: newName
                                });
                                logMsg(`   ✅ Actualizado doc ${docSnap.id} → ${campo}: "${valorActual}" → "${newName}"`);
                                encontrados++;
                                totalActualizados++;
                            }
                        }
                    }

                    if (encontrados === 0) {
                        logMsg(`   — Sin coincidencias`);
                    }
                } catch (e) {
                    logMsg(`   ❌ Error en ${col}: ${e.message}`);
                }
            }

            logMsg(`\n🎉 LISTO: ${totalActualizados} documentos actualizados en total`);
            logMsg(`"${oldName}" → "${newName}"`);

            if (totalActualizados > 0) {
                document.getElementById('btnCorregir').textContent = '✅ CORRECCIÓN APLICADA';
                document.getElementById('btnCorregir').className = 'w-full py-4 text-xl font-bold bg-green-600 text-white rounded-xl mb-6';
            }
        });
    </script>
</body>
</html>
