# Deploy forzado - 18 Feb 2026
[build]
  publish = "."
  command = "cd netlify/functions && npm install"
  functions = "netlify/functions"

[build.environment]
  # Omitir las variables de entorno configuradas del scanner de secretos
  # Son variables que deliberadamente configuramos para las funciones
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_PRIVATE_KEY,FIREBASE_CLIENT_EMAIL,FIREBASE_PROJECT_ID,MERCADOPAGO_ACCESS_TOKEN"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[redirects]]
  from = "/QR-VYTMUSIC/*"
  to = "/:splat"
  status = 301
  force = true
