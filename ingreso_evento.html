<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚪 Ingreso al Evento - VYTMUSIC</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #fff;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            background: rgba(15,23,42,.97);
            border-bottom: 3px solid #f59e0b;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .back-btn {
            background: rgba(59,130,246,.2); color: #60a5fa;
            padding: 10px 16px; border: 2px solid #3b82f6; border-radius: 10px;
            font-size: 1rem; font-weight: 800; text-decoration: none;
            white-space: nowrap;
        }
        .header-info { flex: 1; }
        .header-title {
            font-size: 1.25rem; font-weight: 900; color: #f59e0b;
        }
        .header-sub {
            font-size: 0.78rem; color: #64748b; margin-top: 2px;
        }

        /* ── Contenido central ── */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            gap: 24px;
        }

        .section-label {
            font-size: 0.8rem; font-weight: 700; color: #475569;
            text-transform: uppercase; letter-spacing: .1em;
            text-align: center;
        }

        /* ── Botones grandes ── */
        .option-btn {
            display: flex;
            align-items: center;
            gap: 22px;
            width: 100%;
            max-width: 420px;
            padding: 28px 28px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            transition: transform .15s, box-shadow .15s;
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:active { transform: scale(.96); }

        .option-qr {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            box-shadow: 0 8px 32px rgba(14,165,233,.35);
        }
        .option-manual {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 8px 32px rgba(34,197,94,.35);
        }
        .option-lote {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 8px 32px rgba(245,158,11,.35);
        }

        .option-icon {
            font-size: 3rem;
            line-height: 1;
            flex-shrink: 0;
        }
        .option-text { }
        .option-name {
            font-size: 1.4rem;
            font-weight: 900;
            line-height: 1.1;
        }
        .option-desc {
            font-size: 0.85rem;
            opacity: .8;
            margin-top: 4px;
            line-height: 1.4;
        }

        /* ── Divisor ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 420px;
        }
        .divider-line { flex: 1; height: 1px; background: #1e293b; }
        .divider-txt  { color: #334155; font-size: 0.8rem; font-weight: 700; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <a id="back-link" href="#" class="back-btn">← Volver</a>
        <div class="header-info">
            <div class="header-title">🚪 Ingreso al Evento</div>
            <div class="header-sub" id="event-name-sub">Cargando…</div>
        </div>
    </div>

    <!-- Opciones -->
    <div class="content">
        <div class="section-label">¿Cómo vas a registrar el ingreso?</div>

        <!-- Escáner QR -->
        <a id="btn-qr" href="#" class="option-btn option-qr">
            <div class="option-icon">📷</div>
            <div class="option-text">
                <div class="option-name">Escáner QR</div>
                <div class="option-desc">Lectora de cámara — apuntá el código QR de la entrada</div>
            </div>
        </a>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-txt">ó</div>
            <div class="divider-line"></div>
        </div>

        <!-- Ingreso Manual -->
        <a id="btn-manual" href="#" class="option-btn option-manual">
            <div class="option-icon">📝</div>
            <div class="option-text">
                <div class="option-name">Ingreso Manual</div>
                <div class="option-desc">Buscá por nombre, número de entrada o artista</div>
            </div>
        </a>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-txt">ó</div>
            <div class="divider-line"></div>
        </div>

        <!-- Ingreso por Lote -->
        <a id="btn-lote" href="#" class="option-btn option-lote">
            <div class="option-icon">⚡</div>
            <div class="option-text">
                <div class="option-name">Ingreso por Lote</div>
                <div class="option-desc">Generá y registrá múltiples entradas de una vez</div>
            </div>
        </a>
    </div>

    <script>
        const params  = new URLSearchParams(window.location.search);
        const eventId   = params.get('eventId');
        const eventName = params.get('eventName') || 'Evento';
        const qs        = window.location.search;

        if (!eventId) {
            alert('❌ No se especificó el evento');
            window.location.href = 'eventos.html';
        }

        document.getElementById('event-name-sub').textContent = decodeURIComponent(eventName);
        document.getElementById('back-link').href  = `panel_evento_SIMPLE.html${qs}`;
        document.getElementById('btn-qr').href     = `lector_qr.html${qs}`;
        document.getElementById('btn-manual').href = `ingreso_manual.html${qs}`;
        document.getElementById('btn-lote').href   = `generador_lote_puerta_express.html${qs}`;
    </script>
</body>
</html>
