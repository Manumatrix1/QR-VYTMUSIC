<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Pistas - VYT MUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK v11.6.1 -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, collection, doc, getDoc, setDoc, getDocs, query, Timestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js';
        
        import { app, db, storage } from './firebase_config.js';
        
        window.db = db;
        window.storage = storage;
        window.firestoreModules = { collection, doc, getDoc, setDoc, getDocs, query, Timestamp };
        window.storageModules = { ref, uploadBytes, getDownloadURL, deleteObject };
    </script>
    
    <!-- Wavesurfer.js para editor de audio -->
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    
    <style>
        .slot-container {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #3b82f6;
            transition: all 0.3s;
        }
        .slot-container:hover {
            border-color: #60a5fa;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        .slot-disabled {
            opacity: 0.6;
            pointer-events: none;
        }
        .waveform-container {
            background: #0f172a;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
        }
        .track-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            transition: all 0.3s;
        }
        .track-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-gray-900 min-h-screen">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 text-white py-4 shadow-lg">
        <div class="container mx-auto px-4 flex items-center justify-between">
            <button onclick="goBackToPanel()" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg font-semibold transition flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Volver al Panel
            </button>
            <h1 class="text-3xl font-bold">🎵 Subida de Pistas - VYT MUSIC</h1>
            <div class="w-32"></div> <!-- Spacer para centrar el título -->
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="flex items-center justify-center min-h-screen">
        <div class="text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mx-auto mb-4"></div>
            <p class="text-white text-xl">Cargando información...</p>
        </div>
    </div>

    <!-- Contenido Principal -->
    <div id="mainContent" class="hidden container mx-auto px-4 py-8">
        
        <!-- Perfil del Artista -->
        <div class="bg-gradient-to-r from-gray-800 to-gray-900 rounded-xl shadow-2xl p-6 mb-8 border-2 border-blue-500">
            <div class="flex items-center gap-6">
                <img id="artistPhoto" src="" alt="Artista" class="w-24 h-24 rounded-full border-4 border-blue-500 object-cover">
                <div class="flex-1">
                    <h2 id="artistName" class="text-3xl font-bold text-white mb-2"></h2>
                    <p id="eventName" class="text-gray-300 text-lg"></p>
                    <p id="deadlineInfo" class="text-yellow-400 mt-2 font-semibold"></p>
                </div>
            </div>
        </div>

        <!-- Mensajes -->
        <div id="messageContainer" class="mb-6"></div>

        <!-- Slots de Pistas -->
        <div class="grid md:grid-cols-2 gap-6 mb-8">
            
            <!-- SLOT 1: Principal (Obligatoria) -->
            <div class="slot-container rounded-xl shadow-2xl p-6" id="slot1Container">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-2xl font-bold text-white flex items-center gap-2">
                        <i class="fas fa-star text-yellow-400"></i> Pista Principal
                    </h3>
                    <span class="bg-red-600 text-white px-3 py-1 rounded-full text-sm font-semibold">OBLIGATORIA</span>
                </div>

                <div id="slot1Status" class="mb-4"></div>

                <form id="form1" class="space-y-4">
                    <div>
                        <label class="block text-white font-semibold mb-2">
                            <i class="fas fa-music"></i> Nombre de la Canción
                        </label>
                        <input type="text" id="nombre1" required
                            class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white border-2 border-gray-600 focus:border-blue-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-white font-semibold mb-2">
                            <i class="fas fa-guitar"></i> Estilo Musical
                        </label>
                        <input type="text" id="estilo1" required
                            class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white border-2 border-gray-600 focus:border-blue-500 focus:outline-none"
                            placeholder="Ej: Balada, Rock, Pop, Ópera...">
                    </div>

                    <div>
                        <label class="block text-white font-semibold mb-2">
                            <i class="fas fa-file-audio"></i> Archivo de Audio (MP3/WAV)
                        </label>
                        <input type="file" id="archivo1" accept=".mp3,.wav" required
                            class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white border-2 border-gray-600 focus:border-blue-500 focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                        <p class="text-gray-400 text-sm mt-1">Sin límite de tamaño. Formatos: MP3, WAV</p>
                    </div>

                    <!-- Editor de audio -->
                    <div id="editor1Container" class="hidden">
                        <div class="waveform-container">
                            <h4 class="text-white font-semibold mb-2">🎛️ Editor de Audio</h4>
                            <div id="waveform1"></div>
                            <div class="flex gap-4 mt-4">
                                <button type="button" id="play1" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
                                    <i class="fas fa-play"></i> Reproducir
                                </button>
                                <button type="button" id="stop1" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">
                                    <i class="fas fa-stop"></i> Detener
                                </button>
                            </div>
                            <div class="mt-4">
                                <label class="block text-white font-semibold mb-2">
                                    <i class="fas fa-volume-up"></i> Ajustar Volumen
                                </label>
                                <input type="range" id="volume1" min="0" max="200" value="100" 
                                    class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                                <p class="text-gray-400 text-sm mt-1">Volumen: <span id="volumeValue1">100</span>%</p>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="submit1"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-all transform hover:scale-105">
                        <i class="fas fa-upload"></i> Subir Pista Principal
                    </button>
                </form>
            </div>

            <!-- SLOT 2: Secundaria (Opcional) -->
            <div class="slot-container rounded-xl shadow-2xl p-6" id="slot2Container">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-2xl font-bold text-white flex items-center gap-2">
                        <i class="fas fa-music"></i> Pista Secundaria
                    </h3>
                    <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-sm font-semibold">OPCIONAL</span>
                </div>

                <div id="slot2Status" class="mb-4"></div>

                <form id="form2" class="space-y-4">
                    <div>
                        <label class="block text-white font-semibold mb-2">
                            <i class="fas fa-music"></i> Nombre de la Canción
                        </label>
                        <input type="text" id="nombre2"
                            class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white border-2 border-gray-600 focus:border-blue-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-white font-semibold mb-2">
                            <i class="fas fa-guitar"></i> Estilo Musical
                        </label>
                        <input type="text" id="estilo2"
                            class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white border-2 border-gray-600 focus:border-blue-500 focus:outline-none"
                            placeholder="Ej: Balada, Rock, Pop, Ópera...">
                    </div>

                    <div>
                        <label class="block text-white font-semibold mb-2">
                            <i class="fas fa-file-audio"></i> Archivo de Audio (MP3/WAV)
                        </label>
                        <input type="file" id="archivo2" accept=".mp3,.wav"
                            class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white border-2 border-gray-600 focus:border-blue-500 focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                        <p class="text-gray-400 text-sm mt-1">Sin límite de tamaño. Formatos: MP3, WAV</p>
                    </div>

                    <!-- Editor de audio -->
                    <div id="editor2Container" class="hidden">
                        <div class="waveform-container">
                            <h4 class="text-white font-semibold mb-2">🎛️ Editor de Audio</h4>
                            <div id="waveform2"></div>
                            <div class="flex gap-4 mt-4">
                                <button type="button" id="play2" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
                                    <i class="fas fa-play"></i> Reproducir
                                </button>
                                <button type="button" id="stop2" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">
                                    <i class="fas fa-stop"></i> Detener
                                </button>
                            </div>
                            <div class="mt-4">
                                <label class="block text-white font-semibold mb-2">
                                    <i class="fas fa-volume-up"></i> Ajustar Volumen
                                </label>
                                <input type="range" id="volume2" min="0" max="200" value="100" 
                                    class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                                <p class="text-gray-400 text-sm mt-1">Volumen: <span id="volumeValue2">100</span>%</p>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="submit2"
                        class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-3 px-6 rounded-lg transition-all transform hover:scale-105">
                        <i class="fas fa-upload"></i> Subir Pista Secundaria
                    </button>
                </form>
            </div>
        </div>

        <!-- Lista de Todas las Pistas del Evento -->
        <div class="bg-gradient-to-r from-gray-800 to-gray-900 rounded-xl shadow-2xl p-6 border-2 border-purple-500">
            <h3 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
                <i class="fas fa-list-music"></i> Todas las Pistas del Evento
            </h3>
            <div id="allTracksContainer" class="space-y-4">
                <!-- Se llenará dinámicamente -->
            </div>
        </div>
    </div>

    <script type="module">
        const params = new URLSearchParams(window.location.search);
        const eventId = params.get('eventId');
        const artistId = params.get('artistId');

        if (!eventId || !artistId) {
            alert('Acceso inválido. Falta eventId o artistId.');
            window.location.href = 'index.html';
        }

        // Función para volver al panel
        window.goBackToPanel = function() {
            window.location.href = `panel_evento_SIMPLE.html?eventId=${eventId}`;
        };

        let currentArtist = null;
        let eventData = null;
        let allTracks = [];
        let wavesurfer1 = null;
        let wavesurfer2 = null;
        let deadlineDate = null;
        let isAfterDeadline = false;

        // Función para normalizar nombres de canciones
        function normalizeSongName(name) {
            return name.toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]/g, "_")
                .replace(/_+/g, "_")
                .trim();
        }

        // Función para mostrar mensajes
        function displayMessage(message, type = 'success') {
            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                warning: 'bg-yellow-600',
                info: 'bg-blue-600'
            };
            const container = document.getElementById('messageContainer');
            container.innerHTML = `
                <div class="${colors[type]} text-white p-4 rounded-lg shadow-lg animate-pulse">
                    <p class="font-semibold">${message}</p>
                </div>
            `;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // Verificar si hay duplicados
        async function checkDuplicate(songName, currentSlot) {
            const normalized = normalizeSongName(songName);
            
            // Buscar en todas las pistas del evento
            for (const track of allTracks) {
                // Ignorar las pistas del mismo artista en el mismo slot
                if (track.artistId === artistId && track.slot === currentSlot) {
                    continue;
                }
                
                if (track.nombre_normalizado === normalized) {
                    return {
                        isDuplicate: true,
                        existingTrack: track
                    };
                }
            }
            
            return { isDuplicate: false };
        }

        // Cargar datos del evento
        async function loadEventData() {
            try {
                const { doc, getDoc } = window.firestoreModules;
                const eventRef = doc(window.db, 'eventos', eventId);
                const eventSnap = await getDoc(eventRef);
                
                if (eventSnap.exists()) {
                    eventData = eventSnap.data();
                    document.getElementById('eventName').textContent = `Evento: ${eventData.nombre || 'Sin nombre'}`;
                    
                    // Verificar fecha límite
                    if (eventData.fecha_limite_pistas) {
                        deadlineDate = eventData.fecha_limite_pistas.toDate();
                        const now = new Date();
                        isAfterDeadline = now > deadlineDate;
                        
                        const deadlineInfo = document.getElementById('deadlineInfo');
                        if (isAfterDeadline) {
                            deadlineInfo.innerHTML = '<i class="fas fa-lock"></i> Fecha límite vencida - Solo puedes ver las pistas';
                            deadlineInfo.classList.add('text-red-500');
                        } else {
                            deadlineInfo.innerHTML = `<i class="fas fa-clock"></i> Fecha límite: ${deadlineDate.toLocaleDateString('es-ES')} ${deadlineDate.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}`;
                        }
                    }
                }
            } catch (error) {
                console.error('Error cargando evento:', error);
            }
        }

        // Cargar datos del artista
        async function loadArtistData() {
            try {
                const { doc, getDoc } = window.firestoreModules;
                const artistRef = doc(window.db, `artistas_${eventId}`, artistId);
                const artistSnap = await getDoc(artistRef);
                
                if (artistSnap.exists()) {
                    currentArtist = { id: artistId, ...artistSnap.data() };
                    document.getElementById('artistName').textContent = currentArtist.nombre || 'Artista';
                    document.getElementById('artistPhoto').src = currentArtist.foto_url || 'https://via.placeholder.com/150?text=Artista';
                } else {
                    alert('Artista no encontrado');
                    return;
                }
            } catch (error) {
                console.error('Error cargando artista:', error);
                displayMessage('Error al cargar datos del artista', 'error');
            }
        }

        // Cargar pistas del artista
        async function loadArtistTracks() {
            try {
                const { doc, getDoc } = window.firestoreModules;
                const trackRef = doc(window.db, `pistas_${eventId}`, artistId);
                const trackSnap = await getDoc(trackRef);
                
                if (trackSnap.exists()) {
                    const data = trackSnap.data();
                    const tracks = data.pistas || [];
                    
                    // Mostrar estado de cada slot
                    tracks.forEach(track => {
                        displayTrackStatus(track);
                    });
                }
            } catch (error) {
                console.error('Error cargando pistas del artista:', error);
            }
        }

        // Mostrar estado de una pista
        function displayTrackStatus(track) {
            const statusDiv = document.getElementById(`slot${track.slot}Status`);
            statusDiv.innerHTML = `
                <div class="bg-green-600 text-white p-3 rounded-lg mb-2">
                    <p class="font-semibold"><i class="fas fa-check-circle"></i> Pista Cargada</p>
                    <p class="text-sm">Canción: ${track.nombre_cancion}</p>
                    <p class="text-sm">Estilo: ${track.estilo_cancion}</p>
                    <p class="text-sm">Subida: ${track.fecha_subida.toDate().toLocaleString('es-ES')}</p>
                    <div class="flex gap-2 mt-2">
                        <button onclick="playTrack('${track.archivo_url}')" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm">
                            <i class="fas fa-play"></i> Reproducir
                        </button>
                        ${!isAfterDeadline ? `
                        <button onclick="deleteTrack(${track.slot})" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm">
                            <i class="fas fa-trash"></i> Reemplazar
                        </button>
                        ` : ''}
                    </div>
                </div>
            `;
            
            // Pre-llenar formulario
            document.getElementById(`nombre${track.slot}`).value = track.nombre_cancion;
            document.getElementById(`estilo${track.slot}`).value = track.estilo_cancion;
        }

        // Cargar todas las pistas del evento
        async function loadAllTracks() {
            try {
                const { collection, getDocs } = window.firestoreModules;
                const tracksRef = collection(window.db, `pistas_${eventId}`);
                const snapshot = await getDocs(tracksRef);
                
                allTracks = [];
                const tracksByArtist = [];
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const pistas = data.pistas || [];
                    
                    pistas.forEach(track => {
                        allTracks.push({
                            artistId: doc.id,
                            artistName: data.artistName || 'Artista',
                            artistPhoto: data.artistPhoto || '',
                            ...track
                        });
                    });
                    
                    if (pistas.length > 0) {
                        tracksByArtist.push({
                            artistId: doc.id,
                            artistName: data.artistName || 'Artista',
                            artistPhoto: data.artistPhoto || '',
                            tracks: pistas
                        });
                    }
                });
                
                // Mostrar lista
                displayAllTracks(tracksByArtist);
            } catch (error) {
                console.error('Error cargando todas las pistas:', error);
            }
        }

        // Mostrar lista de todas las pistas
        function displayAllTracks(tracksByArtist) {
            const container = document.getElementById('allTracksContainer');
            
            if (tracksByArtist.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center">Aún no hay pistas cargadas en este evento</p>';
                return;
            }
            
            container.innerHTML = tracksByArtist.map(artist => `
                <div class="track-card rounded-lg p-4">
                    <div class="flex items-center gap-4 mb-3">
                        <img src="${artist.artistPhoto || 'https://via.placeholder.com/60'}" 
                            alt="${artist.artistName}" 
                            class="w-16 h-16 rounded-full border-2 border-blue-500 object-cover">
                        <div class="flex-1">
                            <h4 class="text-white font-bold text-lg">${artist.artistName}</h4>
                            <p class="text-gray-400 text-sm">${artist.tracks.length} pista${artist.tracks.length > 1 ? 's' : ''} cargada${artist.tracks.length > 1 ? 's' : ''}</p>
                        </div>
                    </div>
                    <div class="space-y-2">
                        ${artist.tracks.map(track => `
                            <div class="bg-gray-800 rounded p-3 border border-gray-700">
                                <div class="flex items-center justify-between">
                                    <div class="flex-1">
                                        <p class="text-white font-semibold">
                                            ${track.slot === 1 ? '<i class="fas fa-star text-yellow-400"></i>' : '<i class="fas fa-music text-blue-400"></i>'}
                                            ${track.nombre_cancion}
                                        </p>
                                        <p class="text-gray-400 text-sm">${track.estilo_cancion}</p>
                                        <p class="text-gray-500 text-xs mt-1">
                                            <i class="fas fa-clock"></i> ${track.fecha_subida.toDate().toLocaleString('es-ES')}
                                        </p>
                                    </div>
                                    <button onclick="playTrack('${track.archivo_url}')" 
                                        class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-2 rounded-lg ml-2">
                                        <i class="fas fa-play"></i>
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Reproducir pista
        window.playTrack = function(url) {
            const audio = new Audio(url);
            audio.play();
        };

        // Eliminar pista para reemplazar
        window.deleteTrack = async function(slot) {
            if (!confirm('¿Deseas reemplazar esta pista? Se eliminará la actual.')) return;
            
            try {
                const { doc, getDoc, setDoc } = window.firestoreModules;
                const { ref, deleteObject } = window.storageModules;
                
                const trackRef = doc(window.db, `pistas_${eventId}`, artistId);
                const trackSnap = await getDoc(trackRef);
                
                if (trackSnap.exists()) {
                    const data = trackSnap.data();
                    const tracks = data.pistas || [];
                    
                    // Encontrar y eliminar del storage
                    const trackToDelete = tracks.find(t => t.slot === slot);
                    if (trackToDelete && trackToDelete.storage_path) {
                        try {
                            const storageRef = ref(window.storage, trackToDelete.storage_path);
                            await deleteObject(storageRef);
                        } catch (error) {
                            console.error('Error eliminando archivo:', error);
                        }
                    }
                    
                    // Eliminar del array
                    const updatedTracks = tracks.filter(t => t.slot !== slot);
                    
                    await setDoc(trackRef, {
                        ...data,
                        pistas: updatedTracks
                    });
                    
                    displayMessage('Pista eliminada. Ahora puedes subir una nueva.', 'success');
                    document.getElementById(`slot${slot}Status`).innerHTML = '';
                    location.reload();
                }
            } catch (error) {
                console.error('Error eliminando pista:', error);
                displayMessage('Error al eliminar la pista', 'error');
            }
        };

        // Configurar editores de audio
        function setupAudioEditor(slot) {
            const fileInput = document.getElementById(`archivo${slot}`);
            const editorContainer = document.getElementById(`editor${slot}Container`);
            const waveformDiv = document.getElementById(`waveform${slot}`);
            const playBtn = document.getElementById(`play${slot}`);
            const stopBtn = document.getElementById(`stop${slot}`);
            const volumeSlider = document.getElementById(`volume${slot}`);
            const volumeValue = document.getElementById(`volumeValue${slot}`);
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // Mostrar editor
                editorContainer.classList.remove('hidden');
                
                // Crear Wavesurfer
                if (slot === 1) {
                    if (wavesurfer1) wavesurfer1.destroy();
                    wavesurfer1 = WaveSurfer.create({
                        container: waveformDiv,
                        waveColor: '#60a5fa',
                        progressColor: '#3b82f6',
                        cursorColor: '#ffffff',
                        barWidth: 2,
                        barRadius: 3,
                        height: 100
                    });
                    wavesurfer1.loadBlob(file);
                } else {
                    if (wavesurfer2) wavesurfer2.destroy();
                    wavesurfer2 = WaveSurfer.create({
                        container: waveformDiv,
                        waveColor: '#a78bfa',
                        progressColor: '#8b5cf6',
                        cursorColor: '#ffffff',
                        barWidth: 2,
                        barRadius: 3,
                        height: 100
                    });
                    wavesurfer2.loadBlob(file);
                }
            });
            
            playBtn.addEventListener('click', () => {
                const ws = slot === 1 ? wavesurfer1 : wavesurfer2;
                if (ws) ws.playPause();
            });
            
            stopBtn.addEventListener('click', () => {
                const ws = slot === 1 ? wavesurfer1 : wavesurfer2;
                if (ws) ws.stop();
            });
            
            volumeSlider.addEventListener('input', (e) => {
                const volume = e.target.value / 100;
                volumeValue.textContent = e.target.value;
                const ws = slot === 1 ? wavesurfer1 : wavesurfer2;
                if (ws) ws.setVolume(volume);
            });
        }

        // Subir pista
        async function uploadTrack(slot) {
            if (isAfterDeadline) {
                displayMessage('La fecha límite ha pasado. No puedes subir pistas.', 'error');
                return;
            }
            
            const nombre = document.getElementById(`nombre${slot}`).value.trim();
            const estilo = document.getElementById(`estilo${slot}`).value.trim();
            const archivo = document.getElementById(`archivo${slot}`).files[0];
            
            if (!nombre || !estilo || !archivo) {
                displayMessage('Por favor completa todos los campos', 'warning');
                return;
            }
            
            // Verificar duplicados
            const duplicateCheck = await checkDuplicate(nombre, slot);
            if (duplicateCheck.isDuplicate) {
                const track = duplicateCheck.existingTrack;
                displayMessage(
                    `⚠️ YA EXISTE una canción con ese nombre:\n\nArtista: ${track.artistName}\nCanción: ${track.nombre_cancion}\nFecha: ${track.fecha_subida.toDate().toLocaleString('es-ES')}\n\n¿Elegir otro título?`,
                    'error'
                );
                return;
            }
            
            try {
                const submitBtn = document.getElementById(`submit${slot}`);
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo...';
                
                // Subir a Storage
                const { ref, uploadBytes, getDownloadURL } = window.storageModules;
                const timestamp = Date.now();
                const fileName = `${normalizeSongName(nombre)}_${timestamp}.${archivo.name.split('.').pop()}`;
                const storagePath = `pistas/${eventId}/${artistId}/slot${slot}_${fileName}`;
                const storageRef = ref(window.storage, storagePath);
                
                await uploadBytes(storageRef, archivo);
                const downloadURL = await getDownloadURL(storageRef);
                
                // Guardar en Firestore
                const { doc, getDoc, setDoc, Timestamp } = window.firestoreModules;
                const trackRef = doc(window.db, `pistas_${eventId}`, artistId);
                const trackSnap = await getDoc(trackRef);
                
                const newTrack = {
                    slot: slot,
                    nombre_cancion: nombre,
                    nombre_normalizado: normalizeSongName(nombre),
                    estilo_cancion: estilo,
                    archivo_url: downloadURL,
                    archivo_nombre: archivo.name,
                    storage_path: storagePath,
                    tamano_mb: (archivo.size / (1024 * 1024)).toFixed(2),
                    formato: archivo.name.split('.').pop().toLowerCase(),
                    fecha_subida: Timestamp.now()
                };
                
                let existingData = { pistas: [] };
                if (trackSnap.exists()) {
                    existingData = trackSnap.data();
                }
                
                // Eliminar pista anterior del mismo slot si existe
                existingData.pistas = existingData.pistas.filter(t => t.slot !== slot);
                
                // Agregar nueva pista
                existingData.pistas.push(newTrack);
                
                await setDoc(trackRef, {
                    ...existingData,
                    artistName: currentArtist.nombre,
                    artistPhoto: currentArtist.foto_url
                });
                
                displayMessage('¡Pista subida exitosamente! 🎉', 'success');
                
                setTimeout(() => {
                    location.reload();
                }, 2000);
                
            } catch (error) {
                console.error('Error subiendo pista:', error);
                displayMessage('Error al subir la pista: ' + error.message, 'error');
                
                const submitBtn = document.getElementById(`submit${slot}`);
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fas fa-upload"></i> Subir Pista ${slot === 1 ? 'Principal' : 'Secundaria'}`;
            }
        }

        // Event listeners para formularios
        document.getElementById('form1').addEventListener('submit', (e) => {
            e.preventDefault();
            uploadTrack(1);
        });

        document.getElementById('form2').addEventListener('submit', (e) => {
            e.preventDefault();
            uploadTrack(2);
        });

        // Configurar editores
        setupAudioEditor(1);
        setupAudioEditor(2);

        // Deshabilitar si está después de la fecha límite
        function checkDeadlineAndDisable() {
            if (isAfterDeadline) {
                document.getElementById('slot1Container').classList.add('slot-disabled');
                document.getElementById('slot2Container').classList.add('slot-disabled');
            }
        }

        // Inicializar
        async function init() {
            await loadEventData();
            await loadArtistData();
            await loadArtistTracks();
            await loadAllTracks();
            checkDeadlineAndDisable();
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
