<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Invitados por Artista - VYTMUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111827; color: #f9fafb; }
        .artist-card {
            background-color: #1f2937;
            border: 2px solid #374151;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }
        .artist-card:hover {
            transform: translateX(5px);
            border-color: #10b981;
        }
        @media print {
            body { background-color: white; color: black; }
            .no-print { display: none; }
            .artist-card { page-break-inside: avoid; border-color: #000; }
        }
    </style>
</head>
<body class="antialiased">
    <div class="container mx-auto max-w-2xl p-4 sm:p-6">
        <header class="text-center mb-8 no-print">
            <img src="https://i.imgur.com/rqkZi9P.png" alt="VYTMUSIC Logo" class="mx-auto mb-4 bg-white rounded-full" style="max-width: 120px;">
            <h1 class="text-3xl sm:text-4xl font-bold text-sky-400">📊 Reporte de Invitados</h1>
            <p id="event-name-display" class="text-lg text-gray-300 mt-2"></p>
            <button onclick="window.print()" class="mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg">
                🖨️ Imprimir
            </button>
        </header>

        <div id="total-summary" class="bg-gradient-to-r from-purple-600 to-pink-600 p-6 rounded-xl shadow-2xl mb-8 text-center">
            <h2 class="text-lg font-semibold text-white">Total de Invitados</h2>
            <p id="total-tickets-summary" class="text-6xl font-black mt-2">0</p>
            <p class="text-sm text-purple-100 mt-2"><span id="artist-count">0</span> artista(s)</p>
        </div>

        <main id="report-container" class="space-y-3">
            <p class="text-center text-gray-400">Cargando reporte...</p>
        </main>
    </div>

    <script type="module">
        import { db } from './firebase_config.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId');
        const eventName = urlParams.get('eventName');

        if (!eventId) {
            document.body.innerHTML = '<p class="text-center text-red-500">Error: No se ha especificado un evento.</p>';
        } else {
            document.getElementById('event-name-display').textContent = eventName ? `Gala: ${decodeURIComponent(eventName)}` : '';
            loadReport();
        }

        async function loadReport() {
            try {
                // 1. Cargar artistas para mapa de nombres
                console.log('🔍 Cargando artistas del evento:', eventId);
                const artistsSnap = await getDocs(collection(db, `events/${eventId}/artists`));
                const artistsMap = {};
                
                // LOG COMPLETO: Ver qué campos SÍ tienen los artistas
                if (artistsSnap.size > 0) {
                    const firstArtist = artistsSnap.docs[0].data();
                    console.log('📋 ESTRUCTURA REAL de un artista:', firstArtist);
                    console.log('📋 Campos disponibles:', Object.keys(firstArtist));
                }
                
                artistsSnap.forEach(doc => {
                    const data = doc.data();
                    // Los artistas se guardan con el campo "name" (no "nombre")
                    const nombre = data.name || data.nombre || data.artistName || data.artist_name || 'Sin nombre';
                    artistsMap[doc.id] = nombre;
                    console.log('✅ Artista:', doc.id, '→', nombre);
                });

                // 2. Cargar todas las entradas
                console.log('🔍 Cargando tickets del evento:', eventId);
                const ticketsSnap = await getDocs(collection(db, `events/${eventId}/tickets`));
                const tickets = [];
                
                // LOG COMPLETO: Ver qué campos SÍ tienen los tickets
                if (ticketsSnap.size > 0) {
                    const firstTicket = ticketsSnap.docs[0].data();
                    console.log('📋 ESTRUCTURA REAL de un ticket:', firstTicket);
                    console.log('📋 Campos disponibles:', Object.keys(firstTicket));
                }
                
                ticketsSnap.forEach(doc => {
                    const ticket = doc.data();
                    tickets.push({ id: doc.id, ...ticket });
                });

                // 3. Contar por prefix CON ANÁLISIS DE DUPLICADOS
                const prefixCounts = {};
                const prefixTickets = {}; // Guardar todos los tickets por prefix para análisis
                
                tickets.forEach(ticket => {
                    const prefix = ticket.prefix || "Sin Grupo";
                    prefixCounts[prefix] = (prefixCounts[prefix] || 0) + 1;
                    
                    // Guardar ticket para análisis detallado
                    if (!prefixTickets[prefix]) {
                        prefixTickets[prefix] = [];
                    }
                    prefixTickets[prefix].push({
                        id: ticket.id,
                        timestamp: ticket.timestamp || ticket.createdAt || 'sin fecha',
                        buyer: ticket.buyerName || ticket.nombre_comprador || ticket.comprador || 'sin nombre',
                        artistId: ticket.artistId || ticket.artista_id || 'sin artistId'
                    });
                });
                
                console.log('📊 Conteo por prefix:', prefixCounts);
                console.log('📊 Total tickets contados:', tickets.length);
                
                // ANÁLISIS DE DUPLICADOS: Mostrar todos los tickets de cada prefix
                console.log('🔍 ANÁLISIS DETALLADO DE TICKETS POR PREFIX:');
                for (const prefix in prefixTickets) {
                    const ticketList = prefixTickets[prefix];
                    console.log(`\n📦 Prefix "${prefix}" - ${ticketList.length} tickets:`);
                    
                    // Detectar posibles duplicados por timestamp
                    const seenTimestamps = {};
                    const seenIds = {};
                    let hasDuplicates = false;
                    
                    ticketList.forEach((t, idx) => {
                        const timestampKey = `${t.timestamp}_${t.buyer}`;
                        const isDuplicateTimestamp = seenTimestamps[timestampKey];
                        const isDuplicateId = seenIds[t.id];
                        
                        if (isDuplicateTimestamp || isDuplicateId) {
                            hasDuplicates = true;
                            console.warn(`   ⚠️ [${idx + 1}] ID: ${t.id} | ${t.timestamp} | ${t.buyer} | artistId: ${t.artistId} | ⚠️ POSIBLE DUPLICADO`);
                        } else {
                            console.log(`   ✅ [${idx + 1}] ID: ${t.id} | ${t.timestamp} | ${t.buyer} | artistId: ${t.artistId}`);
                        }
                        
                        seenTimestamps[timestampKey] = true;
                        seenIds[t.id] = true;
                    });
                    
                    if (hasDuplicates) {
                        console.error(`   ❌ DUPLICADOS DETECTADOS en prefix "${prefix}"`);
                    }
                }

                // 4. Matchear prefix con nombre de artista
                const artistGroups = {}; // { prefix: { name, count } }
                
                for (const prefix in prefixCounts) {
                    let artistName = null;
                    
                    // Estrategia 1: Buscar por artistId en los tickets (campo real: "artistId" no "artista_id")
                    for (const [artistId, name] of Object.entries(artistsMap)) {
                        const matchingTickets = tickets.filter(t => 
                            t.prefix === prefix && 
                            (t.artistId === artistId || t.artista_id === artistId)  // Probar ambos
                        );
                        
                        if (matchingTickets.length > 0) {
                            artistName = name;
                            console.log(`✅ Prefix "${prefix}" (${prefixCounts[prefix]} tickets) → artista "${name}" por artistId`);
                            break;
                        }
                    }
                    
                    // Estrategia 2: Buscar por artistName directamente en el ticket
                    if (!artistName) {
                        const ticketWithArtist = tickets.find(t => t.prefix === prefix && t.artistName);
                        if (ticketWithArtist) {
                            artistName = ticketWithArtist.artistName;
                            console.log(`✅ Prefix "${prefix}" (${prefixCounts[prefix]} tickets) → "${artistName}" por artistName en ticket`);
                        }
                    }
                    
                    // Estrategia 3: Intentar extraer nombre del prefix (ej: "PREV_DARIO" -> "Dario")
                    if (!artistName) {
                        const prefixName = prefix.replace(/^PREV_/i, '').toLowerCase();
                        for (const name of Object.values(artistsMap)) {
                            if (name.toLowerCase().includes(prefixName) || 
                                prefixName.includes(name.toLowerCase())) {
                                artistName = name;
                                console.log(`✅ Prefix "${prefix}" (${prefixCounts[prefix]} tickets) → "${name}" por similitud de nombre`);
                                break;
                            }
                        }
                    }
                    
                    // Fallback: mostrar el prefix
                    if (!artistName) {
                        artistName = prefix;
                        console.warn(`⚠️ Prefix "${prefix}" (${prefixCounts[prefix]} tickets) no encontró artista, usando prefix`);
                    }
                    
                    artistGroups[prefix] = {
                        name: artistName,
                        count: prefixCounts[prefix]
                    };
                }

                console.log('📊 Grupos por prefix (antes de consolidar):', artistGroups);

                // 4.5. CONSOLIDAR por nombre de artista (sumar prefixes del mismo artista)
                const artistsByName = {}; // { "Dario": { count: 12, prefixes: ["PREV_XXX", "PREV_YYY"] } }
                
                for (const prefix in artistGroups) {
                    const { name, count } = artistGroups[prefix];
                    
                    if (!artistsByName[name]) {
                        artistsByName[name] = {
                            count: 0,
                            prefixes: []
                        };
                    }
                    
                    console.log(`➕ Sumando "${name}": ${artistsByName[name].count} + ${count} = ${artistsByName[name].count + count}`);
                    artistsByName[name].count += count;
                    artistsByName[name].prefixes.push(prefix);
                }
                
                console.log('✅ CONSOLIDADO FINAL por nombre:', artistsByName);
                
                // VERIFICACIÓN: Sumar todos los counts consolidados
                let totalVerificacion = 0;
                for (const name in artistsByName) {
                    totalVerificacion += artistsByName[name].count;
                    console.log(`   - ${name}: ${artistsByName[name].count} tickets (${artistsByName[name].prefixes.length} compra(s))`);
                }
                console.log(`🔍 Verificación: ${totalVerificacion} tickets consolidados vs ${tickets.length} tickets reales`);
                
                if (totalVerificacion !== tickets.length) {
                    console.error(`❌ ERROR: Los números no coinciden! ${totalVerificacion} consolidados vs ${tickets.length} reales`);
                }

                // 5. Renderizar
                const container = document.getElementById('report-container');
                const totalTickets = tickets.length;
                const artistCount = Object.keys(artistsByName).length;

                document.getElementById('total-tickets-summary').textContent = totalTickets;
                document.getElementById('artist-count').textContent = artistCount;

                if (artistCount === 0) {
                    container.innerHTML = '<p class="text-center text-gray-400">Aún no se han generado entradas para este evento.</p>';
                    return;
                }

                container.innerHTML = '';
                
                // Ordenar alfabéticamente por nombre de artista
                const sortedArtistNames = Object.keys(artistsByName).sort((a, b) => {
                    return a.localeCompare(b);
                });

                sortedArtistNames.forEach(artistName => {
                    const artistData = artistsByName[artistName];
                    const prefixesText = artistData.prefixes.length > 1 
                        ? `Códigos: ${artistData.prefixes.join(', ')}` 
                        : `Código: ${artistData.prefixes[0]}`;
                    
                    const card = document.createElement('div');
                    card.className = 'artist-card';
                    card.innerHTML = `
                        <div>
                            <h3 class="text-2xl font-bold text-sky-300">🎤 ${artistName}</h3>
                            <p class="text-xs text-gray-400 mt-1">${prefixesText}</p>
                            ${artistData.prefixes.length > 1 ? `<p class="text-xs text-yellow-400 mt-0.5">⚡ ${artistData.prefixes.length} compras consolidadas</p>` : ''}
                        </div>
                        <div class="text-right">
                            <div class="bg-green-600 text-white text-4xl font-black px-6 py-3 rounded-lg">
                                ${artistData.count}
                            </div>
                            <p class="text-xs text-gray-400 mt-1">invitados</p>
                        </div>
                    `;
                    
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error al cargar el reporte:', error);
                document.getElementById('report-container').innerHTML = 
                    `<p class="text-center text-red-400">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
