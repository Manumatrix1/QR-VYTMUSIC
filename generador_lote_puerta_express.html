<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Generador Lote Express - VYTMUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background: linear-gradient(135deg, #1e293b, #0f172a); color: #f8fafc; }
        .hidden { display: none !important; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #eab308; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .ticket-mini { background: #374151; border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 4px solid #10b981; }
        .success-ping { animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p id="loading-text" class="text-2xl font-bold mt-6 text-yellow-400">Generando entradas...</p>
        <p id="loading-progress" class="text-lg text-gray-400 mt-2">0 / 0</p>
    </div>

    <div class="min-h-screen p-2 sm:p-6">
        <div class="max-w-md mx-auto">
            <!-- Header -->
            <header class="text-center mb-2 sm:mb-6">
                <a id="back-link" href="#" class="text-sky-400 hover:text-sky-300 text-xs sm:text-base inline-block mb-1">
                    ← Volver
                </a>
                <h1 class="text-xl sm:text-4xl font-black mb-1 sm:mb-2">
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">
                        ⚡ LOTE EXPRESS
                    </span>
                </h1>
                <p id="event-name" class="text-sm sm:text-lg text-gray-300 font-semibold mb-0.5 sm:mb-1"></p>
                <p class="text-xs sm:text-sm text-gray-400">Genera entradas rápido</p>
            </header>

            <!-- Sección de Generación -->
            <section id="generation-section" class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-lg sm:rounded-xl p-3 sm:p-6 shadow-2xl border border-yellow-500/30">
                <!-- Paso 1: Vendedor -->
                <div class="mb-3 sm:mb-6">
                    <h2 class="text-base sm:text-xl font-bold mb-2 flex items-center justify-center">
                        <span class="bg-yellow-500 text-black rounded-full w-6 h-6 flex items-center justify-center mr-2 text-xs">1</span>
                        <span>Vendedor</span>
                    </h2>
                    <input type="text" id="seller-name" placeholder="Tu nombre" 
                           class="w-full p-2.5 sm:p-3 bg-gray-700 border-2 border-gray-600 rounded-lg text-white text-sm sm:text-base focus:border-yellow-500 focus:outline-none text-center">
                </div>

                <!-- Paso 2: Precio y Pago -->
                <div class="mb-3 sm:mb-6">
                    <h2 class="text-base sm:text-xl font-bold mb-2 flex items-center justify-center">
                        <span class="bg-yellow-500 text-black rounded-full w-6 h-6 flex items-center justify-center mr-2 text-xs">2</span>
                        <span>Precio y Pago</span>
                    </h2>
                    <div class="space-y-2.5">
                        <div>
                            <label class="block text-xs font-bold text-gray-300 mb-1 text-center">💵 Precio</label>
                            <input type="number" id="ticket-price" placeholder="10000" value="10000" min="0"
                                   class="w-full p-2.5 sm:p-3 bg-gray-700 border-2 border-gray-600 rounded-lg text-white text-sm sm:text-base focus:border-yellow-500 focus:outline-none text-center">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-300 mb-1 text-center">💳 Forma de Pago</label>
                            <select id="payment-method" class="w-full p-2.5 sm:p-3 bg-gray-700 border-2 border-gray-600 rounded-lg text-white text-sm sm:text-base focus:border-yellow-500 focus:outline-none text-center">
                                <option value="Efectivo">💵 Efectivo</option>
                                <option value="Transferencia">🏦 Transferencia</option>
                                <option value="Débito">💳 Débito</option>
                                <option value="Crédito">💳 Crédito</option>
                                <option value="MercadoPago">🔵 MercadoPago</option>
                                <option value="Cortesía">🎁 Cortesía</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Paso 3: Lista de Nombres -->
                <div class="mb-3 sm:mb-6">
                    <h2 class="text-base sm:text-xl font-bold mb-2 flex items-center justify-center">
                        <span class="bg-yellow-500 text-black rounded-full w-6 h-6 flex items-center justify-center mr-2 text-xs">3</span>
                        <span>Lista de Nombres</span>
                    </h2>
                    <textarea id="names-list" rows="5" placeholder="Pega aquí:&#10;Juan Pérez&#10;María González&#10;..."
                              class="w-full p-2.5 sm:p-3 bg-gray-700 border-2 border-gray-600 rounded-lg text-white font-mono text-xs sm:text-sm focus:border-yellow-500 focus:outline-none resize-none"></textarea>
                    <div class="flex items-center justify-between mt-1.5">
                        <p class="text-gray-400 text-xs">
                            💡 Ctrl+V
                        </p>
                        <p class="text-yellow-400 font-bold text-sm">
                            <span id="names-count">0</span> personas
                        </p>
                    </div>
                </div>

                <!-- Vista Previa -->
                <div id="preview-section" class="mb-3 sm:mb-6 hidden">
                    <h3 class="text-sm sm:text-base font-bold mb-2 text-green-400 text-center">✅ Vista Previa</h3>
                    
                    <!-- MONTO TOTAL A COBRAR -->
                    <div class="bg-gradient-to-r from-green-600 to-emerald-600 rounded-lg p-3 sm:p-4 mb-2 border-2 border-green-400 shadow-xl">
                        <div class="text-center">
                            <p class="text-xs font-bold text-green-200 mb-1">💰 TOTAL A COBRAR</p>
                            <p id="total-amount" class="text-2xl sm:text-4xl font-black text-white">$0</p>
                            <p class="text-xs text-green-200 mt-0.5">
                                <span id="total-tickets">0</span> entrada(s) × $<span id="unit-price">0</span>
                            </p>
                        </div>
                    </div>
                    
                    <div id="preview-list" class="max-h-28 sm:max-h-48 overflow-y-auto bg-gray-900 rounded-lg p-2 space-y-1 text-xs">
                        <!-- Llenado dinámicamente -->
                    </div>
                </div>

                <!-- Botón Generar -->
                <button id="generate-btn" disabled
                        class="w-full py-3 sm:py-4 bg-gradient-to-r from-yellow-500 to-orange-500 text-black font-black text-sm sm:text-lg rounded-lg hover:from-yellow-400 hover:to-orange-400 transform hover:scale-105 transition-all shadow-2xl disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100">
                    ⚡ GENERAR <span id="btn-count">0</span>
                </button>
                
                <p class="text-center mt-1.5 text-gray-400 text-xs">
                    Se marcan como ingresadas
                </p>
            </section>

            <!-- Sección de Resultados -->
            <section id="results-section" class="hidden mt-3 sm:mt-6 bg-gradient-to-br from-green-900 to-green-800 rounded-lg sm:rounded-xl p-3 sm:p-6 shadow-2xl border-2 border-green-500">
                <h2 class="text-lg sm:text-2xl font-black text-center mb-3 sm:mb-4 flex items-center justify-center">
                    <span class="inline-block w-8 h-8 sm:w-10 sm:h-10 bg-green-500 rounded-full flex items-center justify-center mr-2 text-base sm:text-xl">
                        ✅
                    </span>
                    <span>¡LISTO!</span>
                </h2>
                
                <div class="text-center mb-2 sm:mb-4">
                    <p class="text-2xl sm:text-4xl font-black text-white mb-1">
                        <span id="success-count">0</span>
                    </p>
                    <p class="text-xs sm:text-base text-green-200">entradas creadas</p>
                </div>

                <!-- Lista de Entradas Generadas -->
                <div class="bg-gray-900 rounded-lg p-2.5 sm:p-4 mb-2.5 sm:mb-4 max-h-48 sm:max-h-80 overflow-y-auto">
                    <h3 class="text-xs sm:text-sm font-bold mb-2 text-yellow-400 text-center">📋 Listado</h3>
                    <div id="tickets-list" class="space-y-1 text-xs">
                        <!-- Llenado dinámicamente -->
                    </div>
                </div>

                <!-- Botones de Acción -->
                <div class="space-y-2 sm:space-y-0 sm:grid sm:grid-cols-2 sm:gap-3">
                    <button id="download-pdf-btn" 
                            class="w-full py-2.5 sm:py-3 bg-blue-600 text-white font-bold text-xs sm:text-sm rounded-lg hover:bg-blue-700 transition-all">
                        📥 Descargar PDF
                    </button>
                    <button id="generate-another-btn"
                            class="w-full py-2.5 sm:py-3 bg-gray-700 text-white font-bold text-xs sm:text-sm rounded-lg hover:bg-gray-600 transition-all">
                        🔄 Generar Otro
                    </button>
                </div>
            </section>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase_config.js';
        import { collection, addDoc, doc, getDoc, setDoc, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Parámetros
        const params = new URLSearchParams(window.location.search);
        const eventId = params.get('eventId');
        const eventName = params.get('eventName');

        if (!eventId || !eventName) {
            alert('❌ Error: Falta información del evento');
            window.location.href = 'eventos.html';
        }

        // Configurar UI
        document.getElementById('back-link').href = `ingreso_evento.html?eventId=${eventId}&eventName=${encodeURIComponent(eventName)}`;
        document.getElementById('event-name').textContent = eventName;

        // Referencias DOM
        const ui = {
            sellerName: document.getElementById('seller-name'),
            ticketPrice: document.getElementById('ticket-price'),
            paymentMethod: document.getElementById('payment-method'),
            namesList: document.getElementById('names-list'),
            namesCount: document.getElementById('names-count'),
            btnCount: document.getElementById('btn-count'),
            previewSection: document.getElementById('preview-section'),
            previewList: document.getElementById('preview-list'),
            generateBtn: document.getElementById('generate-btn'),
            loadingOverlay: document.getElementById('loading-overlay'),
            loadingText: document.getElementById('loading-text'),
            loadingProgress: document.getElementById('loading-progress'),
            generationSection: document.getElementById('generation-section'),
            resultsSection: document.getElementById('results-section'),
            successCount: document.getElementById('success-count'),
            ticketsList: document.getElementById('tickets-list'),
            downloadPdfBtn: document.getElementById('download-pdf-btn'),
            generateAnotherBtn: document.getElementById('generate-another-btn')
        };

        let generatedTickets = [];

        // Auto-cargar vendedor
        const savedSeller = localStorage.getItem('vyt_door_seller');
        if (savedSeller) {
            const sellerData = JSON.parse(savedSeller);
            ui.sellerName.value = sellerData.name || '';
        }

        // Contar nombres mientras escribe
        ui.namesList.addEventListener('input', updateNamesCount);

        function updateNamesCount() {
            const text = ui.namesList.value.trim();
            const names = text ? text.split('\n').filter(n => n.trim().length > 0) : [];
            const count = names.length;
            
            ui.namesCount.textContent = count;
            ui.btnCount.textContent = count;
            
            // Habilitar botón si hay nombres
            ui.generateBtn.disabled = count === 0 || !ui.sellerName.value.trim();
            
            // Calcular y mostrar monto total
            const price = parseFloat(ui.ticketPrice.value) || 0;
            const totalAmount = price * count;
            document.getElementById('total-amount').textContent = `$${totalAmount.toLocaleString()}`;
            document.getElementById('total-tickets').textContent = count;
            document.getElementById('unit-price').textContent = price.toLocaleString();
            
            // Mostrar vista previa
            if (count > 0 && count <= 20) {
                ui.previewSection.classList.remove('hidden');
                ui.previewList.innerHTML = names.map((name, i) => `
                    <div class="ticket-mini">
                        <span class="text-yellow-400 font-bold">N° ${i + 1}</span> - ${name}
                    </div>
                `).join('');
            } else if (count > 20) {
                ui.previewSection.classList.remove('hidden');
                ui.previewList.innerHTML = `
                    <div class="text-center text-gray-400 py-4">
                        <p class="text-2xl font-bold text-yellow-400">${count} personas</p>
                        <p class="mt-2">Demasiadas para previsualizar, pero todas se generarán correctamente</p>
                    </div>
                `;
            } else {
                ui.previewSection.classList.add('hidden');
            }
        }

        ui.sellerName.addEventListener('input', () => {
            ui.generateBtn.disabled = !ui.sellerName.value.trim() || ui.namesCount.textContent === '0';
        });

        // Actualizar monto cuando cambia el precio
        ui.ticketPrice.addEventListener('input', updateNamesCount);

        // Generar entradas
        ui.generateBtn.addEventListener('click', async () => {
            const sellerName = ui.sellerName.value.trim();
            const price = parseFloat(ui.ticketPrice.value) || 0;
            const paymentMethod = ui.paymentMethod.value;
            const text = ui.namesList.value.trim();
            const names = text.split('\n').filter(n => n.trim().length > 0);

            if (!sellerName) {
                alert('❌ Por favor ingresa tu nombre');
                ui.sellerName.focus();
                return;
            }

            if (names.length === 0) {
                alert('❌ Por favor ingresa al menos un nombre');
                ui.namesList.focus();
                return;
            }

            // Confirmar
            if (!confirm(`¿Generar ${names.length} entradas por $${price} c/u?`)) {
                return;
            }

            try {
                showLoading('Generando entradas en lote...', 0, names.length);

                // Obtener número secuencial base
                const counterRef = doc(db, `events/${eventId}/meta`, 'ticket_counter');
                let startNumber = 1;
                
                try {
                    const counterDoc = await getDoc(counterRef);
                    startNumber = counterDoc.exists() ? (counterDoc.data().count || 0) + 1 : 1;
                } catch (error) {
                    console.warn('⚠️ Error obteniendo contador:', error);
                    startNumber = Date.now() % 10000;
                }

                // Generar entradas en batches de 500 (límite Firebase)
                const batchSize = 500;
                const totalBatches = Math.ceil(names.length / batchSize);
                generatedTickets = [];

                for (let batchIndex = 0; batchIndex < totalBatches; batchIndex++) {
                    const batchStart = batchIndex * batchSize;
                    const batchEnd = Math.min((batchIndex + 1) * batchSize, names.length);
                    const batchNames = names.slice(batchStart, batchEnd);

                    const batch = writeBatch(db);
                    
                    for (let i = 0; i < batchNames.length; i++) {
                        const globalIndex = batchStart + i;
                        const name = batchNames[i].trim();
                        const ticketNumber = (startNumber + globalIndex).toString().padStart(4, '0');
                        const ticketId = `LOTE-${Date.now()}-${globalIndex}-${crypto.randomUUID().substring(0, 6)}`;

                        const ticketData = {
                            id: ticketId,
                            ticketNumber: ticketNumber,
                            prefix: 'LOTE-PUERTA',
                            name: name,
                            showName: eventName,
                            price: price,
                            paymentMethod: paymentMethod,
                            paymentStatus: 'cobrada',
                            used: true,  // ✅ AUTO-INGRESADO
                            usedAt: serverTimestamp(),
                            scannedBy: sellerName,
                            generatedAt: new Date().toISOString(),
                            isDoorSale: true,
                            isBatchGenerated: true,
                            soldBy: sellerName,
                            soldAt: serverTimestamp(),
                            canVote: true,
                            voteEligible: true,
                            entryAuthorized: true
                        };

                        const ticketRef = doc(collection(db, `events/${eventId}/tickets`));
                        batch.set(ticketRef, ticketData);
                        
                        generatedTickets.push(ticketData);

                        // Actualizar progreso
                        showLoading('Generando entradas...', globalIndex + 1, names.length);
                    }

                    await batch.commit();
                }

                // Actualizar contador
                await setDoc(counterRef, { count: startNumber + names.length - 1 }, { merge: true });

                // Guardar vendedor
                localStorage.setItem('vyt_door_seller', JSON.stringify({
                    name: sellerName,
                    role: 'Taquilla'
                }));

                hideLoading();
                showResults();

            } catch (error) {
                hideLoading();
                console.error('❌ Error:', error);
                alert(`❌ Error al generar entradas:\n\n${error.message}`);
            }
        });

        function showLoading(text, current, total) {
            ui.loadingText.textContent = text;
            ui.loadingProgress.textContent = `${current} / ${total}`;
            ui.loadingOverlay.classList.remove('hidden');
        }

        function hideLoading() {
            ui.loadingOverlay.classList.add('hidden');
        }

        function showResults() {
            ui.generationSection.classList.add('hidden');
            ui.resultsSection.classList.remove('hidden');
            ui.successCount.textContent = generatedTickets.length;

            // Mostrar lista
            ui.ticketsList.innerHTML = generatedTickets.map(ticket => `
                <div class="ticket-mini flex justify-between items-center">
                    <div>
                        <span class="text-yellow-400 font-bold text-lg">N° ${ticket.ticketNumber}</span>
                        <span class="text-white ml-3">${ticket.name}</span>
                    </div>
                    <span class="text-green-400 text-sm">✅ Ingresado</span>
                </div>
            `).join('');
        }

        // Generar otro lote
        ui.generateAnotherBtn.addEventListener('click', () => {
            ui.resultsSection.classList.add('hidden');
            ui.generationSection.classList.remove('hidden');
            ui.namesList.value = '';
            updateNamesCount();
            ui.namesList.focus();
        });

        // Descargar PDF (básico - para mejorar)
        ui.downloadPdfBtn.addEventListener('click', () => {
            alert('📥 Función de descarga PDF en desarrollo.\n\nPor ahora, puedes hacer screenshot de la lista de entradas.');
        });

        console.log('⚡ Generador de Lote Express inicializado');
    </script>
</body>
</html>
