<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Eliminar Duplicados de Nanci - DIRECTO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, collection, getDocs, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        
        import { app, db, auth } from './firebase_config.js';
        
        window.db = db;
        window.auth = auth;
        window.firestoreModules = { collection, getDocs, doc, deleteDoc };
        window.authModules = { signInWithEmailAndPassword, onAuthStateChanged };
    </script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 min-h-screen text-white p-6">
    
    <div class="max-w-4xl mx-auto">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-red-600 to-orange-600 rounded-2xl p-6 shadow-2xl mb-8">
            <h1 class="text-4xl font-black text-white mb-2">🎯 Eliminar Duplicados de Nanci</h1>
            <p class="text-orange-100 text-lg">Herramienta DIRECTA - Sin complicaciones</p>
            <p id="authStatus" class="text-orange-200 text-sm mt-2 font-semibold"></p>
        </div>

        <!-- Login Form (se oculta después de login) -->
        <div id="loginSection" class="bg-gray-800 rounded-xl p-6 border-2 border-red-500 mb-8">
            <h2 class="text-2xl font-bold mb-4">🔐 Autenticación Requerida</h2>
            <p class="text-gray-300 mb-4">Debes iniciar sesión para eliminar tickets (reglas de seguridad Firebase)</p>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email" 
                       class="w-full p-3 bg-gray-700 text-white rounded-lg border-2 border-gray-600 focus:border-red-500">
                <input type="password" id="loginPassword" placeholder="Contraseña" 
                       class="w-full p-3 bg-gray-700 text-white rounded-lg border-2 border-gray-600 focus:border-red-500">
                <button onclick="login()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg">
                    🔓 Iniciar Sesión
                </button>
                <p id="loginError" class="text-red-400 text-sm text-center"></p>
            </div>
        </div>

        <!-- Contenido Principal (solo visible después de login) -->
        <div id="mainContent" class="hidden">

        <!-- Selector de Evento -->
        <div class="bg-gray-800 rounded-xl p-6 border-2 border-purple-500 mb-6">
            <h2 class="text-2xl font-bold mb-4">1️⃣ Seleccionar Evento</h2>
            <select id="eventSelector" class="w-full p-4 bg-gray-700 text-white rounded-xl border-2 border-gray-600 focus:border-purple-500 text-lg font-semibold mb-4">
                <option value="">Cargando eventos...</option>
            </select>
            <button onclick="buscarNanci()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-6 rounded-xl transition-all">
                🔍 Buscar Tickets de Nanci
            </button>
        </div>

        <!-- Resultados -->
        <div id="resultsSection" class="hidden">
            
            <!-- Estadísticas -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-blue-900 rounded-xl p-6 text-center border-2 border-blue-500">
                    <div class="text-4xl mb-2">📊</div>
                    <h3 class="text-blue-300 text-sm uppercase">Total Nanci</h3>
                    <p id="stat-total" class="text-white text-4xl font-black">0</p>
                </div>
                <div class="bg-red-900 rounded-xl p-6 text-center border-2 border-red-500">
                    <div class="text-4xl mb-2">🗑️</div>
                    <h3 class="text-red-300 text-sm uppercase">A Eliminar</h3>
                    <p id="stat-selected" class="text-white text-4xl font-black">0</p>
                </div>
            </div>

            <!-- Lista de Tickets -->
            <div class="bg-gray-800 rounded-xl p-6 border-2 border-yellow-500 mb-6">
                <div class="flex items-center justify-between mb-4">
        </div><!-- Cierre de mainContent -->

    </div>

    <script type="module">
        const { collection, getDocs, doc, deleteDoc } = window.firestoreModules;
        const { signInWithEmailAndPassword, onAuthStateChanged } = window.auth
                </div>
                <div id="ticketsList" class="space-y-3 max-h-96 overflow-y-auto">
                    <!-- Se llenarán dinámicamente -->
                </div>
            </div>

            <!-- Botón de Eliminación -->
            <div class="bg-red-900 rounded-xl p-6 border-2 border-red-500">
                <h2 class="text-2xl font-bold mb-4">3️⃣ Eliminar Seleccionados</h2>
                <button onclick="eliminarSeleccionados()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-6 px-6 rounded-xl transition-all text-xl">
                    🗑️ ELIMINAR TICKETS SELECCIONADOS
                </button>
                <p id="deleteStatus" class="mt-4 text-center text-white font-semibold"></p>
            </div>
        </div>

    </div>

    <script type="module">
        const { collection, getDocs, doc, deleteDoc } = window.firestoreModules;
        
        let currentUser = null;

        // Login
        window.login = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');

            if (!email || !password) {
                errorEl.textContent = '❌ Completa email y contraseña';
                return;
            }

            try {
                errorEl.textContent = '🔄 Autenticando...';
                await signInWithEmailAndPassword(window.auth, email, password);
                errorEl.textContent = '';
            } catch (error) {
                console.error('Error en login:', error);
                errorEl.textContent = `❌ Error: ${error.message}`;
            }
        };

        // Detectar estado de autenticación
        onAuthStateChanged(window.auth, (user) => {
            currentUser = user;
            
            const authStatus = document.getElementById('authStatus');
            const loginSection = document.getElementById('loginSection');
            const mainContent = document.getElementById('mainContent');

            if (user) {
                // Usuario autenticado
                authStatus.textContent = `✅ Sesión activa: ${user.email}`;
                loginSection.classList.add('hidden');
                mainContent.classList.remove('hidden');
                loadEvents();
            } else {
                // No autenticado
                authStatus.textContent = '⚠️ No autenticado - Por favor inicia sesión';
                loginSection.classList.remove('hidden');
                mainContent.classList.add('hidden');
            }
        });
        let currentEventId = null;
        let nanciTickets = [];
        let selectedTickets = new Set();

        // Cargar eventos
        async function loadEvents() {
            try {
                const eventsSnap = await getDocs(collection(window.db, 'events'));
                const selector = document.getElementById('eventSelector');
                selector.innerHTML = '<option value="">Selecciona un evento...</option>';
                
                const eventos = [];
                eventsSnap.forEach(doc => {
                    const event = doc.data();
                    const nombre = event.nombre_evento || event.nombre || event.name || doc.id;
                    const generacion = event.generacion || '';
                    const displayText = generacion ? `${nombre} - ${generacion}` : nombre;
                    
                    eventos.push({ id: doc.id, texto: displayText });
                });
                
                eventos.forEach(evento => {
                    const option = document.createElement('option');
                    option.value = evento.id;
                    option.textContent = evento.texto;
                    selector.appendChild(option);
                });
                
            } catch (error) {
                console.error('Error cargando eventos:', error);
                alert('Error: ' + error.message);
            }
        }

        window.buscarNanci = async function() {
            const selector = document.getElementById('eventSelector');
            currentEventId = selector.value;
            
            if (!currentEventId) {
                alert('❌ Selecciona un evento primero');
                return;
            }

            try {
                console.log('🔍 Buscando tickets de Nanci en evento:', currentEventId);
                
                // Cargar TODOS los tickets del evento
                const ticketsSnap = await getDocs(collection(window.db, `events/${currentEventId}/tickets`));
                
                // Filtrar solo los de Nanci
                nanciTickets = [];
                ticketsSnap.forEach(doc => {
                    const ticket = doc.data();
                    const artistName = (ticket.artistName || ticket.artist_name || ticket.prefix || '').toLowerCase();
                    const personName = (ticket.name || ticket.nombre || ticket.buyerName || '').toLowerCase();
                    
                    // Buscar "nanci" o "nancy" en nombre de artista O en nombre de persona
                    if (artistName.includes('nanci') || artistName.includes('nancy') ||
                        personName.includes('nanci') || personName.includes('nancy')) {
                        nanciTickets.push({
                            id: doc.id,
                            name: ticket.name || ticket.nombre || 'Sin nombre',
                            artistName: ticket.artistName || ticket.prefix || 'Sin artista',
                            timestamp: ticket.timestamp || ticket.createdAt,
                            prefix: ticket.prefix || 'N/A'
                        });
                    }
                });

                console.log(`✅ Encontrados ${nanciTickets.length} tickets de Nanci`);
                
                if (nanciTickets.length === 0) {
                    alert('✅ No se encontraron tickets de Nanci en este evento');
                    return;
                }

                // Mostrar resultados
                displayTickets();
                document.getElementById('resultsSection').classList.remove('hidden');
                
            } catch (error) {
                console.error('Error buscando tickets:', error);
                alert('❌ Error: ' + error.message);
            }
        };

        function displayTickets() {
            const container = document.getElementById('ticketsList');
            container.innerHTML = '';
            
            document.getElementById('stat-total').textContent = nanciTickets.length;
            document.getElementById('stat-selected').textContent = selectedTickets.size;
            
            nanciTickets.forEach((ticket, index) => {
                const fecha = ticket.timestamp?.seconds 
                    ? new Date(ticket.timestamp.seconds * 1000).toLocaleString('es-ES')
                    : 'Sin fecha';
                
                const div = document.createElement('div');
                div.className = 'bg-gray-700 rounded-lg p-4 border-2 border-gray-600 hover:border-yellow-500 transition-all cursor-pointer';
                div.innerHTML = `
                    <label class="flex items-center gap-4 cursor-pointer">
                        <input type="checkbox" 
                               id="ticket-${index}" 
                               class="w-6 h-6 rounded cursor-pointer"
                               onchange="toggleTicket('${ticket.id}')">
                        <div class="flex-1">
                            <p class="text-white font-bold text-lg">${ticket.name}</p>
                            <p class="text-gray-300 text-sm">Artista: ${ticket.artistName} | Prefix: ${ticket.prefix}</p>
                            <p class="text-gray-400 text-xs">Fecha: ${fecha}</p>
                            <p class="text-yellow-400 text-xs font-mono mt-1">ID: ${ticket.id.substring(0, 20)}...</p>
                        </div>
                    </label>
                `;
                container.appendChild(div);
            });
        }

        window.toggleTicket = function(ticketId) {
            if (selectedTickets.has(ticketId)) {
                selectedTickets.delete(ticketId);
            } else {
                selectedTickets.add(ticketId);
            }
            document.getElementById('stat-selected').textContent = selectedTickets.size;
        };

        window.seleccionarTodos = function() {
            const allSelected = selectedTickets.size === nanciTickets.length;
            
            if (allSelected) {
                // Deseleccionar todos
                selectedTickets.clear();
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            } else {
                // Seleccionar todos
                selectedTickets.clear();
                nanciTickets.forEach(t => selectedTickets.add(t.id));
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
            }
            
            document.getElementById('stat-selected').textContent = selectedTickets.size;
        };

        window.eliminarSeleccionados = async function() {
            if (selectedTickets.size === 0) {
                alert('❌ No hay tickets seleccionados para eliminar');
                return;
            }

            const confirmMsg = `⚠️ VAS A ELIMINAR ${selectedTickets.size} TICKET(S) DE NANCI\n\n` +
                               `Esta acción NO SE PUEDE DESHACER.\n\n` +
                               `¿Estás SEGURA?`;
            
            if (!confirm(confirmMsg)) {
                return;
            }

            const statusEl = document.getElementById('deleteStatus');
            statusEl.textContent = `🔄 Eliminando ${selectedTickets.size} tickets...`;
            statusEl.className = 'mt-4 text-center text-blue-400 font-semibold text-xl';

            try {
                let deleted = 0;
                let errors = 0;

                for (const ticketId of selectedTickets) {
                    try {
                        await deleteDoc(doc(window.db, `events/${currentEventId}/tickets`, ticketId));
                        deleted++;
                        console.log(`✅ Eliminado: ${ticketId}`);
                    } catch (error) {
                        errors++;
                        console.error(`❌ Error eliminando ${ticketId}:`, error);
                    }
                }

                statusEl.textContent = `✅ ¡LISTO! ${deleted} ticket(s) eliminado(s)${errors > 0 ? ` | ${errors} error(es)` : ''}`;
                statusEl.className = 'mt-4 text-center text-green-400 font-semibold text-xl';

                // Esperar 2 segundos y buscar de nuevo para actualizar
                setTimeout(() => {
                    buscarNanci();
                }, 2000);

            } catch (error) {
                console.error('Error eliminando tickets:', error);
                statusEl.textContent = `❌ Error: ${error.message}`;
                statusEl.className = 'mt-4 text-center text-red-400 font-semibold text-xl';
            }
        };

        // Cargar eventos al iniciar
        window.addEventListener('DOMContentLoaded', () => {
            loadEvents();
        });
    </script>
</body>
</html>
