<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Artistas con QR - VYTMUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111827; color: #f9fafb; }
        .artist-card { background-color: #1f2937; border: 1px solid #374151; display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; border-radius: 0.5rem; }
        .artist-card a:hover { text-decoration: underline; }
        @media (max-width: 640px) {
            .artist-card { flex-direction: column; gap: 1rem; align-items: stretch; }
            .artist-card .flex { justify-content: center; }
        }
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); z-index: 900; display: flex; justify-content: center; align-items: center; }
        .modal-content { background-color: #1f2937; padding: 1.5rem; border-radius: 0.5rem; max-width: 90%; width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="antialiased">
    <div id="share-link-modal" class="modal-backdrop hidden">
        <div class="modal-content text-center">
            <h3 id="share-modal-title" class="text-xl font-bold mb-4">Compartir Enlace</h3>
            <p class="mb-4">Copia el siguiente enlace:</p>
            <input type="text" id="share-link-display" class="w-full p-3 rounded-md bg-gray-900 text-white" readonly>
            <div class="flex justify-end space-x-4 mt-4">
                <button id="copy-share-link-btn" class="px-4 py-2 bg-sky-600 text-white font-bold rounded-lg">Copiar</button>
                <button id="close-share-modal-btn" class="px-4 py-2 bg-gray-600 text-white font-bold rounded-lg">Cerrar</button>
            </div>
        </div>
    </div>
    <div class="container mx-auto max-w-4xl p-4 sm:p-6">
        <header class="text-center mb-8">
            <a id="back-to-panel-link" href="#" class="text-sky-400 hover:underline mb-4 inline-block">&larr; Volver al Panel del Evento</a>
            <h1 class="text-4xl sm:text-5xl font-bold text-sky-400">QR Generados</h1>
            <p id="event-name-display" class="text-lg text-gray-400 mt-2"></p>
        </header>

        <main>
            <div class="mb-8">
                <button id="share-summary-btn" class="w-full px-4 py-3 bg-teal-600 text-white font-bold rounded-lg hover:bg-teal-700">Compartir Reporte de Totales (Para Organizador)</button>
            </div>
            <section id="artists-list-section">
                <h2 class="text-2xl font-bold mb-4">O selecciona un Artista/Grupo para ver sus QR</h2>
                <div id="artists-list" class="space-y-4">
                    <p class="text-center text-gray-400">Cargando lista...</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { db } from './firebase_config.js';
        import { collection, query, getDocs, writeBatch, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId');
        const eventName = urlParams.get('eventName');

        if (!eventId || !eventName) {
            alert('Error: No se ha especificado un evento.');
            window.location.href = 'eventos.html';
        }

        document.getElementById('back-to-panel-link').href = `panel_evento_SIMPLE.html?eventId=${eventId}&eventName=${encodeURIComponent(eventName)}`;
        document.getElementById('event-name-display').textContent = `Para el evento: ${eventName}`;
        
        const ui = {
            artistsListDiv: document.getElementById('artists-list'),
            shareLinkModal: document.getElementById('share-link-modal'),
            shareModalTitle: document.getElementById('share-modal-title'),
            shareLinkDisplay: document.getElementById('share-link-display'),
            copyShareLinkBtn: document.getElementById('copy-share-link-btn'),
            closeShareModalBtn: document.getElementById('close-share-modal-btn'),
            shareSummaryBtn: document.getElementById('share-summary-btn')
        };

        function showShareModal(link, title) {
            ui.shareModalTitle.textContent = title;
            ui.shareLinkDisplay.value = link;
            ui.shareLinkModal.classList.remove('hidden');
        }
        
        ui.copyShareLinkBtn.addEventListener('click', () => { navigator.clipboard.writeText(ui.shareLinkDisplay.value).then(() => alert('¡Enlace copiado!')); });
        ui.closeShareModalBtn.addEventListener('click', () => ui.shareLinkModal.classList.add('hidden'));

        async function loadArtistsWithTickets() {
            ui.artistsListDiv.innerHTML = '<p class="text-center text-gray-400">Buscando artistas con entradas...</p>';
            const ticketsQuery = query(collection(db, `events/${eventId}/tickets`));
            const querySnapshot = await getDocs(ticketsQuery);
            const tickets = querySnapshot.docs.map(doc => doc.data());
            
            if (tickets.length === 0) {
                ui.artistsListDiv.innerHTML = '<p class="text-center text-gray-500">Aún no se han generado entradas para este evento.</p>';
                ui.shareSummaryBtn.disabled = true;
                return;
            }
            
            // 🔄 NUEVA LÓGICA: Agrupar por PERSONA (nombre normalizado) en lugar de por prefix individual
            const personData = tickets.reduce((acc, ticket) => {
                if (!ticket.artistName) return acc; // Skip tickets sin nombre
                
                // Normalizar el nombre para agrupar correctamente (lowercase, sin espacios extra)
                const normalizedName = (ticket.artistName || '').toLowerCase().trim();
                
                if (!acc[normalizedName]) {
                    acc[normalizedName] = { 
                        count: 0, 
                        displayName: ticket.artistName, // Mantener el nombre original con mayúsculas
                        prefixes: [], // TODOS los prefixes de esta persona
                        email: ticket.email || '',
                        phone: ticket.phone || ''
                    };
                }
                
                acc[normalizedName].count++;
                
                // Agregar prefix si no está ya en el array
                if (ticket.prefix && !acc[normalizedName].prefixes.includes(ticket.prefix)) {
                    acc[normalizedName].prefixes.push(ticket.prefix);
                }
                
                // Actualizar email/phone si no los teníamos
                if (ticket.email && !acc[normalizedName].email) acc[normalizedName].email = ticket.email;
                if (ticket.phone && !acc[normalizedName].phone) acc[normalizedName].phone = ticket.phone;
                
                return acc;
            }, {});
            
            const artistNames = Object.keys(personData).sort();
            ui.artistsListDiv.innerHTML = '';
            
            artistNames.forEach(normalizedName => {
                const { count, displayName, prefixes, email, phone } = personData[normalizedName];
                const primaryPrefix = prefixes[0]; // Usar el primer prefix como principal
                
                const card = document.createElement('div');
                card.className = 'artist-card';
                card.innerHTML = `
                    <a href="visor_qr_compartido.html?eventId=${eventId}&artist=${encodeURIComponent(primaryPrefix)}" class="flex-grow">
                        <h3 class="text-xl font-bold text-sky-400">${displayName}</h3>
                        ${prefixes.length > 1 ? `<p class="text-xs text-amber-400">🔗 ${prefixes.length} compras agrupadas</p>` : `<p class="text-xs text-gray-500">Código: ${primaryPrefix}</p>`}
                        <p class="text-sm text-gray-400">${count} entrada(s) total</p>
                    </a>
                    <div class="flex space-x-1">
                        <button data-prefixes='${JSON.stringify(prefixes)}' data-artist-name="${displayName}" class="view-detailed-btn px-2 py-1.5 bg-green-600 text-white font-medium rounded text-xs hover:bg-green-700">👥 Ver Invitados</button>
                        <button data-prefix="${primaryPrefix}" data-artist-name="${displayName}" class="add-more-btn px-2 py-1.5 bg-blue-600 text-white font-medium rounded text-xs hover:bg-blue-700">+ Más</button>
                        <button data-prefixes='${JSON.stringify(prefixes)}' data-artist-name="${displayName}" class="share-artist-btn px-2 py-1.5 bg-purple-600 text-white font-medium rounded text-xs hover:bg-purple-700">Compartir</button>
                        <button data-prefixes='${JSON.stringify(prefixes)}' data-artist-name="${displayName}" class="delete-artist-tickets-btn px-2 py-1.5 bg-red-600 text-white font-medium rounded text-xs hover:bg-red-700">Borrar</button>
                    </div>`;
                ui.artistsListDiv.appendChild(card);
            });
        }
        
        ui.artistsListDiv.addEventListener('click', async (e) => {
            const target = e.target;
            
            if (target.classList.contains('view-detailed-btn')) {
                // 🔄 NUEVO: Si tiene múltiples prefixes, ir al visor que muestra TODOS
                const prefixesJSON = target.dataset.prefixes;
                const prefixes = JSON.parse(prefixesJSON);
                
                if (prefixes.length === 1) {
                    // Solo una compra - ir directo
                    window.location.href = `visor_invitados_detallado.html?eventId=${eventId}&artist=${encodeURIComponent(prefixes[0])}&eventName=${encodeURIComponent(eventName)}`;
                } else {
                    // Múltiples compras - pasar TODOS los prefixes
                    const prefixesParam = prefixes.map(p => encodeURIComponent(p)).join(',');
                    window.location.href = `visor_invitados_detallado.html?eventId=${eventId}&artists=${prefixesParam}&eventName=${encodeURIComponent(eventName)}`;
                }
            }
            
            if (target.classList.contains('add-more-btn')) {
                const prefix = target.dataset.prefix;
                // Redirigir al generador con datos pre-cargados
                const generatorUrl = `generador_y_gestion.html?eventId=${eventId}&eventName=${encodeURIComponent(eventName)}&prefillPrefix=${encodeURIComponent(prefix)}`;
                window.location.href = generatorUrl;
            }
            
            if (target.classList.contains('share-artist-btn')) {
                // 🔄 NUEVO: Si tiene múltiples prefixes, crear link que muestre TODOS
                const prefixesJSON = target.dataset.prefixes;
                const prefixes = JSON.parse(prefixesJSON);
                const artistName = target.dataset.artistName;
                const baseUrl = 'https://vyt-music.web.app';
                
                let shareableLink;
                if (prefixes.length === 1) {
                    shareableLink = `${baseUrl}/visor_qr_compartido.html?eventId=${eventId}&artist=${encodeURIComponent(prefixes[0])}`;
                } else {
                    // Múltiples prefixes - pasar todos separados por coma
                    const prefixesParam = prefixes.map(p => encodeURIComponent(p)).join(',');
                    shareableLink = `${baseUrl}/visor_qr_compartido.html?eventId=${eventId}&artists=${prefixesParam}`;
                }
                
                showShareModal(shareableLink, `Enlace de QR para "${artistName}"${prefixes.length > 1 ? ` (${prefixes.length} compras)` : ''}`);
            }
            
            if (target.classList.contains('delete-artist-tickets-btn')) {
                // 🔄 NUEVO: Borrar TODOS los tickets de TODOS los prefixes de esta persona
                const prefixesJSON = target.dataset.prefixes;
                const prefixes = JSON.parse(prefixesJSON);
                const artistName = target.dataset.artistName;
                
                const confirmMsg = prefixes.length > 1 
                    ? `¿Estás seguro de que quieres borrar TODAS las entradas de "${artistName}"?\n\nEsta persona tiene ${prefixes.length} compras agrupadas. Se borrarán TODAS sus entradas.\n\nEsta acción no se puede deshacer.`
                    : `¿Estás seguro de que quieres borrar TODAS las entradas de "${artistName}"? Esta acción no se puede deshacer.`;
                
                if (confirm(confirmMsg)) {
                    try {
                        const batch = writeBatch(db);
                        let totalDeleted = 0;
                        
                        // Borrar tickets de TODOS los prefixes
                        for (const prefix of prefixes) {
                            const ticketsToDeleteQuery = query(collection(db, `events/${eventId}/tickets`), where("prefix", "==", prefix));
                            const ticketsSnapshot = await getDocs(ticketsToDeleteQuery);
                            
                            ticketsSnapshot.forEach((doc) => {
                                batch.delete(doc.ref);
                                totalDeleted++;
                            });
                        }
                        
                        await batch.commit();
                        
                        alert(`Se han borrado ${totalDeleted} entrada(s) de "${artistName}"${prefixes.length > 1 ? ` (${prefixes.length} compras agrupadas)` : ''}.`);
                        loadArtistsWithTickets(); // Recargar la lista
                        
                    } catch (error) {
                        console.error("Error al borrar entradas:", error);
                        alert('Hubo un error al borrar las entradas. Revisa la consola para más detalles.');
                    }
                }
            }
        });
        
        ui.shareSummaryBtn.addEventListener('click', () => {
            const baseUrl = 'https://vyt-music.web.app';
            const shareableLink = `${baseUrl}/reporte_entradas_publico.html?eventId=${eventId}&eventName=${encodeURIComponent(eventName)}`;
            showShareModal(shareableLink, 'Enlace de Reporte de Entradas');
        });

        loadArtistsWithTickets();
    </script>
</body>
</html>
