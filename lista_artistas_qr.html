<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Artistas con QR - VYTMUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111827; color: #f9fafb; }
        .artist-card { background-color: #1f2937; border: 1px solid #374151; display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; border-radius: 0.5rem; }
        .artist-card a:hover { text-decoration: underline; }
        @media (max-width: 640px) {
            .artist-card { flex-direction: column; gap: 1rem; align-items: stretch; }
            .artist-card .flex { justify-content: center; }
        }
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); z-index: 900; display: flex; justify-content: center; align-items: center; }
        .modal-content { background-color: #1f2937; padding: 1.5rem; border-radius: 0.5rem; max-width: 90%; width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="antialiased">
    <div id="share-link-modal" class="modal-backdrop hidden">
        <div class="modal-content text-center">
            <h3 id="share-modal-title" class="text-xl font-bold mb-4">Compartir Enlace</h3>
            <p class="mb-4">Copia el siguiente enlace:</p>
            <input type="text" id="share-link-display" class="w-full p-3 rounded-md bg-gray-900 text-white" readonly>
            <div class="flex justify-end space-x-4 mt-4">
                <button id="copy-share-link-btn" class="px-4 py-2 bg-sky-600 text-white font-bold rounded-lg">Copiar</button>
                <button id="close-share-modal-btn" class="px-4 py-2 bg-gray-600 text-white font-bold rounded-lg">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Modal renombrar -->
    <div id="rename-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-2">✏️ Renombrar grupo</h3>
            <p class="text-sm text-gray-400 mb-4">Cambia el nombre de <strong id="rename-current-name" class="text-sky-300"></strong> y todos sus tickets quedarán bajo el nuevo nombre.</p>
            <input type="text" id="rename-input" class="w-full p-3 rounded-md bg-gray-900 text-white border border-gray-600 mb-4" placeholder="Nuevo nombre (ej: Organizador)">
            <div class="flex justify-end space-x-3">
                <button id="rename-cancel-btn" class="px-4 py-2 bg-gray-600 text-white font-bold rounded-lg">Cancelar</button>
                <button id="rename-confirm-btn" class="px-4 py-2 bg-amber-500 text-white font-bold rounded-lg">Guardar</button>
            </div>
        </div>
    </div>
    <div class="container mx-auto max-w-4xl p-4 sm:p-6">
        <header class="text-center mb-8">
            <a id="back-to-panel-link" href="#" class="text-sky-400 hover:underline mb-4 inline-block">&larr; Volver al Panel del Evento</a>
            <h1 class="text-4xl sm:text-5xl font-bold text-sky-400">QR Generados</h1>
            <p id="event-name-display" class="text-lg text-gray-400 mt-2"></p>
            <div id="total-tickets-banner" class="hidden mt-4 inline-block bg-sky-900 border border-sky-500 rounded-xl px-8 py-3">
                <span class="text-sky-300 text-sm uppercase tracking-wide">Total entradas</span>
                <p id="total-tickets-count" class="text-white text-4xl font-black"></p>
            </div>
        </header>

        <main>
            <div class="mb-8 flex flex-col sm:flex-row gap-3">
                <button id="share-summary-btn" class="flex-1 px-4 py-3 bg-teal-600 text-white font-bold rounded-lg hover:bg-teal-700">Compartir Reporte de Totales (Para Organizador)</button>
                <button id="repair-orphan-btn" class="px-4 py-3 bg-orange-600 text-white font-bold rounded-lg hover:bg-orange-700 hidden">🔧 Reparar Entradas Sin Artista</button>
            </div>
            <section id="artists-list-section">
                <h2 class="text-2xl font-bold mb-4">O selecciona un Artista/Grupo para ver sus QR</h2>
                <div id="artists-list" class="space-y-4">
                    <p class="text-center text-gray-400">Cargando lista...</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { db } from './firebase_config.js';
        import { collection, query, getDocs, writeBatch, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId');
        const eventName = urlParams.get('eventName');

        if (!eventId || !eventName) {
            alert('Error: No se ha especificado un evento.');
            window.location.href = 'eventos.html';
        }

        document.getElementById('back-to-panel-link').href = `panel_evento_SIMPLE.html?eventId=${eventId}&eventName=${encodeURIComponent(eventName)}`;
        document.getElementById('event-name-display').textContent = `Para el evento: ${eventName}`;
        
        const ui = {
            artistsListDiv: document.getElementById('artists-list'),
            shareLinkModal: document.getElementById('share-link-modal'),
            shareModalTitle: document.getElementById('share-modal-title'),
            shareLinkDisplay: document.getElementById('share-link-display'),
            copyShareLinkBtn: document.getElementById('copy-share-link-btn'),
            closeShareModalBtn: document.getElementById('close-share-modal-btn'),
            shareSummaryBtn: document.getElementById('share-summary-btn'),
            renameModal: document.getElementById('rename-modal'),
            renameInput: document.getElementById('rename-input'),
            renameCurrentName: document.getElementById('rename-current-name'),
            renameCancelBtn: document.getElementById('rename-cancel-btn'),
            renameConfirmBtn: document.getElementById('rename-confirm-btn')
        };
        let _renamePrefixes = [];

        ui.renameCancelBtn.addEventListener('click', () => ui.renameModal.classList.add('hidden'));
        ui.renameConfirmBtn.addEventListener('click', async () => {
            const newName = ui.renameInput.value.trim();
            if (!newName) { alert('Escribí el nuevo nombre'); return; }
            ui.renameConfirmBtn.disabled = true;
            ui.renameConfirmBtn.textContent = 'Guardando...';
            try {
                const batch = writeBatch(db);
                for (const prefix of _renamePrefixes) {
                    const snap = await getDocs(query(collection(db, `events/${eventId}/tickets`), where('prefix', '==', prefix)));
                    snap.forEach(d => batch.update(d.ref, { artistName: newName }));
                }
                await batch.commit();
                ui.renameModal.classList.add('hidden');
                alert(`✅ Renombrado a "${newName}"`);
                loadArtistsWithTickets();
            } catch(e) {
                alert('❌ Error: ' + e.message);
            } finally {
                ui.renameConfirmBtn.disabled = false;
                ui.renameConfirmBtn.textContent = 'Guardar';
            }
        });

        function showShareModal(link, title) {
            ui.shareModalTitle.textContent = title;
            ui.shareLinkDisplay.value = link;
            ui.shareLinkModal.classList.remove('hidden');
        }
        
        ui.copyShareLinkBtn.addEventListener('click', () => { navigator.clipboard.writeText(ui.shareLinkDisplay.value).then(() => alert('¡Enlace copiado!')); });
        ui.closeShareModalBtn.addEventListener('click', () => ui.shareLinkModal.classList.add('hidden'));

        async function loadArtistsWithTickets() {
            ui.artistsListDiv.innerHTML = '<p class="text-center text-gray-400">Buscando artistas con entradas...</p>';
            const ticketsQuery = query(collection(db, `events/${eventId}/tickets`));
            const querySnapshot = await getDocs(ticketsQuery);
            const tickets = querySnapshot.docs.map(doc => doc.data());
            
            if (tickets.length === 0) {
                ui.artistsListDiv.innerHTML = '<p class="text-center text-gray-500">Aún no se han generado entradas para este evento.</p>';
                ui.shareSummaryBtn.disabled = true;
                return;
            }

            // Mostrar total de entradas arriba
            document.getElementById('total-tickets-count').textContent = tickets.length;
            document.getElementById('total-tickets-banner').classList.remove('hidden');
            
            // � Mostrar botón de reparación si hay tickets huérfanos (sin prefix ni artistName)
            const orphanCount = tickets.filter(t => !t.prefix && !t.artistName).length;
            if (orphanCount > 0) {
                const repairBtn = document.getElementById('repair-orphan-btn');
                repairBtn.classList.remove('hidden');
                repairBtn.textContent = `🔧 Reparar ${orphanCount} Entradas Sin Artista`;
            }

            // �🔄 NUEVA LÓGICA: Agrupar por PERSONA (artistName o prefix como fallback)
            const personData = tickets.reduce((acc, ticket) => {
                // ✅ ANTES: se ignoraban tickets sin artistName — ahora usamos prefix como fallback
                const rawName = ticket.artistName || ticket.prefix || 'Sin artista';
                const artistId = ticket.artistId || null;

                // ✅ Clave de agrupación: si tiene artistId lo usamos para agrupar sin importar el nombre
                // Si no, normalizamos el nombre
                const groupKey = artistId || (rawName).toLowerCase().trim();
                
                if (!acc[groupKey]) {
                    acc[groupKey] = { 
                        count: 0, 
                        displayName: rawName.trim(),
                        prefixes: [],
                        prefixCounts: {},
                        artistId: artistId,
                        hasPrev: false  // tiene tickets de preventa (prefix PREV_)
                    };
                }
                
                acc[groupKey].count++;
                
                // Actualizar displayName si llega uno con artistName explícito
                if (ticket.artistName && acc[groupKey].displayName === ticket.prefix) {
                    acc[groupKey].displayName = ticket.artistName;
                }
                
                // Agregar prefix si no está ya en el array
                if (ticket.prefix && !acc[groupKey].prefixes.includes(ticket.prefix)) {
                    acc[groupKey].prefixes.push(ticket.prefix);
                }
                
                // Contar tickets por prefix
                if (ticket.prefix) {
                    acc[groupKey].prefixCounts[ticket.prefix] = (acc[groupKey].prefixCounts[ticket.prefix] || 0) + 1;
                }

                // Marcar si tiene preventa
                if (ticket.prefix && ticket.prefix.startsWith('PREV_')) {
                    acc[groupKey].hasPrev = true;
                }
                
                return acc;
            }, {});

            // 🔀 Consolidar grupos con el mismo displayName (ej: "Dario" con artistId Y "Dario" sin artistId)
            const mergedData = {};
            for (const [key, data] of Object.entries(personData)) {
                const mergeKey = data.displayName.toLowerCase().trim();
                if (mergedData[mergeKey]) {
                    // Unir al grupo existente
                    mergedData[mergeKey].count += data.count;
                    for (const p of data.prefixes) {
                        if (!mergedData[mergeKey].prefixes.includes(p)) {
                            mergedData[mergeKey].prefixes.push(p);
                        }
                    }
                    // Unir conteos por prefix
                    for (const [p, cnt] of Object.entries(data.prefixCounts || {})) {
                        mergedData[mergeKey].prefixCounts[p] = (mergedData[mergeKey].prefixCounts[p] || 0) + cnt;
                    }
                    mergedData[mergeKey].hasPrev = mergedData[mergeKey].hasPrev || data.hasPrev;
                    if (!mergedData[mergeKey].artistId && data.artistId) {
                        mergedData[mergeKey].artistId = data.artistId;
                    }
                } else {
                    mergedData[mergeKey] = { ...data };
                }
            }

            const artistNames = Object.keys(mergedData).sort((a, b) => {
                const na = mergedData[a].displayName.toLowerCase();
                const nb = mergedData[b].displayName.toLowerCase();
                return na.localeCompare(nb);
            });
            ui.artistsListDiv.innerHTML = '';
            
            artistNames.forEach(groupKey => {
                const { count, displayName, prefixes, prefixCounts, hasPrev } = mergedData[groupKey];
                const primaryPrefix = prefixes[0] || ''; // Usar el primer prefix como principal
                
                // Badge de tipo de entrada
                const typeBadge = hasPrev 
                    ? `<span class="text-xs text-blue-300">🎟️ Preventa</span>` 
                    : `<span class="text-xs text-gray-500">Código: ${primaryPrefix}</span>`;
                
                const card = document.createElement('div');
                card.className = 'artist-card';
                
                // Link de ver QRs: si tiene artistId usar ese, si no usar prefix
                const qrHref = prefixes.length > 1
                    ? `visor_qr_compartido.html?eventId=${eventId}&artists=${prefixes.map(p => encodeURIComponent(p)).join(',')}`
                    : `visor_qr_compartido.html?eventId=${eventId}&artist=${encodeURIComponent(primaryPrefix)}`;

                // Desglose de entradas por compra
                let countDisplay;
                if (prefixes.length > 1 && prefixCounts) {
                    const breakdown = prefixes.map(p => prefixCounts[p] || '?').join(' + ');
                    countDisplay = `<p class="text-xs text-amber-400">🔗 ${prefixes.length} compras agrupadas</p><p class="text-sm text-gray-300">${breakdown} = <strong>${count}</strong> entrada(s)</p>`;
                } else {
                    countDisplay = `${typeBadge}<p class="text-sm text-gray-400">${count} entrada(s) total</p>`;
                }

                card.innerHTML = `
                    <a href="${qrHref}" class="flex-grow">
                        <h3 class="text-xl font-bold text-sky-400">${displayName}</h3>
                        ${countDisplay}
                    </a>
                    <div class="flex space-x-1">
                        <button data-prefixes='${JSON.stringify(prefixes)}' data-artist-name="${displayName}" class="view-detailed-btn px-2 py-1.5 bg-green-600 text-white font-medium rounded text-xs hover:bg-green-700">👥 Ver Invitados</button>
                        <button data-prefix="${primaryPrefix}" data-artist-name="${displayName}" class="add-more-btn px-2 py-1.5 bg-blue-600 text-white font-medium rounded text-xs hover:bg-blue-700">+ Más</button>
                        <button data-prefixes='${JSON.stringify(prefixes)}' data-artist-name="${displayName}" class="rename-artist-btn px-2 py-1.5 bg-amber-500 text-white font-medium rounded text-xs hover:bg-amber-600">✏️</button>
                        <button data-prefixes='${JSON.stringify(prefixes)}' data-artist-name="${displayName}" class="share-artist-btn px-2 py-1.5 bg-purple-600 text-white font-medium rounded text-xs hover:bg-purple-700">Compartir</button>
                        <button data-prefixes='${JSON.stringify(prefixes)}' data-artist-name="${displayName}" class="delete-artist-tickets-btn px-2 py-1.5 bg-red-600 text-white font-medium rounded text-xs hover:bg-red-700">Borrar</button>
                    </div>`;
                ui.artistsListDiv.appendChild(card);
            });
        }
        
        ui.artistsListDiv.addEventListener('click', async (e) => {
            const target = e.target;
            
            if (target.classList.contains('rename-artist-btn')) {
                _renamePrefixes = JSON.parse(target.dataset.prefixes);
                ui.renameCurrentName.textContent = target.dataset.artistName;
                ui.renameInput.value = target.dataset.artistName;
                ui.renameModal.classList.remove('hidden');
                setTimeout(() => { ui.renameInput.focus(); ui.renameInput.select(); }, 100);
                return;
            }

            if (target.classList.contains('view-detailed-btn')) {
                // 🔄 NUEVO: Si tiene múltiples prefixes, ir al visor que muestra TODOS
                const prefixesJSON = target.dataset.prefixes;
                const prefixes = JSON.parse(prefixesJSON);
                
                if (prefixes.length === 1) {
                    // Solo una compra - ir directo
                    window.location.href = `visor_invitados_detallado.html?eventId=${eventId}&artist=${encodeURIComponent(prefixes[0])}&eventName=${encodeURIComponent(eventName)}`;
                } else {
                    // Múltiples compras - pasar TODOS los prefixes
                    const prefixesParam = prefixes.map(p => encodeURIComponent(p)).join(',');
                    window.location.href = `visor_invitados_detallado.html?eventId=${eventId}&artists=${prefixesParam}&eventName=${encodeURIComponent(eventName)}`;
                }
            }
            
            if (target.classList.contains('add-more-btn')) {
                const prefix = target.dataset.prefix;
                // Redirigir al generador con datos pre-cargados
                const generatorUrl = `generador_y_gestion.html?eventId=${eventId}&eventName=${encodeURIComponent(eventName)}&prefillPrefix=${encodeURIComponent(prefix)}`;
                window.location.href = generatorUrl;
            }
            
            if (target.classList.contains('share-artist-btn')) {
                // 🔄 NUEVO: Si tiene múltiples prefixes, crear link que muestre TODOS
                const prefixesJSON = target.dataset.prefixes;
                const prefixes = JSON.parse(prefixesJSON);
                const artistName = target.dataset.artistName;
                const baseUrl = 'https://vyt-music.web.app';
                
                let shareableLink;
                if (prefixes.length === 1) {
                    shareableLink = `${baseUrl}/visor_qr_compartido.html?eventId=${eventId}&artist=${encodeURIComponent(prefixes[0])}`;
                } else {
                    // Múltiples prefixes - pasar todos separados por coma
                    const prefixesParam = prefixes.map(p => encodeURIComponent(p)).join(',');
                    shareableLink = `${baseUrl}/visor_qr_compartido.html?eventId=${eventId}&artists=${prefixesParam}`;
                }
                
                showShareModal(shareableLink, `Enlace de QR para "${artistName}"${prefixes.length > 1 ? ` (${prefixes.length} compras)` : ''}`);
            }
            
            if (target.classList.contains('delete-artist-tickets-btn')) {
                // 🔄 NUEVO: Borrar TODOS los tickets de TODOS los prefixes de esta persona
                const prefixesJSON = target.dataset.prefixes;
                const prefixes = JSON.parse(prefixesJSON);
                const artistName = target.dataset.artistName;
                
                const confirmMsg = prefixes.length > 1 
                    ? `¿Estás seguro de que quieres borrar TODAS las entradas de "${artistName}"?\n\nEsta persona tiene ${prefixes.length} compras agrupadas. Se borrarán TODAS sus entradas.\n\nEsta acción no se puede deshacer.`
                    : `¿Estás seguro de que quieres borrar TODAS las entradas de "${artistName}"? Esta acción no se puede deshacer.`;
                
                if (confirm(confirmMsg)) {
                    try {
                        const batch = writeBatch(db);
                        let totalDeleted = 0;
                        
                        // Borrar tickets de TODOS los prefixes
                        for (const prefix of prefixes) {
                            const ticketsToDeleteQuery = query(collection(db, `events/${eventId}/tickets`), where("prefix", "==", prefix));
                            const ticketsSnapshot = await getDocs(ticketsToDeleteQuery);
                            
                            ticketsSnapshot.forEach((doc) => {
                                batch.delete(doc.ref);
                                totalDeleted++;
                            });
                        }
                        
                        await batch.commit();
                        
                        alert(`Se han borrado ${totalDeleted} entrada(s) de "${artistName}"${prefixes.length > 1 ? ` (${prefixes.length} compras agrupadas)` : ''}.`);
                        loadArtistsWithTickets(); // Recargar la lista
                        
                    } catch (error) {
                        console.error("Error al borrar entradas:", error);
                        alert('Hubo un error al borrar las entradas. Revisa la consola para más detalles.');
                    }
                }
            }
        });
        
        ui.shareSummaryBtn.addEventListener('click', () => {
            const baseUrl = 'https://vyt-music.web.app';
            const shareableLink = `${baseUrl}/reporte_entradas_publico.html?eventId=${eventId}&eventName=${encodeURIComponent(eventName)}`;
            showShareModal(shareableLink, 'Enlace de Reporte de Entradas');
        });

        // 🔧 REPARAR TICKETS SIN ARTISTA (prefix y artistName vacíos)
        document.getElementById('repair-orphan-btn').addEventListener('click', async () => {
            if (!confirm('⚠️ Esto buscará las entradas sin artista asignado y las reparará usando el número de orden. ¿Continuar?')) return;
            
            try {
                const allTicketsSnap = await getDocs(query(collection(db, `events/${eventId}/tickets`)));
                const orphanDocs = allTicketsSnap.docs.filter(d => {
                    const t = d.data();
                    return !t.prefix && !t.artistName;
                });
                
                if (orphanDocs.length === 0) {
                    alert('✅ No hay entradas sin artista. Todo está en orden.');
                    return;
                }
                
                // Agrupar por orderId para hacer una sola consulta por orden
                const orderMap = {};
                for (const d of orphanDocs) {
                    const t = d.data();
                    if (t.orderId) {
                        if (!orderMap[t.orderId]) orderMap[t.orderId] = [];
                        orderMap[t.orderId].push({ docRef: d.ref, data: t });
                    }
                }
                
                const noOrderIds = orphanDocs.filter(d => !d.data().orderId);
                let repaired = 0;
                let skipped = noOrderIds.length;
                
                const batch = writeBatch(db);
                
                for (const [orderId, tickets] of Object.entries(orderMap)) {
                    let orderSnap;
                    try {
                        orderSnap = await getDoc(doc(db, `ticket_orders_${eventId}`, orderId));
                    } catch(e) { continue; }
                    
                    if (!orderSnap.exists()) { skipped += tickets.length; continue; }
                    
                    const order = orderSnap.data();
                    const prefix = `PREV_${orderId.substring(0, 8).toUpperCase()}`;
                    const artistName = order.artistName || '';
                    const artistId = order.artistId || '';
                    
                    for (const { docRef } of tickets) {
                        batch.update(docRef, { prefix, artistName, artistId });
                        repaired++;
                    }
                }
                
                await batch.commit();
                
                const msg = skipped > 0
                    ? `✅ Se repararon ${repaired} entradas.\n⚠️ ${skipped} entradas no tenían orderId y no pudieron repararse automáticamente.`
                    : `✅ Se repararon ${repaired} entradas correctamente.`;
                alert(msg);
                loadArtistsWithTickets(); // Recargar la lista
                
            } catch (err) {
                console.error('Error reparando tickets:', err);
                alert('❌ Error: ' + err.message);
            }
        });

        loadArtistsWithTickets();
    </script>
</body>
</html>
