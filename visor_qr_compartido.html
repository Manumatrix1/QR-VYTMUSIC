<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYTMUSIC - Entradas Compartidas</title>
    
    <!-- 🌐 META TAGS PARA VISTA PREVIA EN WHATSAPP Y REDES SOCIALES -->
    <meta property="og:title" content="VYTMUSIC - Entradas de Evento">
    <meta property="og:description" content="Accede a tus entradas del evento VYTMUSIC. Escanea tu código QR y disfruta del show.">
    <meta property="og:image" content="https://i.imgur.com/rqkZi9P.png">
    <meta property="og:image:width" content="400">
    <meta property="og:image:height" content="400">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="VYTMUSIC Producciones">
    
    <!-- 🐦 TWITTER CARDS -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="VYTMUSIC - Entradas de Evento">
    <meta name="twitter:description" content="Accede a tus entradas del evento VYTMUSIC. Escanea tu código QR y disfruta del show.">
    <meta name="twitter:image" content="https://i.imgur.com/rqkZi9P.png">
    
    <!-- 📱 WHATSAPP ESPECÍFICO -->
    <meta property="og:url" content="https://vyt-music.web.app/visor_qr_compartido.html">
    <meta name="description" content="VYTMUSIC Producciones - Entradas de evento con código QR">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111827; color: #f9fafb; min-height: 100vh; }
        .hidden { display: none !important; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-top: 4px solid #38bdf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .ticket-card { background-color: #1f2937; color: #f9fafb; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1rem; padding: 1.5rem; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); }
        .qrcode-wrapper { position: relative; width: 100%; max-width: 300px; padding-bottom: 100%; height: 0; background-color: white; border-radius: 0.25rem; overflow: hidden; margin: 0 auto; }
        .qrcode-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .qrcode-container canvas, .qrcode-container img { width: 100% !important; height: 100% !important; object-fit: contain; }
        .qrcode-logo { position: absolute; z-index: 10; width: 20%; height: auto; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background-color: white; padding: 5px; }
        .download-btn { background-color: #38bdf8; transition: background-color 0.3s ease; border: 2px solid #0ea5e9; }
        .download-btn:hover { background-color: #0ea5e9; }
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); z-index: 900; display: flex; justify-content: center; align-items: center; }
        .modal-content { background-color: #1f2937; padding: 1.5rem; border-radius: 0.5rem; max-width: 90%; width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="antialiased">

    <div id="loading-overlay" class="loading-overlay hidden"><div class="spinner"></div></div>
    
    <div class="container mx-auto max-w-7xl p-4 sm:p-6">
        <header class="text-center mb-8">
             <img src="https://i.imgur.com/rqkZi9P.png" alt="VYTMUSIC Logo" class="mx-auto mb-4 bg-white rounded-full" style="max-width: 120px;">
            <p class="text-gray-400 font-semibold tracking-wider">PRODUCCIONES</p>
            <h1 class="text-4xl sm:text-5xl font-bold text-sky-400">VYTMUSIC</h1>
            <h2 id="batch-artist-name-display" class="text-2xl text-white mt-4">Entradas para: Cargando...</h2>
            <p id="batch-show-name-display" class="text-lg text-gray-300 mt-1">Show: Cargando...</p>
        </header>

        <div id="message-container" class="mb-4 max-w-4xl mx-auto"></div>
        
        <div id="controls-container" class="hidden max-w-xl mx-auto mb-8">
             <input type="text" id="ticket-search-input" placeholder="Busca tu entrada por nombre..." class="w-full p-3 rounded-md border border-gray-600 bg-gray-900 text-white focus:outline-none focus:ring-2 focus:ring-sky-500">
        </div>

        <div id="shared-qrs-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </div>

    <script type="module">
        import { db } from './firebase_config.js';
        import { collection, query, where, getDocs, getDocsFromServer } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const state = { 
            allTicketsData: []
        };
        const config = {
            logoUrl: 'https://i.imgur.com/rqkZi9P.png',
            whatsappNumber: '5493417422062'
        };

        const ui = {
            loadingOverlay: document.getElementById('loading-overlay'),
            messageContainer: document.getElementById('message-container'),
            qrsContainer: document.getElementById('shared-qrs-container'),
            showNameDisplay: document.getElementById('batch-show-name-display'),
            artistNameDisplay: document.getElementById('batch-artist-name-display'),
            controlsContainer: document.getElementById('controls-container'),
            ticketSearchInput: document.getElementById('ticket-search-input'),
        };

        function displayMessage(message, type = 'info') {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500 text-black', info: 'bg-sky-500' };
            ui.messageContainer.innerHTML = `<div class="p-4 rounded-md text-white ${colors[type]}">${message}</div>`;
            setTimeout(() => { ui.messageContainer.innerHTML = ''; }, 6000);
        }

        function setLoading(show) {
            ui.loadingOverlay.classList.toggle('hidden', !show);
        }

        function createTicketCard(ticket) {
            const cardWrapper = document.createElement('div');
            cardWrapper.id = `card-${ticket.id}`;
            cardWrapper.className = 'ticket-card';
            
            // AÑADIMOS LA IMAGEN DEL ARTISTA A LA TARJETA SI EXISTE
            const artistImageHTML = ticket.artistPhotoURL
                ? `<img src="${ticket.artistPhotoURL}" alt="Foto del Artista" class="w-32 h-32 rounded-full mx-auto mb-4 object-cover border-4 border-sky-500">`
                : `<img src="${config.logoUrl}" alt="VYTMUSIC Logo" class="w-32 h-32 rounded-full mx-auto mb-4 object-cover bg-white p-2">`;


            const codesContainer = `
                <div class="w-full max-w-[300px] mx-auto">
                    <div class="qrcode-wrapper">
                        <div id="qrcode-${ticket.id}" class="qrcode-container"></div>
                        <img src="${config.logoUrl}" alt="Logo" class="qrcode-logo">
                    </div>
                    <div class="mt-1 p-2 bg-white rounded-md">
                        <svg id="barcode-${ticket.id}" class="w-full"></svg>
                    </div>
                </div>
            `;

            const addressHtml = ticket.showAddress 
                ? `<p class="text-sm text-gray-400">${ticket.showAddress.startsWith('http') ? `<a href="${ticket.showAddress}" target="_blank" class="text-sky-400 hover:underline">Ver en Mapa</a>` : ticket.showAddress}</p>` 
                : '';
            
            const contactHTML = `
                <div class="contact-info mt-4 border-t border-gray-700 pt-4 w-full">
                    <p class="text-xl font-bold text-sky-400">VYT-MUSIC</p>
                    <p class="text-sm text-gray-300">certamen de canto</p>
                    <a href="https://wa.me/${config.whatsappNumber}" target="_blank" class="whatsapp-link text-green-400 mt-2 inline-flex items-center justify-center gap-2 hover:underline">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-whatsapp" viewBox="0 0 16 16"><path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.89 7.89 0 0 0 13.6 2.326zM7.994 14.521a6.57 6.57 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
                        <span>Inscribite aquí</span>
                    </a>
                </div>
            `;

            const ticketNumberHTML = ticket.ticketNumberFormatted 
                ? `<div class="w-full bg-gradient-to-r from-yellow-500 to-amber-500 text-black font-black text-3xl py-2 px-4 rounded-lg mb-3">Entrada Nº ${ticket.ticketNumberFormatted}</div>`
                : '';

            cardWrapper.innerHTML = `
                ${artistImageHTML}
                ${ticketNumberHTML}
                <div class="w-full"><h3 class="text-2xl font-bold text-sky-400">${ticket.name}</h3><p class="text-gray-300">${ticket.seatLocation || 'Ubicación General'}</p></div>
                ${codesContainer}
                <div class="w-full mt-4"><p class="text-lg font-semibold">${ticket.showName}</p><p class="text-md text-gray-400">${ticket.showLocation}</p>${addressHtml}<p class="text-xs text-gray-500 mt-2">ID: ${ticket.id}</p></div>
                ${contactHTML}
                <button class="download-btn w-full mt-4 px-4 py-3 text-white font-bold rounded-lg">Descargar Entrada (PNG)</button>
            `;
            
            ui.qrsContainer.appendChild(cardWrapper);
            
            // 🔧 ESPERAR A QUE EL DOM SE RENDERICE (CRÍTICO EN MÓVIL)
            // Usamos requestAnimationFrame + setTimeout para asegurar renderizado completo
            requestAnimationFrame(() => {
                setTimeout(() => {
                    try {
                        const qrElement = document.getElementById(`qrcode-${ticket.id}`);
                        const barcodeElement = document.getElementById(`barcode-${ticket.id}`);
                        
                        // Validar que los elementos existen
                        if (!qrElement) {
                            console.error(`❌ Elemento QR no encontrado: qrcode-${ticket.id}`);
                            return;
                        }
                        if (!barcodeElement) {
                            console.error(`❌ Elemento barcode no encontrado: barcode-${ticket.id}`);
                            return;
                        }
                        
                        // Validar que las librerías están disponibles
                        if (typeof QRCode === 'undefined') {
                            console.error('❌ Librería QRCode no cargada');
                            qrElement.innerHTML = '<p class="text-red-500 text-xs p-2">QRCode librería no disponible. Recarga la página.</p>';
                            return;
                        }
                        if (typeof JsBarcode === 'undefined') {
                            console.error('❌ Librería JsBarcode no cargada');
                            return;
                        }
                        
                        console.log(`✅ Generando códigos para: ${ticket.id}`);
                        
                        // Generar QR Code
                        // El ticket.id tiene formato: {eventId}_{timestamp}_{random}, extraemos el eventId del propio id
                        const ticketEventId = ticket.id.split('_')[0];
                        new QRCode(qrElement, { 
                            text: `https://vyt-music.web.app/escaner_qr_final.html?ticket=${ticket.id}&eventId=${ticketEventId}`, 
                            width: 256, 
                            height: 256, 
                            correctLevel: QRCode.CorrectLevel.H 
                        });
                        
                        // Generar Barcode
                        JsBarcode(barcodeElement, ticket.id, { 
                            format: "CODE128", 
                            lineColor: "#000", 
                            width: 2, 
                            height: 30, 
                            displayValue: true, 
                            fontSize: 14, 
                            textMargin: 2, 
                            background: "transparent", 
                            margin: 10 
                        });
                        
                        console.log(`✅ Códigos generados OK para: ${ticket.id}`);
                        
                    } catch (error) {
                        console.error(`❌ Error al generar códigos para entrada ${ticket.id}:`, error);
                        console.error(`❌ Stack trace:`, error.stack);
                        // Mostrar mensaje visual con más info
                        const qrElement = document.getElementById(`qrcode-${ticket.id}`);
                        if (qrElement) {
                            qrElement.innerHTML = `<p class="text-red-500 text-xs p-2">Error: ${error.message}. Recarga la página.</p>`;
                        }
                    }
                }, 250); // Aumentado a 250ms para móviles lentos
            });

            cardWrapper.querySelector('.download-btn').addEventListener('click', () => {
                const elementToPrint = document.getElementById(`card-${ticket.id}`);
                const downloadButton = elementToPrint.querySelector('.download-btn');
                const whatsappLink = elementToPrint.querySelector('.whatsapp-link');
                
                downloadButton.style.display = 'none';
                if (whatsappLink) whatsappLink.outerHTML = `<p class="text-green-400 mt-2 font-semibold">Inscripciones: +${config.whatsappNumber}</p>`;

                html2canvas(elementToPrint, { backgroundColor: '#1f2937', useCORS: true }).then(canvas => {
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = `Entrada_VYTMUSIC_${ticket.name.replace(/\s/g, '_')}.png`;
                    link.click();
                    downloadButton.style.display = 'block';
                    const contactInfo = elementToPrint.querySelector('.contact-info');
                    if(contactInfo) contactInfo.innerHTML = contactHTML;
                });
            });
        }
        
        function renderTickets(ticketsToRender) {
            ui.qrsContainer.innerHTML = '';
            if (ticketsToRender.length === 0) {
                ui.qrsContainer.innerHTML = '<p class="text-center text-gray-400 col-span-full">No se encontraron entradas con ese criterio.</p>';
                return;
            }
            ticketsToRender.forEach(ticket => createTicketCard(ticket));
        }

        function filterTickets() {
            const searchTerm = ui.ticketSearchInput.value.toLowerCase().trim();
            if (!searchTerm) {
                renderTickets(state.allTicketsData);
                return;
            }
            const filtered = state.allTicketsData.filter(ticket => 
                (ticket.name && ticket.name.toLowerCase().includes(searchTerm))
            );
            renderTickets(filtered);
        }
        
        // Función para normalizar texto (quitar acentos y convertir a minúsculas)
        function normalizeText(text) {
            if (!text) return '';
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }

        async function loadTickets(eventId, artistPrefixes = null, artistId = null) {
            setLoading(true);
            ui.qrsContainer.innerHTML = ''; 
            
            try {
                const ticketsCollectionRef = collection(db, `events/${eventId}/tickets`);
                
                // 🔧 CRÍTICO: Usar getDocsFromServer para SIEMPRE leer del servidor (no del caché)
                // Esto soluciona el problema en móvil donde enableIndexedDbPersistence devuelve
                // el caché vacío (primera visita) en lugar de esperar la respuesta del servidor.
                const q = query(ticketsCollectionRef);
                let querySnapshot;
                try {
                    querySnapshot = await getDocsFromServer(q);
                } catch (serverErr) {
                    // Si falla el servidor (sin internet), caer a getDocs normal (con caché)
                    console.warn('⚠️ Server fetch fallido, usando caché:', serverErr.message);
                    querySnapshot = await getDocs(q);
                }
                let allTickets = querySnapshot.docs.map(doc => doc.data()).sort((a,b) => (a.name || '').localeCompare(b.name || ''));
                
                // ✅ MODO artistId: filtrar por artistId del artista
                if (artistId) {
                    allTickets = allTickets.filter(t => t.artistId === artistId);
                    const artistName = allTickets.length > 0 ? allTickets[0].artistName : artistId;
                    ui.artistNameDisplay.textContent = `Entradas de: ${artistName} (${allTickets.length} encontradas)`;
                }
                // Si hay filtro de artista(s) por prefix, filtrar localmente SIN distinguir acentos
                else if (artistPrefixes && artistPrefixes.length > 0) {
                    console.log(`🔍 Buscando entradas con prefixes:`, artistPrefixes);
                    
                    // Múltiples estrategias de matching para máxima compatibilidad en móvil
                    const normalizedPrefixes = artistPrefixes.map(p => normalizeText(p));
                    const lowerPrefixes = artistPrefixes.map(p => p.toLowerCase().trim());
                    
                    allTickets = allTickets.filter(ticket => {
                        const p = ticket.prefix || '';
                        // Estrategia 1: normalización completa (quita tildes, lowercase)
                        if (normalizedPrefixes.includes(normalizeText(p))) return true;
                        // Estrategia 2: solo lowercase sin normalize() (fallback para browsers sin soporte)
                        if (lowerPrefixes.includes(p.toLowerCase().trim())) return true;
                        // Estrategia 3: comparar también por artistName (entradas sin prefix)
                        const n = ticket.artistName || '';
                        if (n && normalizedPrefixes.includes(normalizeText(n))) return true;
                        if (n && lowerPrefixes.includes(n.toLowerCase().trim())) return true;
                        return false;
                    });
                    
                    // Usar artistName del ticket si existe, si no usar el prefix como fallback
                    const displayName = (allTickets.length > 0 && allTickets[0].artistName)
                        ? allTickets[0].artistName
                        : decodeURIComponent(artistPrefixes[0]);
                    const groupTag = artistPrefixes.length > 1 ? ` (${artistPrefixes.length} compras agrupadas)` : '';
                    ui.artistNameDisplay.textContent = `Entradas para: ${displayName}${groupTag} (${allTickets.length} encontradas)`;
                } else {
                    ui.artistNameDisplay.textContent = `Todas las Entradas del Evento`;
                }

                state.allTicketsData = allTickets;

                if (state.allTicketsData.length > 0) {
                    ui.showNameDisplay.textContent = `Show: ${state.allTicketsData[0].showName || 'N/A'}`;
                    renderTickets(state.allTicketsData);
                    displayMessage(`${state.allTicketsData.length} entradas cargadas.`, 'success');
                    ui.controlsContainer.classList.remove('hidden');
                } else {
                    displayMessage('No se encontraron entradas con este criterio. Verifica que el nombre del artista sea correcto.', 'warning');
                    ui.showNameDisplay.textContent = 'Show: No disponible';
                    ui.controlsContainer.classList.add('hidden');
                }
            } catch (error) {
                console.error('❌ Error al cargar las entradas:', error);
                displayMessage(`Error al cargar las entradas: ${error.message}`, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        async function startApp() {
            setLoading(true);
            const urlParams = new URLSearchParams(window.location.search);
            
            // 🔄 NUEVO: Soportar múltiples prefixes separados por coma (para personas con varias compras)
            const artistsSingleParam = urlParams.get('artists'); // Nuevo: múltiples prefixes separados por coma
            const artistSingleParam = urlParams.get('artist');   // Antiguo: un solo prefix
            const artistIdParam = urlParams.get('artistId');     // ✅ NUEVO: por artistId directo
            
            let artistPrefixes = null;
            
            if (artistIdParam) {
                // Modo artistId: filtrar por artistId en lugar de prefix
                console.log('🎤 Modo artistId:', artistIdParam);
            } else if (artistsSingleParam) {
                // Múltiples prefixes separados por coma
                artistPrefixes = artistsSingleParam.split(',').map(p => decodeURIComponent(p.trim())).filter(p => p);
                console.log('🔗 Modo múltiples compras:', artistPrefixes);
            } else if (artistSingleParam) {
                // Un solo prefix (modo antiguo)
                artistPrefixes = [artistSingleParam];
                console.log('📋 Modo compra única:', artistPrefixes);
            }
            
            const eventId = urlParams.get('eventId');
            
            if (eventId) {
                await loadTickets(eventId, artistPrefixes, artistIdParam);
            } else {
                displayMessage('Falta el ID del evento en la URL.', 'error');
                setLoading(false);
            }

            ui.ticketSearchInput.addEventListener('input', filterTickets);
        }

        document.addEventListener('DOMContentLoaded', startApp);
    </script>
</body>
</html>
