<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Diagnóstico Generación 13 - VYTMUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK v11.6.1 -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        
        import { app, db } from './firebase_config.js';
        
        window.db = db;
        window.firestoreModules = { collection, getDocs, query, where };
    </script>
    
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .pulse-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .check-item {
            transition: all 0.3s ease;
        }
        .check-item:hover {
            transform: translateX(5px);
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-6">
    
    <!-- Header -->
    <div class="max-w-5xl mx-auto mb-8">
        <div class="bg-gradient-to-r from-purple-600 via-pink-600 to-red-600 rounded-2xl p-6 shadow-2xl">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h1 class="text-4xl font-black text-white mb-2">🔍 Diagnóstico Generación 13</h1>
                    <p class="text-pink-100 text-lg">Verificación Automática de Integridad de Datos</p>
                </div>
                <button onclick="window.history.back()" class="bg-white/20 hover:bg-white/30 text-white font-semibold px-6 py-3 rounded-xl transition-all">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        
        <!-- Estado del Diagnóstico -->
        <div id="statusContainer" class="mb-6 bg-blue-900/50 border-2 border-blue-500 rounded-xl p-6">
            <div class="flex items-center gap-4">
                <div class="pulse-dot">
                    <div class="w-4 h-4 bg-blue-400 rounded-full"></div>
                </div>
                <div>
                    <h3 class="text-white font-bold text-xl">🔄 Iniciando diagnóstico...</h3>
                    <p class="text-blue-200 text-sm mt-1" id="statusText">Conectando a Firebase...</p>
                </div>
            </div>
        </div>

        <!-- Resumen de Verificaciones -->
        <div class="grid md:grid-cols-3 gap-4 mb-8">
            <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-xl p-6 border-2 border-gray-700 text-center">
                <div class="text-4xl mb-2" id="icon-eventos">⏳</div>
                <h3 class="text-gray-400 text-sm uppercase mb-1">Eventos Gen 13</h3>
                <p id="stat-eventos" class="text-white text-3xl font-bold">-</p>
            </div>
            <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-xl p-6 border-2 border-gray-700 text-center">
                <div class="text-4xl mb-2" id="icon-artistas">⏳</div>
                <h3 class="text-gray-400 text-sm uppercase mb-1">Artistas Totales</h3>
                <p id="stat-artistas" class="text-white text-3xl font-bold">-</p>
            </div>
            <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-xl p-6 border-2 border-gray-700 text-center">
                <div class="text-4xl mb-2" id="icon-votos">⏳</div>
                <h3 class="text-gray-400 text-sm uppercase mb-1">Votos Guardados</h3>
                <p id="stat-votos" class="text-white text-3xl font-bold">-</p>
            </div>
        </div>

        <!-- Resultados Detallados -->
        <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-xl p-6 border-2 border-purple-500 shadow-2xl mb-8">
            <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
                <i class="fas fa-clipboard-check"></i> Resultados de Verificación
            </h2>
            <div id="resultsContainer" class="space-y-3">
                <!-- Se llenarán dinámicamente -->
            </div>
        </div>

        <!-- Problemas Encontrados -->
        <div id="problemsSection" class="hidden bg-gradient-to-br from-red-900 to-red-800 rounded-xl p-6 border-2 border-red-500 shadow-2xl mb-8">
            <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
                <i class="fas fa-exclamation-triangle"></i> ⚠️ Problemas Detectados
            </h2>
            <div id="problemsContainer" class="space-y-3">
                <!-- Se llenarán dinámicamente -->
            </div>
        </div>

        <!-- Acciones Rápidas -->
        <div class="bg-gradient-to-br from-green-900 to-green-800 rounded-xl p-6 border-2 border-green-500 shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-4 flex items-center gap-2">
                <i class="fas fa-toolbox"></i> Acciones Rápidas
            </h2>
            <div class="grid md:grid-cols-2 gap-4">
                <button onclick="exportReport()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all">
                    <i class="fas fa-download"></i> Exportar Reporte Completo
                </button>
                <button onclick="location.reload()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-6 rounded-xl transition-all">
                    <i class="fas fa-sync-alt"></i> Volver a Verificar
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        const { collection, getDocs, query, where } = window.firestoreModules;
        
        let diagnosticData = {
            eventos: [],
            artistas: [],
            votos: [],
            problems: [],
            timestamp: new Date().toISOString()
        };

        function updateStatus(text, icon = '🔄') {
            document.getElementById('statusText').textContent = text;
        }

        function addResult(text, type = 'success') {
            const container = document.getElementById('resultsContainer');
            const icons = { success: '✅', warning: '⚠️', error: '❌', info: 'ℹ️' };
            const colors = { 
                success: 'bg-green-900/30 border-green-500/50 text-green-300',
                warning: 'bg-yellow-900/30 border-yellow-500/50 text-yellow-300',
                error: 'bg-red-900/30 border-red-500/50 text-red-300',
                info: 'bg-blue-900/30 border-blue-500/50 text-blue-300'
            };
            
            const div = document.createElement('div');
            div.className = `check-item ${colors[type]} border-l-4 rounded-lg p-4`;
            div.innerHTML = `
                <div class="flex items-start gap-3">
                    <span class="text-2xl">${icons[type]}</span>
                    <p class="flex-1 font-semibold">${text}</p>
                </div>
            `;
            container.appendChild(div);
        }

        function addProblem(title, description, severity = 'high') {
            const container = document.getElementById('problemsContainer');
            const section = document.getElementById('problemsSection');
            section.classList.remove('hidden');
            
            const colors = {
                high: 'bg-red-800/50 border-red-400',
                medium: 'bg-yellow-800/50 border-yellow-400',
                low: 'bg-orange-800/50 border-orange-400'
            };
            
            const div = document.createElement('div');
            div.className = `${colors[severity]} border-l-4 rounded-lg p-4`;
            div.innerHTML = `
                <h4 class="text-white font-bold text-lg mb-2">${title}</h4>
                <p class="text-gray-200">${description}</p>
            `;
            container.appendChild(div);
            
            diagnosticData.problems.push({ title, description, severity });
        }

        async function runDiagnostic() {
            try {
                updateStatus('Paso 1/5: Buscando eventos de Generación 13...');
                
                // 1. Buscar todos los eventos
                const eventsRef = collection(window.db, 'events');
                const eventsSnap = await getDocs(eventsRef);
                
                let gen13Events = [];
                eventsSnap.forEach(doc => {
                    const data = doc.data();
                    const eventName = (data.nombre_evento || data.nombre || '').toLowerCase();
                    const generacion = (data.generacion || '').toLowerCase();
                    
                    // Detectar si es Generación 13
                    if (eventName.includes('generación 13') || 
                        eventName.includes('generacion 13') ||
                        eventName.includes('gen 13') ||
                        generacion.includes('13')) {
                        gen13Events.push({
                            id: doc.id,
                            nombre: data.nombre_evento || data.nombre,
                            generacion: data.generacion,
                            fecha: data.fecha,
                            estado: data.estado
                        });
                    }
                });
                
                diagnosticData.eventos = gen13Events;
                document.getElementById('stat-eventos').textContent = gen13Events.length;
                document.getElementById('icon-eventos').textContent = gen13Events.length > 0 ? '🎭' : '❌';
                
                if (gen13Events.length === 0) {
                    addResult('No se encontraron eventos de Generación 13', 'warning');
                    addProblem(
                        'Sin eventos de Generación 13',
                        'No hay eventos que contengan "Generación 13" en su nombre o campo generacion. Verifica que los eventos estén creados correctamente.',
                        'high'
                    );
                    document.getElementById('statusContainer').className = 'mb-6 bg-yellow-900/50 border-2 border-yellow-500 rounded-xl p-6';
                    updateStatus('⚠️ No se encontraron eventos de Generación 13');
                    return;
                }
                
                addResult(`Se encontraron ${gen13Events.length} evento(s) de Generación 13`, 'success');
                gen13Events.forEach(event => {
                    addResult(`  • ${event.nombre} (${event.estado || 'sin estado'})`, 'info');
                });
                
                // 2. Verificar artistas por cada evento
                updateStatus(`Paso 2/5: Verificando artistas en ${gen13Events.length} evento(s)...`);
                
                let totalArtistas = 0;
                let artistasSinGrupo = 0;
                
                for (const event of gen13Events) {
                    const artistsRef = collection(window.db, `events/${event.id}/artists`);
                    const artistsSnap = await getDocs(artistsRef);
                    
                    artistsSnap.forEach(doc => {
                        const artist = doc.data();
                        totalArtistas++;
                        
                        diagnosticData.artistas.push({
                            id: doc.id,
                            eventId: event.id,
                            eventName: event.nombre,
                            nombre: artist.nombre,
                            grupo: artist.grupo,
                            hasGrupo: !!artist.grupo
                        });
                        
                        if (!artist.grupo) {
                            artistasSinGrupo++;
                            addProblem(
                                `Artista sin grupo: ${artist.nombre}`,
                                `El artista "${artist.nombre}" en el evento "${event.nombre}" NO tiene el campo "grupo" definido. Esto es CRÍTICO para los reportes.`,
                                'high'
                            );
                        }
                    });
                    
                    addResult(`  • Evento "${event.nombre}": ${artistsSnap.size} artistas`, 'info');
                }
                
                document.getElementById('stat-artistas').textContent = totalArtistas;
                document.getElementById('icon-artistas').textContent = artistasSinGrupo === 0 ? '✅' : '⚠️';
                
                if (artistasSinGrupo === 0) {
                    addResult(`✅ PERFECTO: Todos los ${totalArtistas} artistas tienen el campo "grupo" definido`, 'success');
                } else {
                    addResult(`⚠️ PROBLEMA: ${artistasSinGrupo} de ${totalArtistas} artistas NO tienen campo "grupo"`, 'error');
                }
                
                // 3. Verificar votos de jurados
                updateStatus('Paso 3/5: Verificando votos de jurados...');
                
                let totalVotosJurados = 0;
                let votosOrfanos = 0;
                
                for (const event of gen13Events) {
                    // Votos individuales
                    try {
                        const juryVotesRef = collection(window.db, `events/${event.id}/jury_votes`);
                        const juryVotesSnap = await getDocs(juryVotesRef);
                        totalVotosJurados += juryVotesSnap.size;
                        
                        juryVotesSnap.forEach(doc => {
                            const vote = doc.data();
                            diagnosticData.votos.push({
                                type: 'jury_vote',
                                eventId: event.id,
                                artista_id: vote.artista_id,
                                jurado_id: vote.jurado_id
                            });
                            
                            // Verificar si el artista existe
                            const artistExists = diagnosticData.artistas.some(a => 
                                a.id === vote.artista_id && a.eventId === event.id
                            );
                            
                            if (!artistExists) {
                                votosOrfanos++;
                                addProblem(
                                    'Voto a artista inexistente',
                                    `Hay un voto de jurado a artista_id="${vote.artista_id}" que no existe en el evento "${event.nombre}"`,
                                    'medium'
                                );
                            }
                        });
                    } catch (e) {
                        addResult(`  • No hay colección jury_votes para evento "${event.nombre}"`, 'info');
                    }
                    
                    // Evaluaciones completas
                    try {
                        const evaluationsRef = collection(window.db, `events/${event.id}/jury_evaluations`);
                        const evaluationsSnap = await getDocs(evaluationsRef);
                        totalVotosJurados += evaluationsSnap.size;
                        
                        evaluationsSnap.forEach(doc => {
                            const evaluation = doc.data();
                            diagnosticData.votos.push({
                                type: 'jury_evaluation',
                                eventId: event.id,
                                artista_id: evaluation.artista_id,
                                jurado_id: evaluation.jurado_id
                            });
                        });
                        
                        addResult(`  • Evento "${event.nombre}": ${evaluationsSnap.size} evaluaciones de jurados`, 'info');
                    } catch (e) {
                        addResult(`  • No hay colección jury_evaluations para evento "${event.nombre}"`, 'info');
                    }
                }
                
                addResult(`Total de votos/evaluaciones de jurados: ${totalVotosJurados}`, votosOrfanos > 0 ? 'warning' : 'success');
                
                // 4. Verificar votos públicos
                updateStatus('Paso 4/5: Verificando votos del público...');
                
                let totalVotosPublicos = 0;
                
                for (const event of gen13Events) {
                    try {
                        const publicVotesRef = collection(window.db, `events/${event.id}/votes`);
                        const publicVotesSnap = await getDocs(publicVotesRef);
                        totalVotosPublicos += publicVotesSnap.size;
                        
                        addResult(`  • Evento "${event.nombre}": ${publicVotesSnap.size} votos públicos`, 'info');
                        
                        publicVotesSnap.forEach(doc => {
                            diagnosticData.votos.push({
                                type: 'public_vote',
                                eventId: event.id,
                                artista_id: doc.data().artista_id
                            });
                        });
                    } catch (e) {
                        addResult(`  • No hay colección votes para evento "${event.nombre}"`, 'info');
                    }
                }
                
                const totalVotos = totalVotosJurados + totalVotosPublicos;
                document.getElementById('stat-votos').textContent = totalVotos;
                document.getElementById('icon-votos').textContent = totalVotos > 0 ? '🗳️' : '⚠️';
                
                addResult(`Total de votos públicos: ${totalVotosPublicos}`, 'success');
                
                // 5. Verificar entradas vendidas
                updateStatus('Paso 5/5: Verificando entradas vendidas...');
                
                let totalEntradas = 0;
                let totalRecaudado = 0;
                
                for (const event of gen13Events) {
                    try {
                        const ordersRef = collection(window.db, `ticket_orders_${event.id}`);
                        const ordersSnap = await getDocs(ordersRef);
                        
                        let entradasEvento = 0;
                        let recaudadoEvento = 0;
                        
                        ordersSnap.forEach(doc => {
                            const order = doc.data();
                            if (order.estado_pago === 'approved') {
                                entradasEvento += order.cantidad || 0;
                                recaudadoEvento += order.precio_total || 0;
                            }
                        });
                        
                        totalEntradas += entradasEvento;
                        totalRecaudado += recaudadoEvento;
                        
                        addResult(`  • Evento "${event.nombre}": ${entradasEvento} entradas - $${recaudadoEvento.toLocaleString()}`, 'info');
                    } catch (e) {
                        addResult(`  • No hay colección ticket_orders para evento "${event.nombre}"`, 'info');
                    }
                }
                
                addResult(`Total entradas vendidas: ${totalEntradas} - Recaudado: $${totalRecaudado.toLocaleString()}`, 'success');
                
                // RESUMEN FINAL
                updateStatus('✅ Diagnóstico completado');
                document.getElementById('statusContainer').className = diagnosticData.problems.length === 0
                    ? 'mb-6 bg-green-900/50 border-2 border-green-500 rounded-xl p-6'
                    : 'mb-6 bg-yellow-900/50 border-2 border-yellow-500 rounded-xl p-6';
                
                if (diagnosticData.problems.length === 0) {
                    addResult('🎉 ¡TODO PERFECTO! Todos los datos de Generación 13 están correctamente guardados', 'success');
                } else {
                    addResult(`⚠️ Se encontraron ${diagnosticData.problems.length} problema(s) que requieren atención`, 'warning');
                }
                
            } catch (error) {
                console.error('Error en diagnóstico:', error);
                addResult(`❌ Error: ${error.message}`, 'error');
                document.getElementById('statusContainer').className = 'mb-6 bg-red-900/50 border-2 border-red-500 rounded-xl p-6';
                updateStatus('❌ Error durante el diagnóstico');
            }
        }

        window.exportReport = function() {
            const reportText = `
REPORTE DE DIAGNÓSTICO - GENERACIÓN 13
Fecha: ${new Date().toLocaleString('es-ES')}

═══════════════════════════════════════

📊 RESUMEN:
- Eventos encontrados: ${diagnosticData.eventos.length}
- Artistas totales: ${diagnosticData.artistas.length}
- Votos guardados: ${diagnosticData.votos.length}
- Problemas detectados: ${diagnosticData.problems.length}

═══════════════════════════════════════

📋 EVENTOS DE GENERACIÓN 13:
${diagnosticData.eventos.map(e => `  • ${e.nombre} (${e.estado || 'sin estado'})`).join('\n')}

═══════════════════════════════════════

👥 ARTISTAS:
${diagnosticData.artistas.map(a => 
    `  • ${a.nombre} - Evento: ${a.eventName} - Grupo: ${a.grupo || '❌ SIN GRUPO'}`
).join('\n')}

═══════════════════════════════════════

⚠️ PROBLEMAS DETECTADOS:
${diagnosticData.problems.length === 0 
    ? '  ✅ No hay problemas - Todo está perfecto!'
    : diagnosticData.problems.map(p => `  ${p.severity === 'high' ? '🔴' : '🟡'} ${p.title}: ${p.description}`).join('\n')}

═══════════════════════════════════════
`;

            const blob = new Blob([reportText], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Diagnostico_Gen13_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            
            // También exportar JSON
            const jsonBlob = new Blob([JSON.stringify(diagnosticData, null, 2)], { type: 'application/json' });
            const jsonUrl = URL.createObjectURL(jsonBlob);
            const jsonA = document.createElement('a');
            jsonA.href = jsonUrl;
            jsonA.download = `Diagnostico_Gen13_${new Date().toISOString().split('T')[0]}.json`;
            jsonA.click();
            URL.revokeObjectURL(jsonUrl);
        };

        // Iniciar diagnóstico automáticamente
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => runDiagnostic(), 500);
        });
    </script>
</body>
</html>
