<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusionar Artistas Duplicados - VYT MUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 min-h-screen p-8">
    
    <div class="max-w-5xl mx-auto">
        <div class="bg-white/10 backdrop-blur-lg rounded-xl shadow-2xl p-8 border border-white/20">
            <h1 class="text-3xl font-bold text-white mb-2">🔗 Fusionar Artistas Duplicados</h1>
            <p class="text-gray-300 mb-6">Selecciona dos artistas que son la misma persona para fusionar sus datos</p>
            
            <div id="messageContainer" class="mb-6"></div>
            
            <!-- Selector de Grupo/Generación -->
            <div class="mb-6">
                <label class="block text-white font-semibold mb-2">Seleccionar Generación:</label>
                <select id="groupSelector" class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white border-2 border-purple-500">
                    <option value="">Cargando...</option>
                </select>
            </div>
            
            <!-- Artistas Encontrados -->
            <div id="artistsContainer" class="hidden">
                <h2 class="text-xl font-bold text-white mb-4">Artistas en esta generación:</h2>
                <div id="artistsList" class="grid md:grid-cols-2 gap-4 mb-6"></div>
                
                <!-- Botón de Fusión -->
                <div class="bg-yellow-900/30 border-2 border-yellow-500 rounded-lg p-6">
                    <h3 class="text-lg font-bold text-yellow-300 mb-3">Fusionar Seleccionados</h3>
                    <div id="selectedInfo" class="text-gray-300 mb-4">
                        Selecciona 2 artistas para fusionar
                    </div>
                    <button id="mergeBtn" disabled 
                        class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-700 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed">
                        🔗 Fusionar Artistas
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase_config.js';
        import { collection, getDocs, doc, getDoc, updateDoc, deleteDoc, writeBatch, query, where } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        
        let selectedArtists = [];
        let currentGroupId = null;
        let allEvents = [];
        let artistsData = [];

        function displayMessage(message, type = 'success') {
            const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="${colors[type]} text-white p-4 rounded-lg shadow-lg">${message}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 8000);
        }

        // Cargar grupos/generaciones
        async function loadGroups() {
            try {
                const groupsSnap = await getDocs(collection(db, 'event_groups'));
                const groupSelector = document.getElementById('groupSelector');
                groupSelector.innerHTML = '<option value="">Selecciona una generación</option>';
                
                groupsSnap.forEach(doc => {
                    const data = doc.data();
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = data.groupName || doc.id;
                    groupSelector.appendChild(option);
                });
            } catch (error) {
                console.error('Error cargando grupos:', error);
                displayMessage('Error cargando generaciones', 'error');
            }
        }

        // Cargar artistas del grupo seleccionado
        async function loadArtistsFromGroup(groupId) {
            try {
                currentGroupId = groupId;
                artistsData = [];
                
                // Obtener eventos del grupo
                const eventsSnap = await getDocs(query(collection(db, 'events'), where('groupId', '==', groupId)));
                allEvents = [];
                eventsSnap.forEach(doc => {
                    allEvents.push({ id: doc.id, ...doc.data() });
                });
                
                console.log(`📁 Encontrados ${allEvents.length} eventos en el grupo`);
                
                // Cargar artistas de cada evento
                for (const event of allEvents) {
                    const artistsSnap = await getDocs(collection(db, `events/${event.id}/artists`));
                    artistsSnap.forEach(doc => {
                        artistsData.push({
                            id: doc.id,
                            eventId: event.id,
                            eventName: event.name || event.id,
                            ...doc.data()
                        });
                    });
                }
                
                // Consolidar artistas por nombre similar
                const consolidatedArtists = consolidateArtistsByName(artistsData);
                
                displayArtists(consolidatedArtists);
                document.getElementById('artistsContainer').classList.remove('hidden');
                
            } catch (error) {
                console.error('Error cargando artistas:', error);
                displayMessage('Error cargando artistas', 'error');
            }
        }

        // Consolidar artistas que aparecen en múltiples galas
        function consolidateArtistsByName(artists) {
            const consolidated = {};
            
            artists.forEach(artist => {
                const normalizedName = normalizeName(artist.name);
                
                if (!consolidated[normalizedName]) {
                    consolidated[normalizedName] = {
                        displayName: artist.name,
                        normalized: normalizedName,
                        instances: [],
                        totalParticipations: 0,
                        avgScore: 0
                    };
                }
                
                consolidated[normalizedName].instances.push(artist);
                consolidated[normalizedName].totalParticipations++;
                
                // Calcular promedio de puntajes
                const scores = consolidated[normalizedName].instances
                    .map(a => a.finalScore || a.averageScore || 0)
                    .filter(s => s > 0);
                    
                if (scores.length > 0) {
                    consolidated[normalizedName].avgScore = scores.reduce((a, b) => a + b, 0) / scores.length;
                }
            });
            
            return Object.values(consolidated).sort((a, b) => b.avgScore - a.avgScore);
        }

        function normalizeName(name) {
            return name
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9\s]/g, '')
                .trim();
        }

        // Mostrar artistas
        function displayArtists(artists) {
            const container = document.getElementById('artistsList');
            container.innerHTML = '';
            
            artists.forEach(artist => {
                const card = document.createElement('div');
                card.className = 'bg-gray-800/50 border-2 border-gray-700 rounded-lg p-4 cursor-pointer hover:border-purple-500 transition-all';
                card.dataset.normalized = artist.normalized;
                
                const participationText = artist.totalParticipations > 1 
                    ? `${artist.totalParticipations} galas` 
                    : '1 gala';
                
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-2">
                        <h3 class="text-lg font-bold text-white">${artist.displayName}</h3>
                        <span class="text-2xl">⭐</span>
                    </div>
                    <div class="text-sm text-gray-400 mb-2">
                        ${participationText} • Promedio: <span class="text-yellow-400 font-bold">${artist.avgScore.toFixed(1)}</span>
                    </div>
                    <div class="text-xs text-gray-500">
                        ${artist.instances.map(i => i.eventName).join(', ')}
                    </div>
                `;
                
                card.addEventListener('click', () => toggleArtistSelection(artist, card));
                container.appendChild(card);
            });
        }

        // Toggle selección de artista
        function toggleArtistSelection(artist, cardElement) {
            const isSelected = selectedArtists.some(a => a.normalized === artist.normalized);
            
            if (isSelected) {
                // Deseleccionar
                selectedArtists = selectedArtists.filter(a => a.normalized !== artist.normalized);
                cardElement.classList.remove('border-pink-500', 'bg-pink-900/30');
                cardElement.classList.add('border-gray-700');
            } else {
                // Seleccionar (máximo 2)
                if (selectedArtists.length >= 2) {
                    displayMessage('⚠️ Solo puedes seleccionar 2 artistas para fusionar', 'info');
                    return;
                }
                selectedArtists.push(artist);
                cardElement.classList.remove('border-gray-700');
                cardElement.classList.add('border-pink-500', 'bg-pink-900/30');
            }
            
            updateSelectionInfo();
        }

        // Actualizar info de selección
        function updateSelectionInfo() {
            const infoDiv = document.getElementById('selectedInfo');
            const mergeBtn = document.getElementById('mergeBtn');
            
            if (selectedArtists.length === 0) {
                infoDiv.innerHTML = 'Selecciona 2 artistas para fusionar';
                mergeBtn.disabled = true;
            } else if (selectedArtists.length === 1) {
                infoDiv.innerHTML = `✓ Seleccionado: <strong>${selectedArtists[0].displayName}</strong><br>Selecciona otro artista`;
                mergeBtn.disabled = true;
            } else {
                infoDiv.innerHTML = `
                    <div class="bg-yellow-800/50 border border-yellow-600 rounded p-3">
                        <p class="font-bold mb-2">Se fusionarán:</p>
                        <p>1️⃣ ${selectedArtists[0].displayName} (${selectedArtists[0].totalParticipations} gala${selectedArtists[0].totalParticipations > 1 ? 's' : ''})</p>
                        <p>2️⃣ ${selectedArtists[1].displayName} (${selectedArtists[1].totalParticipations} gala${selectedArtists[1].totalParticipations > 1 ? 's' : ''})</p>
                        <p class="text-xs mt-2 text-yellow-200">⚠️ Se mantendrá el nombre del primero y se eliminarán las entradas duplicadas</p>
                    </div>
                `;
                mergeBtn.disabled = false;
            }
        }

        // Fusionar artistas
        async function mergeArtists() {
            if (selectedArtists.length !== 2) return;
            
            const keepArtist = selectedArtists[0];
            const removeArtist = selectedArtists[1];
            
            if (!confirm(`¿Confirmar fusión?\n\nSe mantendrá: ${keepArtist.displayName}\nSe eliminará: ${removeArtist.displayName}\n\nEsta acción NO se puede deshacer.`)) {
                return;
            }
            
            try {
                displayMessage('⏳ Fusionando artistas...', 'info');
                
                // Para cada instancia del artista a eliminar
                for (const instance of removeArtist.instances) {
                    // Buscar si ya existe una instancia del artista a mantener en el mismo evento
                    const existingKeep = keepArtist.instances.find(k => k.eventId === instance.eventId);
                    
                    if (existingKeep) {
                        // Ya existe en este evento, simplemente eliminar el duplicado
                        const docRef = doc(db, `events/${instance.eventId}/artists`, instance.id);
                        await deleteDoc(docRef);
                        console.log(`🗑️ Eliminado duplicado: ${instance.name} de evento ${instance.eventName}`);
                    } else {
                        // No existe en este evento, actualizar el nombre al nombre correcto
                        const docRef = doc(db, `events/${instance.eventId}/artists`, instance.id);
                        await updateDoc(docRef, {
                            name: keepArtist.displayName
                        });
                        console.log(`✏️ Renombrado: ${instance.name} → ${keepArtist.displayName} en evento ${instance.eventName}`);
                    }
                }
                
                displayMessage(`✅ Fusión completada. "${removeArtist.displayName}" ahora es "${keepArtist.displayName}"`, 'success');
                
                // Recargar artistas
                setTimeout(() => {
                    selectedArtists = [];
                    loadArtistsFromGroup(currentGroupId);
                }, 2000);
                
            } catch (error) {
                console.error('Error fusionando artistas:', error);
                displayMessage(`❌ Error: ${error.message}`, 'error');
            }
        }

        // Event listeners
        document.getElementById('groupSelector').addEventListener('change', (e) => {
            const groupId = e.target.value;
            if (groupId) {
                selectedArtists = [];
                loadArtistsFromGroup(groupId);
            } else {
                document.getElementById('artistsContainer').classList.add('hidden');
            }
        });

        document.getElementById('mergeBtn').addEventListener('click', mergeArtists);

        // Inicializar
        loadGroups();
    </script>
</body>
</html>
