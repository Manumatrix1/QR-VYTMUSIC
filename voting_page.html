<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votación VYTMUSIC</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
            color: #f9fafb;
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.3s ease;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #38bdf8;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .artist-card {
            background-color: #1f2937;
            border-radius: 0.75rem; /* rounded-xl */
            padding: 1.5rem; /* p-6 */
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1rem;
            transition: transform 0.2s ease-in-out;
        }
        .artist-card:hover {
            transform: translateY(-5px);
        }
        .artist-image-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #38bdf8; /* border-sky-500 */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .artist-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .vote-button {
            background-color: #22c55e; /* bg-green-500 */
            color: white;
            font-weight: bold;
            padding: 0.75rem 1.5rem; /* py-3 px-6 */
            border-radius: 0.5rem; /* rounded-lg */
            transition: background-color 0.2s;
            width: 100%;
        }
        .vote-button:hover:not(:disabled) {
            background-color: #16a34a; /* hover:bg-green-600 */
        }
        .vote-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Overlays y Modales -->
    <div id="loading-overlay" class="loading-overlay hidden"><div class="spinner"></div></div>
    <div id="message-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[1001] w-11/12 max-w-md"></div>

    <!-- Contenedor Principal -->
    <div class="container mx-auto max-w-4xl p-4 sm:p-6">
        <header class="text-center mb-8">
            <img src="https://i.imgur.com/rqkZi9P.png" alt="VYTMUSIC Logo" class="mx-auto mb-4 bg-white rounded-full" style="max-width: 120px;" onerror="this.onerror=null;this.src='https://placehold.co/120x120/ffffff/000000?text=Logo';">
            <h1 class="text-4xl sm:text-5xl font-bold text-sky-400 mb-2">Votación en Vivo</h1>
            <p class="text-lg text-gray-300">¡Vota por tu artista favorito de VYTMUSIC!</p>
            <p id="voted-status-message" class="mt-4 text-xl font-semibold text-yellow-400 hidden">¡Gracias por tu voto!</p>
        </header>

        <main>
            <div id="artists-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-center text-gray-400 col-span-full">Cargando artistas...</p>
            </div>
        </main>
    </div>

    <script type="module">
        // Importaciones de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, getDoc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        // Eliminada la importación destructurada de Tone.js ya que no es un módulo ES.
        // Tone.js se cargará como una variable global desde el CDN.

        // --- ESTADO Y UI GLOBALES ---
        const state = {
            db: null, auth: null, userId: null,
            appId: '', // Se obtendrá de la URL
            artistsData: [],
            hasVoted: false,
            synth: null,
            unsubscribeArtists: null, // Para limpiar el listener de artistas
            unsubscribeUserVote: null // Para limpiar el listener de voto de usuario
        };
        const ui = {};

        // --- FUNCIONES DE LA INTERFAZ DE USUARIO (UI) ---
        function cacheUIElements() {
            const ids = [
                'loading-overlay', 'message-container', 'artists-list-container', 'voted-status-message'
            ];
            ids.forEach(id => {
                const camelCaseId = id.replace(/-(\w)/g, (_, c) => c.toUpperCase());
                ui[camelCaseId] = document.getElementById(id);
            });
        }

        function displayMessage(message, type = 'success', duration = 5000) {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500 text-black', info: 'bg-sky-500' };
            const messageDiv = document.createElement('div');
            messageDiv.className = `p-4 rounded-md mb-4 text-white ${colors[type]} transition-opacity duration-300`;
            messageDiv.textContent = message;
            ui.messageContainer.prepend(messageDiv);
            setTimeout(() => { 
                messageDiv.style.opacity = '0';
                setTimeout(() => messageDiv.remove(), 300);
            }, duration);
        }

        function setLoading(show) { ui.loadingOverlay.classList.toggle('hidden', !show); }

        // --- LÓGICA DE FIREBASE ---
        const FirebaseOps = {
            paths: {
                artists: () => collection(state.db, `artifacts/${state.appId}/public/data/artists`),
                artist: (id) => doc(state.db, `artifacts/${state.appId}/public/data/artists`, id),
                // Colección para registrar los votos de cada usuario anónimo
                userVotes: (userId) => collection(state.db, `artifacts/${state.appId}/public/data/user_artist_votes/${userId}/votes`),
                userVote: (userId, artistId) => doc(state.db, `artifacts/${state.appId}/public/data/user_artist_votes/${userId}/votes`, artistId)
            },

            async recordUserVote(artistId) {
                if (!state.userId) {
                    console.error("No hay userId para registrar el voto.");
                    return;
                }
                // Registra que este usuario anónimo ha votado por este artista
                await setDoc(FirebaseOps.paths.userVote(state.userId, artistId), {
                    artistId: artistId,
                    votedAt: new Date().toISOString()
                });
            }
        };

        // --- RENDERIZADO Y VISUALIZACIÓN ---
        function renderArtists(artists) {
            ui.artistsListContainer.innerHTML = '';
            if (!artists || artists.length === 0) {
                ui.artistsListContainer.innerHTML = '<p class="text-center text-gray-400 col-span-full">No hay artistas disponibles para votación.</p>';
                return;
            }

            // Ordenar artistas por votos (descendente) y luego por nombre (ascendente)
            const sortedArtists = [...artists].sort((a, b) => b.votes - a.votes || a.name.localeCompare(b.name));

            sortedArtists.forEach(artist => {
                const artistCard = document.createElement('div');
                artistCard.className = 'artist-card';
                artistCard.innerHTML = `
                    <div class="artist-image-container">
                        <img src="${artist.photoURL || 'https://placehold.co/120x120/1f2937/f9fafb?text=ART'}" alt="${artist.name}" class="artist-image">
                    </div>
                    <h3 class="text-xl font-semibold text-sky-300">${artist.name}</h3>
                    <p class="text-lg font-bold text-green-400">${artist.votes} votos</p>
                    <button data-artist-id="${artist.id}" class="vote-button">Votar</button>
                `;
                ui.artistsListContainer.appendChild(artistCard);
            });

            // Adjuntar event listeners a los botones de votar
            document.querySelectorAll('.vote-button').forEach(button => {
                button.addEventListener('click', handleVote);
                if (state.hasVoted) {
                    button.disabled = true;
                    button.textContent = 'Ya Votaste';
                }
            });
            
            if (state.hasVoted) {
                ui.votedStatusMessage.classList.remove('hidden');
            } else {
                ui.votedStatusMessage.classList.add('hidden');
            }
        }

        async function handleVote(event) {
            if (state.hasVoted) {
                displayMessage('Ya has votado. Solo se permite un voto por persona.', 'warning');
                return;
            }

            const artistId = event.target.dataset.artistId;
            if (!artistId) return;

            setLoading(true);
            try {
                // 1. Actualizar el contador de votos del artista
                await updateDoc(FirebaseOps.paths.artist(artistId), {
                    votes: increment(1)
                });

                // 2. Registrar que este usuario (anónimo) ya votó
                await FirebaseOps.recordUserVote(artistId);

                state.hasVoted = true; // Actualiza el estado local
                displayMessage('¡Voto registrado con éxito! ¡Gracias!', 'success');
                ui.votedStatusMessage.classList.remove('hidden');

                // Deshabilitar todos los botones de votar
                document.querySelectorAll('.vote-button').forEach(button => {
                    button.disabled = true;
                    button.textContent = 'Voto Registrado';
                });

                // Reproducir un sonido de confirmación
                if (state.synth) {
                    Tone.start().then(() => state.synth.triggerAttackRelease("C5", "8n"));
                }

            } catch (error) {
                console.error("Error al registrar el voto:", error);
                displayMessage(`Error al votar: ${error.message}`, 'error');
            } finally {
                setLoading(false);
            }
        }

        async function checkIfUserVoted() {
            if (!state.userId) return; // No se puede verificar si no hay usuario

            try {
                // Intenta obtener el registro de voto para este usuario
                const q = FirebaseOps.paths.userVotes(state.userId);
                // Usar getDocs para obtener documentos de la subcolección
                const querySnapshot = await getDocs(q); 

                if (!querySnapshot.empty) {
                    state.hasVoted = true;
                    ui.votedStatusMessage.classList.remove('hidden');
                    // Deshabilitar todos los botones de votar si ya votó
                    document.querySelectorAll('.vote-button').forEach(button => {
                        button.disabled = true;
                        button.textContent = 'Ya Votaste';
                    });
                } else {
                    state.hasVoted = false;
                    ui.votedStatusMessage.classList.add('hidden');
                }
            } catch (error) {
                console.error("Error al verificar si el usuario ya votó:", error);
                // No mostrar mensaje al usuario, solo loggear el error
            }
        }


        // --- INICIALIZACIÓN DE LA APLICACIÓN ---
        function getAppIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('appId');
        }

        function attachDataListeners() {
            // Listener para artistas (actualizaciones en tiempo real)
            state.unsubscribeArtists = onSnapshot(FirebaseOps.paths.artists(), (snapshot) => {
                state.artistsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderArtists(state.artistsData);
                setLoading(false); // Ocultar spinner una vez que los artistas se cargan
            }, err => {
                console.error("Error en listener de artistas:", err);
                displayMessage('Error al cargar artistas.', 'error');
                setLoading(false);
            });
        }

        async function initApp() {
            cacheUIElements();
            setLoading(true);

            state.appId = getAppIdFromUrl();
            if (!state.appId) {
                displayMessage('Error: ID de aplicación no encontrado en la URL.', 'error');
                setLoading(false);
                return;
            }

            // Configuración de Firebase para el proyecto VYTMUSIC (hardcodeada para la web)
            const firebaseConfig = {
                apiKey: "AIzaSyC_2Ukoxf_ry7QfKtou1Cz6nY-qTVw4qTU",
                authDomain: "vyt-music.firebaseapp.com",
                projectId: "vyt-music",
                storageBucket: "vyt-music.firebasestorage.app",
                messagingSenderId: "574981837817",
                appId: "1:574981837817:web:a29933a22bbfd51a086328",
                measurementId: "G-8QCQF3HWEJ"
            };
            
            const app = initializeApp(firebaseConfig);
            state.db = getFirestore(app);
            state.auth = getAuth(app);
            
            try {
                // Tone.js se inicializa aquí. Ya no se importa como módulo.
                state.synth = new Tone.Synth().toDestination();
            } catch(e) { console.warn("No se pudo inicializar el sintetizador de audio."); }

            // Autenticación anónima para cada votante
            onAuthStateChanged(state.auth, async (user) => {
                if (user) {
                    state.userId = user.uid;
                    console.log("Usuario autenticado anónimamente:", state.userId);
                    // Una vez que el usuario está autenticado, adjuntar listeners de datos
                    attachDataListeners();
                    await checkIfUserVoted(); // Verificar si este usuario anónimo ya votó
                } else {
                    console.log("Intentando iniciar sesión anónimamente...");
                    try {
                        await signInAnonymously(state.auth);
                    } catch (error) {
                        console.error("Error en el inicio de sesión anónimo:", error);
                        displayMessage(`Error de autenticación: ${error.message}`, 'error');
                        setLoading(false);
                    }
                }
            });
        }

        // Iniciar la aplicación cuando la ventana se cargue
        window.onload = initApp;

        // Limpiar listeners al cerrar la página (opcional, pero buena práctica)
        window.addEventListener('beforeunload', () => {
            if (state.unsubscribeArtists) state.unsubscribeArtists();
            if (state.unsubscribeUserVote) state.unsubscribeUserVote();
        });

    </script>
</body>
</html>
