<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votación VYTMUSIC</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
            color: #f9fafb;
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.3s ease;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #38bdf8;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .artist-card {
            background-color: #1f2937;
            border-radius: 0.75rem; /* rounded-xl */
            padding: 1.5rem; /* p-6 */
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1rem;
            transition: transform 0.2s ease-in-out;
        }
        .artist-card:hover {
            transform: translateY(-5px);
        }
        .artist-image-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #38bdf8; /* border-sky-500 */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .artist-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .vote-button {
            background-color: #fcd34d; /* amber-400 */
            color: #111827; /* black text */
            font-weight: bold;
            padding: 0.75rem 1.5rem; /* py-3 px-6 */
            border-radius: 0.5rem; /* rounded-lg */
            transition: background-color 0.2s;
            width: 100%;
            text-transform: uppercase; /* Votar en mayúsculas */
        }
        .vote-button:hover:not(:disabled) {
            background-color: #fbbf24; /* amber-300 */
        }
        .vote-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background-color: #4a5568; /* gray-700 */
            color: #cbd5e0; /* gray-300 */
        }
        .rating-container {
            width: 100%;
            margin-top: 0.5rem;
            text-align: left;
            margin-bottom: 1.5rem; /* Añadido espacio entre secciones de votación */
        }
        .rating-container:last-of-type {
            margin-bottom: 0; /* No añadir margen a la última sección */
        }
        .rating-container label {
            display: block;
            font-size: 0.9rem;
            color: #a0aec0; /* gray-400 */
            margin-bottom: 0.25rem;
            text-align: center; /* Centrar el texto de la etiqueta */
        }
        .stars-and-guidance-group { /* Nuevo contenedor para estrellas y texto guía */
            display: flex;
            flex-direction: column; /* Asegura que se apilen verticalmente */
            align-items: center; /* Centra el grupo de estrellas y texto guía */
        }
        .stars-wrapper {
            display: flex;
            justify-content: center; /* Centra las estrellas dentro de su wrapper */
            gap: 5px; /* Espacio entre cada par estrella-número */
            width: 100%; /* Ocupa todo el ancho disponible */
            max-width: 320px; /* Aumentado el límite para estrellas más grandes y números */
            margin-bottom: 0.25rem; /* mb-0.5 */
        }
        .star-number-pair { /* Contenedor para cada estrella y su número */
            display: flex;
            flex-direction: column; /* Apila la estrella y el número */
            align-items: center; /* Centra el número bajo la estrella */
            cursor: pointer;
            position: relative;
        }
        .stars-wrapper .star-icon {
            width: 30px; /* Tamaño de la estrella más grande */
            height: 30px;
            color: #4a5568; /* grey for unfilled */
            transition: color 0.2s;
            flex-shrink: 0; /* Evita que las estrellas se achiquen */
        }
        .stars-wrapper .star-icon.filled {
            color: #fbbf24; /* amber-400 for golden */
        }
        .star-number { /* Estilo para el número debajo de la estrella */
            font-size: 0.7rem; /* Tamaño de fuente para los números */
            color: #9ca3af; /* Default to gray */
            line-height: 1; /* Altura de línea compacta */
            margin-top: 2px; /* Espacio entre la estrella y el número */
            pointer-events: none; /* Permite que el clic pase a la estrella */
            transition: color 0.2s; /* Smooth transition for number color */
        }
        .star-number.filled-number { /* Clase para números cuando la estrella está llena */
            color: #fbbf24; /* Amarillo/dorado */
        }
        /* Estilos para estrellas deshabilitadas */
        .rating-container[data-disabled="true"] .stars-wrapper .star-icon,
        .rating-container[data-disabled="true"] .stars-wrapper .star-icon.filled {
            color: #4a5568 !important; /* Fuerza el color gris para todas las estrellas */
            cursor: not-allowed;
        }
        .rating-container[data-disabled="true"] .star-number,
        .rating-container[data-disabled="true"] .star-number.filled-number { /* Aplica también a filled-number */
            color: #9ca3af !important; /* Fuerza el color gris para los números cuando está deshabilitado */
        }

        .rating-value {
            font-weight: bold;
            color: #38bdf8; /* sky-400 */
            margin-left: 0.5rem;
        }
        .average-score-display {
            font-size: 1.1rem;
            font-weight: bold;
            color: #60a5fa; /* blue-400 */
            margin-top: 0.5rem; /* Espacio para los promedios */
        }
        .guidance-text {
            font-size: 0.75rem; /* text-xs */
            color: #9ca3af; /* gray-400 */
            font-style: italic; /* italic */
            margin-top: 0.5rem; /* Ajustado para estar debajo de los números */
            line-height: normal; /* Asegura la altura de línea normal */
            text-align: center; /* Centra el texto guía */
            width: 100%; /* Ocupa todo el ancho disponible */
        }
        /* Eliminado el estilo .gpt-recommendation ya que se elimina el div completo */
    </style>
</head>
<body class="antialiased">

    <!-- Overlays y Modales -->
    <div id="loading-overlay" class="loading-overlay hidden"><div class="spinner"></div></div>
    <div id="message-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[1001] w-11/12 max-w-md"></div>

    <!-- Contenedor Principal -->
    <div class="container mx-auto max-w-4xl p-4 sm:p-6">
        <header class="text-center mb-8">
            <img src="https://i.imgur.com/rqkZi9P.png" alt="VYTMUSIC Logo" class="mx-auto mb-4 bg-white rounded-full" style="max-width: 120px;" onerror="this.onerror=null;this.src='https://placehold.co/120x120/ffffff/000000?text=Logo';">
            <h1 class="text-4xl sm:text-5xl font-bold text-sky-400 mb-2">Votación en Vivo</h1>
            <p class="text-lg text-gray-300">¡Vota por tu artista favorito de VYTMUSIC!</p>
            <p id="voted-status-message" class="mt-4 text-xl font-semibold text-yellow-400 hidden">¡Gracias por tu voto!</p>
        </header>

        <main>
            <div id="artists-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-center text-gray-400 col-span-full">Cargando artistas...</p>
            </div>
        </main>
        
        <!-- SECCIÓN DE RECOMENDACIÓN DE GTP ELIMINADA -->
    </div>

    <script type="module">
        // Importaciones de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        // Se añadió 'getDocs' a la importación de firestore
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, getDoc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        // Tone.js se cargará como una variable global desde el CDN.

        // --- ESTADO Y UI GLOBALES ---
        const state = {
            db: null, auth: null, userId: null,
            appId: '', // Se obtendrá de la URL
            artistsData: [],
            votedArtistsByUser: new Set(), // Cambiado a un Set para rastrear artistas votados por el usuario
            synth: null,
            unsubscribeArtists: null, // Para limpiar el listener de artistas
            unsubscribeUserVote: null // Para limpiar el listener de voto de usuario
        };
        const ui = {};

        // --- FUNCIONES DE LA INTERFAZ DE USUARIO (UI) ---
        function cacheUIElements() {
            const ids = [
                'loading-overlay', 'message-container', 'artists-list-container', 'voted-status-message'
            ];
            ids.forEach(id => {
                const camelCaseId = id.replace(/-(\w)/g, (_, c) => c.toUpperCase());
                ui[camelCaseId] = document.getElementById(id);
            });
        }

        function displayMessage(message, type = 'success', duration = 5000) {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500 text-black', info: 'bg-sky-500' };
            const messageDiv = document.createElement('div');
            messageDiv.className = `p-4 rounded-md mb-4 text-white ${colors[type]} transition-opacity duration-300`;
            messageDiv.textContent = message;
            ui.messageContainer.prepend(messageDiv);
            setTimeout(() => { 
                messageDiv.style.opacity = '0';
                setTimeout(() => messageDiv.remove(), 300);
            }, duration);
        }

        function setLoading(show) { ui.loadingOverlay.classList.toggle('hidden', !show); }

        // --- LÓGICA DE FIREBASE ---
        const FirebaseOps = {
            paths: {
                artists: () => collection(state.db, `artifacts/${state.appId}/public/data/artists`),
                artist: (id) => doc(state.db, `artifacts/${state.appId}/public/data/artists`, id),
                // Colección para registrar los votos de cada usuario anónimo
                userVotes: (userId) => collection(state.db, `artifacts/${state.appId}/public/data/user_artist_votes/${userId}/votes`),
                userVote: (userId, artistId) => doc(state.db, `artifacts/${state.appId}/public/data/user_artist_votes/${userId}/votes`, artistId)
            },

            async recordUserVote(artistId) {
                if (!state.userId) {
                    console.error("No hay userId para registrar el voto.");
                    return;
                }
                // Registra que este usuario anónimo ha votado por este artista
                await setDoc(FirebaseOps.paths.userVote(state.userId, artistId), {
                    artistId: artistId,
                    votedAt: new Date().toISOString()
                });
            }
        };

        // Función para actualizar la visualización de las estrellas
        function updateStarVisuals(starContainer, value) {
            const starPairs = starContainer.querySelectorAll('.star-number-pair');
            starPairs.forEach((pair, index) => {
                const star = pair.querySelector('.star-icon');
                const number = pair.querySelector('.star-number');
                if (index < value) {
                    star.classList.add('filled');
                    number.classList.add('filled-number');
                } else {
                    star.classList.remove('filled');
                    number.classList.remove('filled-number');
                }
            });
            starContainer.closest('.rating-container').querySelector('.rating-value').textContent = value;
        }

        // --- RENDERIZADO Y VISUALIZACIÓN ---
        function renderArtists(artists) {
            ui.artistsListContainer.innerHTML = '';
            if (!artists || artists.length === 0) {
                ui.artistsListContainer.innerHTML = '<p class="text-center text-gray-400 col-span-full">No hay artistas disponibles para votación.</p>';
                return;
            }

            // Ordenar artistas por un promedio de votos si es posible, o por nombre
            const sortedArtists = [...artists].sort((a, b) => {
                const avgA = a.totalRatingsCount > 0 ? (a.totalSingingScore + a.totalTransmissionScore + a.totalAttitudeScore + a.totalOriginalityScore) / (a.totalRatingsCount * 4) : 0;
                const avgB = b.totalSingingScore > 0 ? (b.totalSingingScore + b.totalTransmissionScore + b.totalAttitudeScore + b.totalOriginalityScore) / (b.totalRatingsCount * 4) : 0;
                return avgB - avgA || a.name.localeCompare(b.name);
            });

            sortedArtists.forEach(artist => {
                const hasVotedForThisArtist = state.votedArtistsByUser.has(artist.id);
                const buttonText = hasVotedForThisArtist ? 'VOTO REGISTRADO' : 'VOTAR';
                const buttonDisabled = hasVotedForThisArtist ? 'disabled' : '';
                const buttonClasses = hasVotedForThisArtist 
                    ? 'bg-gray-600 cursor-not-allowed text-gray-300' 
                    : 'bg-yellow-400 hover:bg-yellow-300 text-black'; // Estilo de botón amarillo/negro

                const artistCard = document.createElement('div');
                artistCard.className = 'artist-card';
                artistCard.innerHTML = `
                    <div class="artist-image-container">
                        <img src="${artist.photoURL || 'https://placehold.co/120x120/1f2937/f9fafb?text=ART'}" alt="${artist.name}" class="artist-image">
                    </div>
                    <h3 class="text-xl font-semibold text-sky-300">${artist.name}</h3>
                    <p class="text-md text-gray-400 mt-1">${artist.totalRatingsCount > 0 ? `${artist.totalRatingsCount} voto(s)` : 'Sin votos'}</p>
                    
                    <div class="w-full text-left mt-2">
                        <h4 class="text-md font-semibold text-gray-300 mb-2 text-center">🌟 VOTACIÓN DEL PÚBLICO:</h4>
                        
                        <div class="rating-container" data-rating-type="singing" data-current-value="5" data-disabled="${hasVotedForThisArtist}">
                            <label class="text-center w-full">🎤 ¿Te gustó cómo cantó? <span class="rating-value">5</span></label>
                            <div class="stars-and-guidance-group">
                                <div class="stars-wrapper" id="singing-stars-${artist.id}">
                                    <!-- Stars will be generated here by JS -->
                                </div>
                                <p class="guidance-text w-full text-center">1️⃣ No me gustó | 5️⃣ Estuvo bien | � ¡Me encantó!</p>
                            </div>
                        </div>
                        
                        <div class="rating-container" data-rating-type="transmission" data-current-value="5" data-disabled="${hasVotedForThisArtist}">
                            <label class="text-center w-full">💓 ¿Te llegó lo que transmitió? <span class="rating-value">5</span></label>
                            <div class="stars-and-guidance-group">
                                <div class="stars-wrapper" id="transmission-stars-${artist.id}">
                                    <!-- Stars will be generated here by JS -->
                                </div>
                                <p class="guidance-text w-full text-center">1️⃣ No sentí nada | 5️⃣ Normal | 🔟 ¡Me hizo vibrar!</p>
                            </div>
                        </div>

                        <div class="rating-container" data-rating-type="attitude" data-current-value="5" data-disabled="${hasVotedForThisArtist}">
                            <label class="text-center w-full">🔥 ¿Tuvo actitud y presencia? <span class="rating-value">5</span></label>
                            <div class="stars-and-guidance-group">
                                <div class="stars-wrapper" id="attitude-stars-${artist.id}">
                                    <!-- Stars will be generated here by JS -->
                                </div>
                                <p class="guidance-text w-full text-center">1️⃣ Muy apagado | 5️⃣ Bien | 🔟 ¡Un/a artista con todo!</p>
                            </div>
                        </div>

                        <div class="rating-container" data-rating-type="originality" data-current-value="5" data-disabled="${hasVotedForThisArtist}">
                            <label class="text-center w-full">🌈 ¿Te pareció diferente y original? <span class="rating-value">5</span></label>
                            <div class="stars-and-guidance-group">
                                <div class="stars-wrapper" id="originality-stars-${artist.id}">
                                    <!-- Stars will be generated here by JS -->
                                </div>
                                <p class="guidance-text w-full text-center">1️⃣ Fue más de lo mismo | 5️⃣ Algo distinto | 🔟 ¡Tiene su estilo propio!</p>
                            </div>
                        </div>

                        <div class="mt-4 text-center">
                            <p class="text-sm text-gray-400">Promedios actuales:</p>
                            <p class="average-score-display">Canto: ${artist.totalRatingsCount > 0 ? (artist.totalSingingScore / artist.totalRatingsCount).toFixed(1) : 'N/A'} | Transmisión: ${artist.totalRatingsCount > 0 ? (artist.totalTransmissionScore / artist.totalRatingsCount).toFixed(1) : 'N/A'}</p>
                            <p class="average-score-display">Actitud: ${artist.totalRatingsCount > 0 ? (artist.totalAttitudeScore / artist.totalRatingsCount).toFixed(1) : 'N/A'} | Originalidad: ${artist.totalRatingsCount > 0 ? (artist.totalOriginalityScore / artist.totalRatingsCount).toFixed(1) : 'N/A'}</p>
                        </div>
                    </div>
                    
                    <button data-artist-id="${artist.id}" class="send-vote-button vote-button mt-4 ${buttonClasses}" ${buttonDisabled}>${buttonText}</button>
                `;
                ui.artistsListContainer.appendChild(artistCard);

                // Generar estrellas y adjuntar event listeners para cada criterio
                ['singing', 'transmission', 'attitude', 'originality'].forEach(criterion => {
                    const starsWrapper = artistCard.querySelector(`#${criterion}-stars-${artist.id}`);
                    const ratingContainer = starsWrapper.closest('.rating-container');
                    const ratingValueSpan = ratingContainer.querySelector('.rating-value');
                    const isDisabled = ratingContainer.dataset.disabled === 'true';

                    for (let i = 1; i <= 10; i++) {
                        const starNumberPair = document.createElement('div');
                        starNumberPair.className = 'star-number-pair';

                        const star = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        star.setAttribute("class", "star-icon");
                        star.setAttribute("viewBox", "0 0 24 24");
                        star.setAttribute("fill", "currentColor");
                        star.setAttribute("stroke", "currentColor");
                        star.setAttribute("stroke-width", "0");
                        star.setAttribute("stroke-linecap", "round");
                        star.setAttribute("stroke-linejoin", "round");
                        star.innerHTML = '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>';
                        star.dataset.value = i;
                        
                        const starNumber = document.createElement('span');
                        starNumber.className = 'star-number';
                        starNumber.textContent = i;

                        starNumberPair.appendChild(star);
                        starNumberPair.appendChild(starNumber);
                        starsWrapper.appendChild(starNumberPair);

                        if (!isDisabled) { // Solo añadir listeners si no está deshabilitado
                            starNumberPair.addEventListener('click', () => {
                                ratingContainer.dataset.currentValue = i;
                                updateStarVisuals(starsWrapper, i);
                            });

                            starNumberPair.addEventListener('mouseover', () => {
                                updateStarVisuals(starsWrapper, i);
                            });
                        }
                    }
                    if (!isDisabled) { // Solo añadir listener si no está deshabilitado
                        starsWrapper.addEventListener('mouseout', () => {
                            const currentValue = parseInt(ratingContainer.dataset.currentValue || 0);
                            updateStarVisuals(starsWrapper, currentValue);
                        });
                    }

                    // Set initial visual state
                    updateStarVisuals(starsWrapper, parseInt(ratingContainer.dataset.currentValue));
                });
            });
            
            if (state.votedArtistsByUser.size > 0) { // Si el usuario ha votado por al menos un artista
                ui.votedStatusMessage.classList.remove('hidden');
            } else {
                ui.votedStatusMessage.classList.add('hidden');
            }
        }

        async function handleVote(event) {
            const artistId = event.target.dataset.artistId;
            if (!artistId) return;

            if (state.votedArtistsByUser.has(artistId)) {
                displayMessage('Ya has votado por este artista. Solo se permite un voto por artista.', 'warning');
                return;
            }

            setLoading(true);
            try {
                const artistCard = event.target.closest('.artist-card');
                const singingRating = parseInt(artistCard.querySelector('[data-rating-type="singing"]').dataset.currentValue);
                const transmissionRating = parseInt(artistCard.querySelector('[data-rating-type="transmission"]').dataset.currentValue);
                const attitudeRating = parseInt(artistCard.querySelector('[data-rating-type="attitude"]').dataset.currentValue);
                const originalityRating = parseInt(artistCard.querySelector('[data-rating-type="originality"]').dataset.currentValue);

                await updateDoc(FirebaseOps.paths.artist(artistId), {
                    totalSingingScore: increment(singingRating),
                    totalTransmissionScore: increment(transmissionRating),
                    totalAttitudeScore: increment(attitudeRating),
                    totalOriginalityScore: increment(originalityRating),
                    totalRatingsCount: increment(1) // Incrementar el contador de votos totales
                });

                await FirebaseOps.recordUserVote(artistId);

                state.votedArtistsByUser.add(artistId); // Añadir el artista a la lista de votados
                displayMessage('¡Voto registrado con éxito! ¡Gracias!', 'success');
                ui.votedStatusMessage.classList.remove('hidden'); // Mostrar mensaje global de "Gracias por tu voto"

                // Deshabilitar solo los elementos de votación para este artista
                const button = event.target;
                button.disabled = true;
                button.textContent = 'VOTO REGISTRADO';
                button.classList.remove('bg-yellow-400', 'hover:bg-yellow-300', 'text-black');
                button.classList.add('bg-gray-600', 'cursor-not-allowed', 'text-gray-300'); // Ajustar clases para deshabilitado

                artistCard.querySelectorAll('.rating-container').forEach(container => {
                    container.dataset.disabled = 'true'; // Marcar como deshabilitado
                    updateStarVisuals(container.querySelector('.stars-wrapper'), parseInt(container.dataset.currentValue)); // Asegurar que las estrellas se muestren según el valor final
                });

                // Reproducir un sonido de confirmación
                if (state.synth) {
                    Tone.start().then(() => state.synth.triggerAttackRelease("C5", "8n"));
                }

            } catch (error) {
                console.error("Error al registrar el voto:", error);
                displayMessage(`Error al votar: ${error.message}`, 'error');
            } finally {
                setLoading(false);
            }
        }

        async function checkIfUserVoted() {
            if (!state.userId) return;

            try {
                // Obtener todos los votos de este usuario anónimo
                const userVotesCollectionRef = collection(state.db, `artifacts/${state.appId}/public/data/user_artist_votes/${state.userId}/votes`);
                const querySnapshot = await getDocs(userVotesCollectionRef); 

                state.votedArtistsByUser.clear(); // Limpiar antes de rellenar
                querySnapshot.forEach(doc => {
                    state.votedArtistsByUser.add(doc.id); // doc.id es el artistId en este caso
                });

                // Volver a renderizar los artistas para aplicar los estados deshabilitados
                // Esto se hará automáticamente con el listener de artistas, pero lo dejamos aquí como fallback
                // renderArtists(state.artistsData); 
                
                if (state.votedArtistsByUser.size > 0) {
                    ui.votedStatusMessage.classList.remove('hidden');
                } else {
                    ui.votedStatusMessage.classList.add('hidden');
                }

            } catch (error) {
                console.error("Error al verificar si el usuario ya votó:", error);
            }
        }


        // --- INICIALIZACIÓN DE LA APLICACIÓN ---
        function getAppIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('appId');
        }

        function attachDataListeners() {
            state.unsubscribeArtists = onSnapshot(FirebaseOps.paths.artists(), (snapshot) => {
                const artists = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Asegurarse de que el estado de votación del usuario se ha cargado antes de renderizar
                renderArtists(artists); 
                setLoading(false);
            }, err => {
                console.error("Error en listener de artistas:", err);
                displayMessage('Error al cargar artistas.', 'error');
                setLoading(false);
            });
        }
