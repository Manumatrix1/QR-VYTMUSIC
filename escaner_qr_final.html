<html lang="es">
<head>

    <script>

            storageBucket: "vyt-music.firebasestorage.app",

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            margin: 0 auto;
            padding: 20px;
            max-width: 800px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .header h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* BOTÓN DE NAVEGACIÓN ATRÁS */
        .back-button {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            color: white;
            font-size: 20px;
            z-index: 10;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .back-button:hover {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-50%) scale(1.1);
        }

        .back-button:active {
            transform: translateY(-50%) scale(0.95);
            background: rgba(255,255,255,0.4);
        }

        /* RESPONSIVE - MÓVILES */
        @media (max-width: 768px) {
            .back-button {
                width: 45px;
                height: 45px;
                font-size: 18px;
                left: 10px;
            }
            
            .header h1 {
                font-size: 1.5rem;
                padding: 0 60px; /* Espacio para el botón */
            }
        }

        .event-info {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        /* ESCÁNER PANTALLA COMPLETA - ESTILO MERCADO PAGO */
        .scanner-container {
            background: rgba(0,0,0,0.9);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .scanner-container.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            border-radius: 0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.95);
        }

        #qr-reader {
            width: 100%;
            max-width: 500px;
            height: 350px;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
            position: relative;
        }

        .scanner-container.fullscreen #qr-reader {
            width: 90vw;
            height: 60vh;
            max-width: none;
            max-height: 500px;
            border: 3px solid #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        /* OVERLAY DE ESCANEO - ESTILO MERCADO PAGO */
        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        .scanner-overlay::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 2px solid #667eea;
            border-radius: 15px;
            box-shadow: 
                0 0 0 9999px rgba(0,0,0,0.3),
                inset 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .fullscreen .scanner-overlay::before {
            width: 250px;
            height: 250px;
            border-width: 3px;
            animation: scannerPulse 2s infinite;
        }

        @keyframes scannerPulse {
            0%, 100% { 
                border-color: #667eea;
                box-shadow: 
                    0 0 0 9999px rgba(0,0,0,0.3),
                    inset 0 0 20px rgba(102, 126, 234, 0.3);
            }
            50% { 
                border-color: #764ba2;
                box-shadow: 
                    0 0 0 9999px rgba(0,0,0,0.3),
                    inset 0 0 20px rgba(118, 75, 162, 0.3);
            }
        }

        .scanner-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .fullscreen .scanner-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: linear-gradient(45deg, #f44336, #da190b);
            color: white;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #6c757d, #495057);
            color: white;
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-fullscreen {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ESTADÍSTICAS PEQUEÑAS */
        .stats-mini {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-mini {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-mini-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            display: block;
        }

        .stat-mini-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
        }

        /* FILTRO POR ARTISTA */
        .artist-filter {
            background: rgba(255,255,255,0.1);

            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .filter-input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            background: rgba(255,255,255,0.9);

        .filter-input:focus {

            box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
        }

        /* LISTA DE ENTRADAS */
        .entries-container {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .entries-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .entry-item {
            background: rgba(255,255,255,0.9);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .entry-info {
            flex: 1;
        }

        .entry-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .entry-details {
            font-size: 0.9rem;
            color: #666;
        }

        .entry-artist {
            color: #667eea;
            font-weight: 600;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;

            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;

        }

        .status-entered {
            background: #d1fae5;
            color: #065f46;

        .entry-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        /* RESULTADO DEL ESCANEO */
        .scan-result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
        }

        .scan-success {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
            color: #10b981;
        }

        .scan-error {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
            color: #ef4444;
        }

        /* DIÁLOGO DE VALIDACIÓN */
        .validation-dialog {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.3);
            animation: validationPulse 1s ease-out;
        }

        @keyframes validationPulse {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .validation-info h3 {
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .entry-details-validation {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .entry-details-validation p {
            margin: 8px 0;
            color: #fff;
            font-size: 1rem;
        }

        .entry-details-validation strong {
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .validation-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-validation {
            min-width: 160px;
            padding: 15px 25px;
            font-size: 1.1rem;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-validation::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-validation:hover::before {
            left: 100%;
        }

        .btn-validation:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .validation-active {
            animation: validationAlert 0.5s ease-out;
        }

        @keyframes validationAlert {
            0%, 100% { border-color: rgba(255,255,255,0.3); }
            50% { border-color: #10b981; }
        }

        /* CONEXIÓN */
        .connection-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .connection-online { background: #10b981; }
        .connection-offline { background: #ef4444; }

        @media (max-width: 480px) {
            .stats-mini {
                grid-template-columns: 1fr;
            }
            
            .scanner-controls {
                flex-direction: column;
            }
            
            .entry-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .entry-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <button class="back-button" onclick="goBack()" title="Volver atrás">
                ←
            </button>
            <h1>🎵 Escáner de Entradas VYT</h1>
        </div>

        <!-- INFO DEL EVENTO Y CONEXIÓN -->
        <div class="event-info">
            <h3 id="event-name">Cargando evento...</h3>
            <p>👤 <span id="admin-name">Administrador</span></p>
            <div class="connection-indicator">
                <div class="connection-dot" id="connection-dot"></div>
                <span id="connection-text">Verificando conexión...</span>
            </div>
        </div>

        <!-- ESCÁNER QR - ESTILO MERCADO PAGO -->
        <div class="scanner-container" id="scanner-container">
            <h3 style="margin-bottom: 15px; color: white;">📷 Escáner de Códigos QR</h3>
            <div id="qr-reader">
                <div class="scanner-overlay"></div>
            </div>
            <div class="scanner-controls">
                <button id="start-btn" class="btn btn-primary">📷 Iniciar Escáner</button>
                <button id="fullscreen-btn" class="btn btn-fullscreen">🔍 Pantalla Completa</button>
                <button id="stop-btn" class="btn btn-danger" disabled>⏹️ Detener</button>
            </div>
            <div id="scan-result"></div>
            <div id="scanner-help" style="margin-top: 15px; color: rgba(255,255,255,0.8); font-size: 0.9rem; text-align: center;">
                💡 Apunta la cámara al código QR o código de barras
            </div>
        </div>

        <!-- ESTADÍSTICAS PEQUEÑAS -->
        <div class="stats-mini">
            <div class="stat-mini">
                <span class="stat-mini-number" id="entries-generated">0</span>
                <div class="stat-mini-label">Entradas Generadas</div>
            </div>
            <div class="stat-mini">
                <span class="stat-mini-number" id="entries-entered">0</span>
                <div class="stat-mini-label">Ya Ingresaron</div>
            </div>
            <div class="stat-mini">
                <span class="stat-mini-number" id="entries-pending">0</span>
                <div class="stat-mini-label">Faltan Ingresar</div>
            </div>
        </div>

        <!-- BOTONES ADMINISTRATIVOS -->
        <div style="display: flex; gap: 10px; margin: 15px 0; justify-content: center; flex-wrap: wrap;">
            <button id="panel-completo-btn" style="background: #3b82f6; color: white; padding: 8px 16px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold;">
                📊 Panel Completo
            </button>
            <button id="reportes-btn" style="background: #16a34a; color: white; padding: 8px 16px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold;">
                📋 Reportes
            </button>
            <button id="buscador-btn" style="background: #ea580c; color: white; padding: 8px 16px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold;">
                🔍 Buscador
            </button>
        </div>

        <!-- FILTRO POR ARTISTA -->
        <div class="artist-filter">
            <input type="text" id="artist-filter" class="filter-input" 
                   placeholder="🔍 Buscar por artista o invitado (ej: Emilia mostrará todos sus invitados)">
        </div>

        <!-- LISTA DE ENTRADAS DE LA GALA -->
        <div class="entries-container">
            <h3 style="margin-bottom: 15px; color: white;">📋 Invitados de la Gala</h3>
            <div id="entries-list" class="entries-list">
                <div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.7);">
                    Cargando entradas de la gala...
                </div>
            </div>
        </div>
    </div>

    <script>
        class SimpleQRScanner {
            constructor() {
                this.scanner = null;
                this.eventId = null;
                this.eventName = null;
                this.assistantName = null;
                this.assistantCode = null; // Código del asistente
                this.isScanning = false;
                this.isOnline = false;
                this.db = null;
                
                // Variables de validación
                this.isValidating = false;
                this.validationEntry = null;
                
                this.galaEntries = [];
                this.artists = []; // Nueva variable para los artistas
                this.filteredEntries = [];
                
                this.stats = {
                    generated: 0,
                    entered: 0,
                    pending: 0
                };
                
                this.init();
            }

            async init() {
                console.log('🚀 Iniciando Escáner Simple VYT');
                
                // Detectar configuración
                await this.detectEventConfig();
                
                // Inicializar Firebase
                await this.initFirebase();
                
                // Configurar elementos
                this.setupElements();
                
                // Verificar conexión
                await this.checkConnection();
                
                // Cargar entradas de la gala
                await this.loadGalaEntries();
                
                // Iniciar monitoreo
                this.startConnectionMonitoring();
                
                console.log('✅ Sistema listo');
            }

            async detectEventConfig() {
                const urlParams = new URLSearchParams(window.location.search);
                this.eventId = urlParams.get('eventId');
                this.eventName = urlParams.get('eventName');
                const adminParam = urlParams.get('admin');
                const assistantParam = urlParams.get('assistant');
                const assistantCode = urlParams.get('assistantCode');
                
                console.log('🔍 URL actual:', window.location.href);
                console.log('🔍 Configuración detectada:', { 
                    eventId: this.eventId, 
                    eventName: this.eventName, 
                    admin: adminParam,
                    assistant: assistantParam,
                    assistantCode: assistantCode
                });

                // ✅ ADMINISTRADOR desde panel
                if (this.eventId && this.eventName && adminParam === 'true') {
                    this.eventName = decodeURIComponent(this.eventName);
                    this.assistantName = 'Administrador';
                    console.log('✅ Configuración ADMIN desde panel - EventId:', this.eventId);
                    console.log('✅ Event Name decodificado:', this.eventName);
                    return;
                }

                // ✅ ASISTENTE con código válido
                if (this.eventId && this.eventName && assistantParam === 'true' && assistantCode) {
                    this.eventName = decodeURIComponent(this.eventName);
                    this.assistantName = `Asistente (${assistantCode})`;
                    this.assistantCode = assistantCode;
                    console.log('✅ Configuración ASISTENTE - EventId:', this.eventId);
                    console.log('✅ Event Name decodificado:', this.eventName);
                    console.log('✅ Código asistente:', assistantCode);
                    return;
                }

                // Fallbacks - usar los mismos valores que el panel
                console.log('❌ Condición fallida - usando fallbacks');
                console.log('❌ this.eventId:', this.eventId);
                console.log('❌ this.eventName:', this.eventName);
                console.log('❌ adminParam:', adminParam);
                
                this.eventId = localStorage.getItem('currentEvent') || 'G12VYTMUSIC';
                this.eventName = localStorage.getItem('currentEventName') || 'GALA 1 CON PUNTUACIÓN. G12 VYTMUSIC';
                this.assistantName = 'Escáner de Entradas';
                
                console.log('⚠️ Usando fallback - EventId:', this.eventId);
                console.log('📋 Event Name:', this.eventName);
            }

            async initFirebase() {
                try {
                    this.db = firebase.firestore();
                    console.log('✅ Firebase conectado');
                } catch (error) {
                    console.error('❌ Error Firebase:', error);
                }
            }

            setupElements() {
                // Actualizar info del evento
                document.getElementById('event-name').textContent = this.eventName;
                document.getElementById('admin-name').textContent = this.assistantName;

                // Configurar botones
                document.getElementById('start-btn').onclick = () => this.startScanner();
                document.getElementById('fullscreen-btn').onclick = () => this.startScanner(true);
                document.getElementById('stop-btn').onclick = () => this.stopScanner();

                // Configurar filtro por artista
                const artistFilter = document.getElementById('artist-filter');
                if (artistFilter) {
                    artistFilter.oninput = (e) => this.filterByArtist(e.target.value);
                }

                // Configurar botones administrativos
                const panelBtn = document.getElementById('panel-completo-btn');
                const reportesBtn = document.getElementById('reportes-btn');
                const buscadorBtn = document.getElementById('buscador-btn');

                if (panelBtn) {
                    panelBtn.onclick = () => {
                        window.location.href = `panel_evento_SIMPLE.html?eventId=${this.eventId}&eventName=${encodeURIComponent(this.eventName)}`;
                    };
                }

                if (reportesBtn) {
                    reportesBtn.onclick = () => {
                        window.location.href = `centro_reportes_unificado.html?eventId=${this.eventId}&eventName=${encodeURIComponent(this.eventName)}`;
                    };
                }

                if (buscadorBtn) {
                    buscadorBtn.onclick = () => {
                        window.location.href = `buscador_invitados.html?eventId=${this.eventId}&eventName=${encodeURIComponent(this.eventName)}`;
                    };
                }
                
                // El botón de atrás ya está configurado en el HTML con onclick="goBack()"
            }

            async checkConnection() {
                try {
                    if (this.db) {
                        // Verificar conexión real con Firebase
                        const testRef = this.db.collection('eventos').doc('test');

            async startScanner(fullscreen = false) {
                if (this.isScanning) return;

                try {
                    console.log('📷 Iniciando escáner...', { fullscreen });
                    this.isScanning = true;
                    this.isFullscreen = fullscreen;
                    
                    document.getElementById('start-btn').disabled = true;
                    document.getElementById('stop-btn').disabled = false;
                    document.getElementById('fullscreen-btn').disabled = true;

                    // CONFIGURACIÓN MEJORADA - ESTILO MERCADO PAGO
                    const config = {
                        fps: 10, // FPS estable
                        qrbox: fullscreen ? { width: 300, height: 300 } : { width: 250, height: 250 },
                        aspectRatio: 1.0,
                        // CONFIGURACIÓN SIMPLE Y ESTABLE
                        rememberLastUsedCamera: true,
                        showTorchButtonIfSupported: true
                    };

                    // CONFIGURACIÓN SIMPLE DE CÁMARA
                    const cameraConfig = { facingMode: "environment" };

                    this.scanner = new Html5Qrcode("qr-reader");
                    
                    // Si es pantalla completa, cambiar UI
                    if (fullscreen) {
                        this.enterFullscreen();
                    }
                    
                    await this.scanner.start(
                        cameraConfig,
                        config,
                        (decodedText) => this.onScanSuccess(decodedText),
                        (errorMessage) => this.onScanError(errorMessage)
                    );

                    const message = fullscreen ? 
                        '🔍 Escáner en pantalla completa - Apunta al código' : 
                        '✅ Escáner activo - Apunta al código QR';
                    this.showScanResult(message, 'success');

                } catch (error) {
                    console.error('❌ Error al iniciar escáner:', error);
                    this.showScanResult('❌ Error al acceder a la cámara. Verifica los permisos.', 'error');
                    this.resetScannerButtons();
                    this.exitFullscreen();
                }
            }

            async stopScanner() {
                if (!this.isScanning || !this.scanner) return;

                try {
                    await this.scanner.stop();
                    await this.scanner.clear();
                    this.scanner = null;
                    this.isScanning = false;
                    
                    this.resetScannerButtons();
                    this.exitFullscreen();
                    this.showScanResult('⏹️ Escáner detenido', 'success');

                } catch (error) {
                    console.error('❌ Error al detener escáner:', error);
                }
            }

            resetScannerButtons() {
                document.getElementById('start-btn').disabled = false;
                document.getElementById('fullscreen-btn').disabled = false;
                document.getElementById('stop-btn').disabled = true;
            }

            // FUNCIONES DE PANTALLA COMPLETA
            enterFullscreen() {
                const container = document.getElementById('scanner-container');
                container.classList.add('fullscreen');
                document.body.style.overflow = 'hidden';
                
                // Ocultar otros elementos
                const elements = document.querySelectorAll('.stats-mini, .entries-section, .header .event-info');
                elements.forEach(el => el.style.display = 'none');
                
                console.log('🔍 Modo pantalla completa activado');
            }

            exitFullscreen() {
                const container = document.getElementById('scanner-container');
                container.classList.remove('fullscreen');
                document.body.style.overflow = 'auto';
                
                // Mostrar otros elementos
                const elements = document.querySelectorAll('.stats-mini, .entries-section, .header .event-info');
                elements.forEach(el => el.style.display = '');
                
                console.log('📱 Modo normal activado');
            }

            goBack() {
                if (this.isScanning) {
                    this.stopScanner();
                } else if (document.getElementById('scanner-container').classList.contains('fullscreen')) {
                    this.exitFullscreen();
                } else {
                    // Volver al panel principal o cerrar
                    if (window.history.length > 1) {
                        window.history.back();
                    } else {
                        window.close();
                    }
                }
            }

            async onScanSuccess(decodedText) {
                console.log('📱 QR escaneado:', decodedText);
                console.log('🔍 Buscando en', this.galaEntries.length, 'entradas reales...');
                
                // REPRODUCIR SONIDO DE LECTURA
                this.playBeepSound();
                
                try {
                    // Buscar con múltiples criterios para mayor compatibilidad
                    const entry = this.galaEntries.find(e => {
                        const matches = [
                            e.qrCode === decodedText,
                            e.id === decodedText,
                            e.ticketId === decodedText,
                            // Búsqueda parcial para códigos que contengan el texto
                            decodedText.includes(e.id),
                            e.qrCode && decodedText.includes(e.qrCode)
                        ];
                        return matches.some(match => match);
                    });

                    console.log('🎫 Entrada encontrada:', entry ? {
                        id: entry.id,
                        name: entry.guestName,
                        artist: entry.artistName,
                        status: entry.status
                    } : 'NO ENCONTRADA');

                    if (!entry) {
                        this.playErrorSound();
                        this.showScanResult(`❌ Código QR no encontrado en las ${this.galaEntries.length} entradas`, 'error');
                        console.log('🔍 Código buscado:', decodedText);
                        console.log('📋 Primeras 3 entradas disponibles:', this.galaEntries.slice(0, 3).map(e => ({
                            id: e.id,
                            qrCode: e.qrCode,
                            name: e.guestName
                        })));
                        return;
                    }

                    if (entry.status === 'entered') {
                        this.playErrorSound();
                        this.showScanResult(`❌ ${entry.guestName} ya ingresó anteriormente`, 'error');
                        return;
                    }

                    // PARAR EL ESCÁNER Y MOSTRAR BOTÓN DE VALIDACIÓN
                    await this.pauseScannerForValidation(entry);

                } catch (error) {
                    console.error('❌ Error procesando QR:', error);
                    this.playErrorSound();
                    this.showScanResult('❌ Error al procesar el código', 'error');
                }
            }

            // FUNCIONES DE SONIDO
            playBeepSound() {
                try {
                    // Crear tono de confirmación - estilo Mercado Pago
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(800, audioContext.currentTime); // Tono alto
                    oscillator.type = 'square';
                    
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.1);
                    
                    console.log('🔊 Sonido beep reproducido');
                } catch (error) {
                    console.warn('🔇 No se pudo reproducir sonido:', error);
                }
            }

            playErrorSound() {
                try {
                    // Crear tono de error
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(300, audioContext.currentTime); // Tono bajo
                    oscillator.type = 'sawtooth';
                    
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.3);
                    
                    console.log('🔊 Sonido error reproducido');
                } catch (error) {
                    console.warn('🔇 No se pudo reproducir sonido de error:', error);
                }
            }

            playSuccessSound() {
                try {
                    // Crear doble beep de éxito
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Primer beep
                    const osc1 = audioContext.createOscillator();
                    const gain1 = audioContext.createGain();
                    osc1.connect(gain1);
                    gain1.connect(audioContext.destination);
                    osc1.frequency.setValueAtTime(600, audioContext.currentTime);
                    osc1.type = 'sine';
                    gain1.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gain1.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    osc1.start();
                    osc1.stop(audioContext.currentTime + 0.1);
                    
                    // Segundo beep
                    const osc2 = audioContext.createOscillator();
                    const gain2 = audioContext.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioContext.destination);
                    osc2.frequency.setValueAtTime(800, audioContext.currentTime + 0.15);
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.3, audioContext.currentTime + 0.15);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.25);
                    osc2.start(audioContext.currentTime + 0.15);
                    osc2.stop(audioContext.currentTime + 0.25);
                    
                    console.log('🔊 Sonido éxito reproducido');
                } catch (error) {
                    console.warn('🔇 No se pudo reproducir sonido de éxito:', error);
                }
            }

                // Pausar temporalmente el escáner sin detenerlo completamente

            async confirmAccess() {
                if (!this.validationEntry) return;
                
                console.log('✅ Confirmando acceso para:', this.validationEntry.guestName);
                
                // Reproducir sonido de éxito
                this.playSuccessSound();
                
                // Registrar acceso
                await this.recordAccess(this.validationEntry);
                
                // Mostrar resultado
                this.showScanResult(
                    `✅ ACCESO CONFIRMADO: ${this.validationEntry.guestName} (${this.validationEntry.artistName})`, 
                    'success'
                );
                
                // Limpiar validación
                this.clearValidation();
                
                // Continuar escaneando después de 2 segundos
                setTimeout(() => {
                    this.showScanResult('📷 Listo para el siguiente código QR', 'success');
                }, 2000);
            }

            cancelValidation() {
                console.log('❌ Validación cancelada');
                this.clearValidation();
                this.showScanResult('📷 Escaneo cancelado - Listo para continuar', 'success');
            }

            clearValidation() {
                this.validationEntry = null;
                this.isValidating = false;
                document.getElementById('scan-result').className = 'scan-result';
            }

            onScanError(errorMessage) {
                // Ignorar errores menores y no procesar si estamos validando
                if (this.isValidating) return;
                
                if (!errorMessage.includes('NotFoundException')) {
                    console.warn('⚠️ Error escaneo:', errorMessage);
                }
            }

            async recordAccess(entry) {
                const accessTime = new Date().toISOString();
                
                // Actualizar localmente
                entry.status = 'entered';
                entry.accessTime = accessTime;

                // Intentar guardar en Firebase - ESTRUCTURA REAL
                if (this.isOnline && this.db) {
                    try {
                        console.log('💾 Guardando acceso en estructura real:', `events/${this.eventId}/tickets/${entry.id}`);
                        
                        // Actualizar el ticket en la estructura real
                        await this.db
                            .collection('events')
                            .doc(this.eventId)
                            .collection('tickets')
                            .doc(entry.id)
                            .update({
                                used: true,
                                usedAt: accessTime,
                                accessTime: accessTime,
                                scannedBy: this.assistantName,
                                scannedDevice: navigator.userAgent.includes('Mobile') ? 'mobile' : 'desktop'
                            });
                        
                        // Registrar en log de accesos global
                        await this.db.collection('access_log').add({
                            ticketId: entry.id,
                            guestName: entry.guestName,
                            artistName: entry.artistName,
                            eventId: this.eventId,
                            eventName: this.eventName,
                            accessTime: accessTime,
                            scannedBy: this.assistantName,
                            device: navigator.userAgent.includes('Mobile') ? 'mobile' : 'desktop'
                        });

                        console.log('✅ Acceso registrado correctamente en Firebase');
                    } catch (error) {
                        console.error('❌ Error guardando en Firebase:', error);
                        // Guardar localmente para sincronizar después
                        this.saveAccessLocally(entry, accessTime);
                    }
                } else {
                    this.saveAccessLocally(entry, accessTime);
                }

                this.updateStats();
                this.displayEntries();
            }

            saveAccessLocally(entry, accessTime) {
                const localAccesses = JSON.parse(localStorage.getItem(`accesses_${this.eventId}`) || '[]');
                localAccesses.push({
                    entryId: entry.id,
                    guestName: entry.guestName,
                    artistName: entry.artistName,
                    accessTime: accessTime,
                    scannedBy: this.assistantName
                });
                localStorage.setItem(`accesses_${this.eventId}`, JSON.stringify(localAccesses));
                console.log('💾 Acceso guardado localmente');
            }

            filterByArtist(query) {
                if (!query.trim()) {
                    // Sin filtro - mostrar todos los invitados
                    this.filteredEntries = [...this.galaEntries];
                } else {
                    const searchTerm = query.toLowerCase();
                    
                    // Filtrar invitados buscando en TODOS los campos posibles del artista
                    this.filteredEntries = this.galaEntries.filter(entry => {
                        // Buscar en nombre del invitado
                        const guestName = (entry.guestName || entry.name || '').toLowerCase();
                        if (guestName.includes(searchTerm)) return true;
                        
                        // Buscar en TODOS los campos posibles del artista
                        const artistName = (entry.artistName || '').toLowerCase();
                        const artist = (entry.artist || '').toLowerCase();
                        const prefix = (entry.prefix || '').toLowerCase();
                        const invitedBy = (entry.invitedBy || '').toLowerCase();
                        const selectedArtist = (entry.selectedArtist || '').toLowerCase();
                        
                        return artistName.includes(searchTerm) ||
                               artist.includes(searchTerm) ||
                               prefix.includes(searchTerm) ||
                               invitedBy.includes(searchTerm) ||
                               selectedArtist.includes(searchTerm);
                    });
                    
                    console.log(`🔍 Búsqueda "${query}": ${this.filteredEntries.length} resultados encontrados`);
                }
                this.displayEntries();
            }

            displayEntries() {
                const container = document.getElementById('entries-list');
                
                if (this.filteredEntries.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.7);">No se encontraron invitados</div>';

                }

                // Solo mostrar invitados, no artistas separados
                container.innerHTML = this.filteredEntries.map(entry => {
                    // Detectar nombre del artista correctamente
                    const artistName = entry.artistName || 
                                     entry.artist || 
                                     entry.prefix || 
                                     entry.invitedBy ||
                                     entry.selectedArtist ||
                                     'Sin artista';
                    
                    return `
                        <div class="entry-item" style="background: rgba(255,255,255,0.9); border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 8px; padding: 12px;">
                            <div class="entry-info">
                                <div class="entry-name" style="color: #1f2937; font-weight: bold; font-size: 18px;">${entry.guestName || entry.name || 'Sin nombre'}</div>
                                <div class="entry-details" style="margin-top: 4px;">
                                    <div style="color: #3b82f6; font-size: 14px; font-weight: 500;">🎤 ${artistName}</div>
                                    ${entry.phone ? `<div style="color: #6b7280; font-size: 12px;">📱 ${entry.phone}</div>` : ''}
                                    ${entry.accessTime ? `<div style="color: #10b981; font-size: 12px;">✅ ${new Date(entry.accessTime).toLocaleTimeString('es-ES')}</div>` : ''}
                                </div>
                            </div>
                            <div class="entry-actions">
                                <span class="status-badge status-${entry.status}" style="background: ${entry.status === 'entered' ? '#dc2626' : '#16a34a'}; color: white; font-size: 12px; padding: 4px 8px; border-radius: 4px;">
                                    ${entry.status === 'entered' ? 'Ya Ingresó' : 'Pendiente'}
                                </span>
                                ${entry.status === 'pending' ? `
                                    <button class="btn btn-small btn-success" onclick="scanner.allowManualAccess('${entry.id}')" style="background: #3b82f6; color: white; font-size: 12px; margin-top: 4px; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer;">
                                        ✅ Permitir
                                    </button>

            async allowManualAccess(entryId) {
                const entry = this.galaEntries.find(e => e.id === entryId);
                if (!entry || entry.status === 'entered') return;

                await this.recordAccess(entry);
                this.showScanResult(`✅ Acceso manual autorizado: ${entry.guestName}`, 'success');
            }

            updateStats() {
                const total = this.galaEntries.length;
                const entered = this.galaEntries.filter(e => e.status === 'entered').length;
                const pending = total - entered;

                this.stats.generated = total;
                this.stats.entered = entered;
                this.stats.pending = pending;

                // Actualizar estadísticas básicas
                document.getElementById('entries-generated').textContent = total;
                document.getElementById('entries-entered').textContent = entered;
                document.getElementById('entries-pending').textContent = pending;

                // Actualizar títulos con información adicional
                const generatedLabel = document.querySelector('#entries-generated').nextElementSibling;
                const enteredLabel = document.querySelector('#entries-entered').nextElementSibling;
                const pendingLabel = document.querySelector('#entries-pending').nextElementSibling;

                if (generatedLabel) generatedLabel.textContent = `Total Invitados (${this.artists.length} artistas)`;
                if (enteredLabel) enteredLabel.textContent = `Ya Ingresaron (${((entered/total)*100).toFixed(1)}%)`;
                if (pendingLabel) pendingLabel.textContent = `Faltan Ingresar (${((pending/total)*100).toFixed(1)}%)`;

                console.log(`📊 Stats actualizadas: ${entered}/${total} ingresaron (${((entered/total)*100).toFixed(1)}%)`);
            }

            showScanResult(message, type) {
                const container = document.getElementById('scan-result');
                container.innerHTML = `<div class="scan-result scan-${type}">${message}</div>`;
                setTimeout(() => container.innerHTML = '', 4000);
            }

            startConnectionMonitoring() {
                setInterval(async () => {
                    await this.checkConnection();
                }, 30000); // Verificar cada 30 segundos
            }
        }

        // Variable global
        let scanner;

        // Función global para el botón atrás
        function goBack() {
            if (scanner) {
                scanner.goBack();
            }
        }

        // Inicializar cuando carga la página
        document.addEventListener('DOMContentLoaded', () => {
            scanner = new SimpleQRScanner();
            window.scanner = scanner;
        });
    </script>
</body>
</html>
