<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Escáner Rápido - VYTMUSIC</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #000; 
            color: #fff; 
            overflow: hidden;
            height: 100%;
            -webkit-user-select: none;
            user-select: none;
        }
        .hidden { display: none !important; }
        
        /* Contador arriba - MEGA SIMPLE */
        .counter-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            padding: 15px 20px; text-align: center;
            border-bottom: 3px solid #10b981;
            display: flex; align-items: center; justify-content: center;
        }
        
        .back-btn {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            background: rgba(59, 130, 246, 0.3); color: #60a5fa;
            padding: 10px 15px; border: 2px solid #3b82f6; border-radius: 8px;
            font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
            text-decoration: none; font-weight: 700;
        }
        
        .back-btn:hover {
            background: rgba(59, 130, 246, 0.5); transform: translateY(-50%) scale(1.05);
        }
        
        .back-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        .counter-number {
            font-size: 3rem; font-weight: 900; color: #10b981;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
            line-height: 1;
        }
        
        .counter-label {
            font-size: 0.9rem; color: #9ca3af; 
            text-transform: uppercase; margin-top: 5px;
        }
        
        /* Cámara - igual que escaner_qr_final que funciona */
        #qr-reader {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        
        /* Marco de escaneo - ROI 60% CENTRAL (Arquitectura MercadoPago) */
        .scan-frame {
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            width: 60vw; height: 60vw;  /* 🎯 60% CENTRO PRIORITARIO (MercadoPago standard) */
            max-width: 500px; max-height: 500px;
            z-index: 60;
            pointer-events: none;
            animation: scanPulse 2s ease-in-out infinite;
        }
        
        @keyframes scanPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); }
        }
        
        .scan-corner {
            position: absolute; width: 80px; height: 80px;
            border: 8px solid #10b981;  /* ⚡ EXTRA GRUESO */
        }
        .corner-tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .corner-tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
        .corner-bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
        .corner-br { bottom: 0; right: 0; border-left: 0; border-top: 0; }
        
        /* Feedback visual - RÁPIDO */
        .feedback-flash {
            position: fixed; inset: 0; z-index: 200;
            display: flex; align-items: center; justify-content: center;
            animation: flashFade 1s ease-out forwards;
            pointer-events: none;
        }
        
        .flash-success { background: rgba(16, 185, 129, 0.95); }
        .flash-warning { background: rgba(245, 158, 11, 0.95); }
        .flash-error { background: rgba(239, 68, 68, 0.95); }
        
        @keyframes flashFade {
            0% { opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        .feedback-content {
            text-align: center; max-width: 80%;
        }
        
        .feedback-icon { 
            font-size: 5rem; margin-bottom: 1rem; 
            animation: iconPop 0.3s ease-out;
        }
        
        @keyframes iconPop {
            0% { transform: scale(0.5); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .feedback-name { 
            font-size: 2rem; font-weight: 900; 
            margin-bottom: 0.5rem;
        }
        
        .feedback-detail { 
            font-size: 1.2rem; opacity: 0.9; 
        }
        
        /* Botones inferiores */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            padding: 15px; display: flex; gap: 10px;
            border-top: 2px solid #374151;
        }
        
        .btn {
            flex: 1; padding: 18px; border: none; border-radius: 12px;
            font-weight: 900; font-size: 1rem; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase;
        }
        
        .btn:active { transform: scale(0.95); }
        
        .btn-search {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; flex: 2;
        }
        
        .btn-torch {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: 3px solid #fbbf24;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
        }
        
        .btn-torch.active {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.8);
        }
        
        .btn-close {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        /* Modal de búsqueda */
        .search-modal {
            position: fixed; inset: 0; z-index: 300;
            background: rgba(0, 0, 0, 0.95);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        
        .search-content {
            background: #1f2937; border-radius: 20px;
            padding: 30px; width: 100%; max-width: 500px;
            max-height: 80vh; overflow-y: auto;
        }
        
        .search-input {
            width: 100%; padding: 15px; border-radius: 10px;
            border: 2px solid #374151; background: #111827;
            color: white; font-size: 1.1rem; margin-bottom: 15px;
        }
        
        .search-input:focus {
            outline: none; border-color: #3b82f6;
        }
        
        .search-result {
            background: #374151; border-radius: 10px;
            padding: 15px; margin-bottom: 10px;
            cursor: pointer; transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .search-result:hover {
            background: #4b5563; border-color: #3b82f6;
        }
        
        .search-result.used {
            background: #7f1d1d; border-color: #991b1b;
            opacity: 0.6; cursor: not-allowed;
        }
        
        .result-name {
            font-size: 1.2rem; font-weight: 700; margin-bottom: 5px;
        }
        
        .result-number {
            display: inline-block; background: #fbbf24; color: #000;
            padding: 3px 10px; border-radius: 5px; font-weight: 900;
            font-size: 0.9rem; margin-right: 10px;
        }
        
        .result-id {
            font-size: 0.8rem; color: #9ca3af; font-family: monospace;
        }
        
        .no-results {
            text-align: center; padding: 40px 20px; color: #9ca3af;
        }
        
        @media (max-width: 640px) {
            .counter-number { font-size: 2.5rem; }
            .scan-frame { width: 75vw; height: 75vw; }
            .feedback-icon { font-size: 4rem; }
            .feedback-name { font-size: 1.5rem; }
            .feedback-detail { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <!-- Contador superior -->
    <div class="counter-bar">
        <a href="#" id="back-link" class="back-btn">← Volver</a>
        <div>
            <div class="counter-number" id="counter">0</div>
            <div class="counter-label">✅ Ingresaron</div>
        </div>
        <div style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%);">
            <div id="connection-status" style="display: flex; align-items: center; gap: 8px; padding: 10px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; background: rgba(16, 185, 129, 0.3); border: 2px solid #10b981; color: #10b981;">
                🟢 ONLINE
            </div>
        </div>
        <div style="position: absolute; left: 50%; bottom: 2px; transform: translateX(-50%); font-size: 0.6rem; color: rgba(255,255,255,0.4);">v22-MAR-E</div>
    </div>

    <!-- Indicador de estado del scanner -->
    <div id="scan-status" style="display:none; position:fixed; bottom:90px; left:0; right:0; text-align:center; background:rgba(0,0,0,0.8); color:#10b981; font-size:0.75rem; padding:6px; z-index:150; word-break:break-all;"></div>
    <div id="qr-reader"></div>

    <!-- Marco de escaneo -->
    <div class="scan-frame">
        <div class="scan-corner corner-tl"></div>
        <div class="scan-corner corner-tr"></div>
        <div class="scan-corner corner-bl"></div>
        <div class="scan-corner corner-br"></div>
    </div>

    <!-- Botones inferiores -->
    <div class="bottom-bar">
        <button class="btn btn-search" id="btn-search">
            🔍 Buscar
        </button>
        <button class="btn btn-torch hidden" id="btn-torch">
            🔦 Linterna
        </button>
        <button class="btn btn-generate" id="btn-generate" style="background: rgba(234, 88, 12, 0.4); border-color: #ea580c; color: #fdba74;">
            ⚡ Lote
        </button>
        <button class="btn btn-close" id="btn-close">
            ❌
        </button>
    </div>

    <!-- Modal de búsqueda -->
    <div class="search-modal hidden" id="search-modal">
        <div class="search-content">
            <h2 class="text-2xl font-black mb-2 text-center text-blue-400">
                🔍 BÚSQUEDA MANUAL
            </h2>
            <p class="text-sm text-gray-300 mb-4 text-center">
                Buscá por: <strong class="text-yellow-300">N° de entrada</strong>, <strong class="text-yellow-300">Nombre</strong>, <strong class="text-yellow-300">Artista</strong> o <strong class="text-yellow-300">ID</strong>
            </p>
            <div class="mb-3 flex gap-2">
                <button id="filter-all" class="flex-1 px-4 py-2 rounded-lg bg-blue-600 text-white font-bold text-sm">TODOS</button>
                <button id="filter-artist" class="flex-1 px-4 py-2 rounded-lg bg-gray-700 text-gray-300 font-bold text-sm">POR ARTISTA</button>
            </div>
            <input type="text" 
                   class="search-input" 
                   id="search-input"
                   placeholder="Ej: 1, 0045, María López, Artista..."
                   autocomplete="off">
            <div id="search-results"></div>
            <button class="btn btn-close w-full mt-4" id="close-search">
                CERRAR BÚSQUEDA
            </button>
        </div>
    </div>

    <!-- Feedback flash (se crea dinámicamente) -->

    <script type="module">
        import { db } from './firebase_config.js';
        import { collection, getDocs, doc, updateDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Estado
        const state = {
            eventId: null,
            eventName: null,
            scanner: null,
            tickets: new Map(),
            counter: 0,
            isOnline: navigator.onLine,
            syncQueue: [], // Cola de sincronización offline
            unsubscribe: null, // Para detener listener de tiempo real
            torchOn: false, // Estado de la linterna
            searchMode: 'all', // Modo de búsqueda: 'all' o 'artist'
            lastScanTime: 0, // Anti-duplicado ultra-rápido
            processingFrame: false // Evitar procesamiento paralelo
        };

        // UI
        const ui = {
            counter: document.getElementById('counter'),
            qrReader: document.getElementById('qr-reader'),
            btnSearch: document.getElementById('btn-search'),
            btnGenerate: document.getElementById('btn-generate'),
            btnClose: document.getElementById('btn-close'),
            searchModal: document.getElementById('search-modal'),
            searchInput: document.getElementById('search-input'),
            searchResults: document.getElementById('search-results'),
            closeSearch: document.getElementById('close-search'),
            connectionStatus: document.getElementById('connection-status')
        };

        // Actualizar indicador de conexión
        function updateConnectionStatus() {
            if (state.isOnline) {
                ui.connectionStatus.style.background = 'rgba(16, 185, 129, 0.3)';
                ui.connectionStatus.style.borderColor = '#10b981';
                ui.connectionStatus.style.color = '#10b981';
                ui.connectionStatus.innerHTML = '🟢 ONLINE';
            } else {
                ui.connectionStatus.style.background = 'rgba(239, 68, 68, 0.3)';
                ui.connectionStatus.style.borderColor = '#ef4444';
                ui.connectionStatus.style.color = '#ef4444';
                ui.connectionStatus.innerHTML = `🔴 OFFLINE${state.syncQueue.length > 0 ? ` (${state.syncQueue.length} pendientes)` : ''}`;
            }
        }

        // Obtener parámetros
        const params = new URLSearchParams(window.location.search);
        state.eventId = params.get('eventId');
        state.eventName = params.get('eventName');

        if (!state.eventId) {
            alert('❌ No se especificó evento');
            window.location.href = 'eventos.html';
        }

        // Configurar enlace de volver
        document.getElementById('back-link').href = `panel_evento_SIMPLE.html?eventId=${state.eventId}&eventName=${encodeURIComponent(state.eventName || 'Evento')}`;

        // Cargar tickets con TIEMPO REAL y OFFLINE
        async function loadTickets() {
            try {
                // Cargar desde localStorage primero (para modo offline)
                const cached = localStorage.getItem(`tickets_${state.eventId}`);
                if (cached) {
                    const cachedTickets = JSON.parse(cached);
                    cachedTickets.forEach(ticket => {
                        state.tickets.set(ticket.id, ticket);
                    });
                    updateCounter();
                    console.log(`💾 ${state.tickets.size} tickets cargados desde cache`);
                }

                // Listener en TIEMPO REAL (actualiza entre todos los asistentes)
                const ticketsRef = collection(db, `events/${state.eventId}/tickets`);
                state.unsubscribe = onSnapshot(ticketsRef, 
                    (snapshot) => {
                        snapshot.docChanges().forEach(change => {
                            const data = change.doc.data();
                            const ticket = {
                                id: change.doc.id,
                                name: data.name || 'Sin nombre',
                                ticketNumber: data.ticketNumber || null,
                                ticketNumberFormatted: data.ticketNumberFormatted || null,
                                used: data.used || false,
                                ...data
                            };

                            if (change.type === 'added' || change.type === 'modified') {
                                state.tickets.set(ticket.id, ticket);
                            } else if (change.type === 'removed') {
                                state.tickets.delete(ticket.id);
                            }
                        });

                        updateCounter();
                        
                        // Guardar en localStorage
                        localStorage.setItem(`tickets_${state.eventId}`, 
                            JSON.stringify(Array.from(state.tickets.values())));
                        
                        console.log(`🔄 Tickets actualizados en tiempo real: ${state.tickets.size}`);
                    },
                    (error) => {
                        console.warn('⚠️ Error en tiempo real, usando modo offline:', error);
                        state.isOnline = false;
                    }
                );

            } catch (error) {
                console.error('❌ Error cargando tickets:', error);
                state.isOnline = false;
            }
        }

        // Actualizar contador
        function updateCounter() {
            state.counter = Array.from(state.tickets.values()).filter(t => t.used).length;
            ui.counter.textContent = state.counter;
        }

        // 🔊 Sonido de escaneo - PARAMETRIZABLE
        function playBeep(frequency = 800, duration = 100) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = frequency; // Frecuencia ajustable
                oscillator.type = 'sine';
                
                const durationSeconds = duration / 1000;
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + durationSeconds);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + durationSeconds);
            } catch (error) {
                console.log('Audio no disponible:', error);
            }
        }

        // Mostrar feedback - OPTIMIZADO ESTILO MERCADOPAGO
        function showFeedback(type, name, detail) {
            const colors = {
                success: 'flash-success',
                warning: 'flash-warning',
                error: 'flash-error'
            };
            
            const icons = {
                success: '✅',
                warning: '⚠️',
                error: '❌'
            };

            const flash = document.createElement('div');
            flash.className = `feedback-flash ${colors[type]}`;
            flash.innerHTML = `
                <div class="feedback-content">
                    <div class="feedback-icon">${icons[type]}</div>
                    <div class="feedback-name">${name}</div>
                    <div class="feedback-detail">${detail}</div>
                </div>
            `;
            
            document.body.appendChild(flash);
            
            // 🔊 Sonido (diferente por tipo)
            if (type === 'success') {
                playBeep(800, 100);  // Agudo y corto
            } else if (type === 'warning') {
                playBeep(600, 150);  // Medio y un poco más largo
            } else if (type === 'error') {
                playBeep(400, 200);  // Grave y largo
            }
            
            // 📳 Vibración TÁCTIL (estilo MercadoPago)
            if (navigator.vibrate) {
                if (type === 'success') {
                    navigator.vibrate([50, 30, 100]);  // ✅ Doble pulso ascendente
                } else if (type === 'warning') {
                    navigator.vibrate([150, 50, 150]);  // ⚠️ Doble pulso igual
                } else if (type === 'error') {
                    navigator.vibrate([200, 100, 200, 100, 200]);  // ❌ Triple pulso fuerte
                }
            }

            setTimeout(() => flash.remove(), 1000);
        }

        // Procesar escaneo con MODO OFFLINE y validación asíncrona
        async function processTicket(rawText) {
            // Los QR contienen una URL: https://...?ticket=ID&eventId=X
            // Extraer el parámetro "ticket" si existe
            let ticketId = rawText.trim();
            try {
                const url = new URL(rawText);
                const fromUrl = url.searchParams.get('ticket');
                if (fromUrl) ticketId = fromUrl;
            } catch (e) { /* no es URL, usar como está */ }

            const ticket = state.tickets.get(ticketId);

            if (!ticket) {
                showFeedback('error', 'NO ENCONTRADO', 'Código no existe');
                return;
            }

            if (ticket.used) {
                showFeedback('warning', 'YA INGRESÓ', ticket.name);
                return;
            }

            // ✅ Actualizar LOCAL primero (instantáneo)
            ticket.used = true;
            ticket.usedAt = new Date().toISOString();
            state.tickets.set(ticketId, ticket);
            state.counter++;
            ui.counter.textContent = state.counter;
            
            // Guardar en localStorage inmediatamente
            localStorage.setItem(`tickets_${state.eventId}`, 
                JSON.stringify(Array.from(state.tickets.values())));

            showFeedback('success', ticket.name, ticket.ticketNumberFormatted ? `Nº ${ticket.ticketNumberFormatted}` : 'Entrada registrada');

            // ✅ Sincronizar con Firebase (si hay conexión)
            try {
                if (state.isOnline) {
                    const ticketRef = doc(db, `events/${state.eventId}/tickets`, ticketId);
                    await updateDoc(ticketRef, {
                        used: true,
                        usedAt: ticket.usedAt
                    });
                    console.log('🔄 Sincronizado con Firebase');
                } else {
                    // MODO OFFLINE: Agregar a cola de sincronización
                    state.syncQueue.push({
                        ticketId,
                        action: 'markUsed',
                        data: { used: true, usedAt: ticket.usedAt },
                        timestamp: Date.now()
                    });
                    localStorage.setItem(`syncQueue_${state.eventId}`, JSON.stringify(state.syncQueue));
                    console.log(`📴 OFFLINE: Guardado en cola (${state.syncQueue.length} pendientes)`);
                    updateConnectionStatus();
                }
            } catch (error) {
                // Si falla, guardar en cola offline
                state.syncQueue.push({
                    ticketId,
                    action: 'markUsed',
                    data: { used: true, usedAt: ticket.usedAt },
                    timestamp: Date.now()
                });
                localStorage.setItem(`syncQueue_${state.eventId}`, JSON.stringify(state.syncQueue));
                console.warn('⚠️ Error Firebase, guardado offline:', error);
                updateConnectionStatus();
            }
        }

        // Iniciar escáner
        async function startScanner() {
            try {
                state.scanner = new Html5Qrcode("qr-reader");
                
                // Config IDENTICA a escaner_qr_final (confirmado funcionando)
                const config = {
                    fps: 10,
                    qrbox: { width: 300, height: 300 },
                    aspectRatio: 1.0,
                    rememberLastUsedCamera: true,
                    showTorchButtonIfSupported: true
                };

                // Indicador visual de que el scanner está activo
                const scanStatus = document.getElementById('scan-status');
                if (scanStatus) scanStatus.style.display = 'block';
                // Mostrar cuántos tickets están cargados
                const ticketCount = state.tickets.size;
                if (scanStatus) scanStatus.textContent = `📷 ESCANEANDO | ${ticketCount} tickets cargados`;

                await state.scanner.start(
                    { facingMode: "environment" },
                    config,
                    (decodedText) => {
                        // DEBUG: mostrar texto crudo brevemente
                        const scanStatus = document.getElementById('scan-status');
                        if (scanStatus) scanStatus.textContent = `✅ LEÍDO: ${decodedText.substring(0, 40)}...`;

                        // 🎯 ANTI-DUPLICACIÓN (MercadoPago usa cooldown 1500ms)
                        const now = Date.now();
                        if (now - state.lastScanTime < 1500) {
                            console.log('⏭️ Cooldown activo - ignorado');
                            return;
                        }
                        
                        // 🔒 Evitar procesamiento paralelo
                        if (state.processingFrame) {
                            console.log('⚠️ Ya procesando - ignorado');
                            return;
                        }
                        
                        state.lastScanTime = now;
                        state.processingFrame = true;
                        
                        // 🎯 PROCESAMIENTO ASÍNCRONO
                        processTicket(decodedText).finally(() => {
                            state.processingFrame = false;
                        });
                    },
                    (errorMessage) => {
                        // LOG TODOS para diagnóstico (ver si ZXing está corriendo)
                        console.log('🔍 ZXing:', errorMessage.substring(0, 60));
                    }
                );
                
                // 🔦 DETECTAR Y ACTIVAR LINTERNA
                // 🔦 Linterna
                try {
                    const capabilities = state.scanner.getRunningTrackCameraCapabilities();
                    if (capabilities && capabilities.torch) {
                        ui.btnTorch.classList.remove('hidden');
                        console.log('🔦 Linterna disponible');
                    }
                } catch (e) {
                    console.log('⚠️ Linterna no disponible');
                }

                console.log('✅ Scanner iniciado - Arquitectura MercadoPago');
                console.log('  📹 FPS: 30 (estable)');
                console.log('  🎯 ROI: 60% centro prioritario');
                console.log('  ⏱️ Cooldown: 1500ms');
                console.log('  📊 Formatos: QR + 7 códigos de barras');
                console.log('  🔄 Processing: Asíncrono con lock');
            } catch (error) {
                console.error('❌ Error iniciando escáner:', error);
                alert('❌ No se pudo acceder a la cámara');
            }
        }

        // 🔦 TOGGLE LINTERNA
        async function toggleTorch() {
            try {
                state.torchOn = !state.torchOn;
                const track = state.scanner.getRunningTrackCameraCapabilities();
                await track.applyConstraints({
                    advanced: [{ torch: state.torchOn }]
                });
                
                ui.btnTorch.classList.toggle('active', state.torchOn);
                ui.btnTorch.textContent = state.torchOn ? '🔆 ENCENDIDA' : '🔦 Linterna';
                
                // 📳 Vibración de feedback
                if (navigator.vibrate) navigator.vibrate(50);
                
                console.log(`🔦 Linterna: ${state.torchOn ? 'ON' : 'OFF'}`);
            } catch (error) {
                console.warn('⚠️ Error con linterna:', error);
            }
        }
        
        // Búsqueda manual MEJORADA con filtro por ARTISTA
        function performSearch(query) {
            const normalized = query.toLowerCase().trim();
            
            if (normalized.length < 1) {
                ui.searchResults.innerHTML = '<div class="no-results">Escribe al menos 1 carácter</div>';
                return;
            }

            let results = Array.from(state.tickets.values());
            
            if (state.searchMode === 'artist') {
                // 👤 MODO BÚSQUEDA POR ARTISTA
                results = results.filter(ticket => {
                    const artistMatch = ticket.artistName && ticket.artistName.toLowerCase().includes(normalized);
                    return artistMatch;
                });
            } else {
                // 🔍 MODO BÚSQUEDA GENERAL
                results = results.filter(ticket => {
                    const nameMatch = ticket.name.toLowerCase().includes(normalized);
                    const numberMatch = ticket.ticketNumber && ticket.ticketNumber.toString().includes(query.trim());
                    const formattedMatch = ticket.ticketNumberFormatted && ticket.ticketNumberFormatted.includes(query.trim());
                    const idMatch = ticket.id.toLowerCase().includes(normalized);
                    const artistMatch = ticket.artistName && ticket.artistName.toLowerCase().includes(normalized);
                    return nameMatch || numberMatch || formattedMatch || idMatch || artistMatch;
                });
            }

            if (results.length === 0) {
                ui.searchResults.innerHTML = '<div class="no-results">❌ No se encontraron resultados</div>';
                return;
            }

            // Agrupar por artista si está en modo artista
            let groupedResults = results;
            if (state.searchMode === 'artist') {
                const artistGroups = {};
                results.forEach(ticket => {
                    const artistName = ticket.artistName || 'Sin Artista';
                    if (!artistGroups[artistName]) {
                        artistGroups[artistName] = [];
                    }
                    artistGroups[artistName].push(ticket);
                });
                
                ui.searchResults.innerHTML = Object.entries(artistGroups).map(([artistName, tickets]) => `
                    <div class="mb-4">
                        <div class="bg-purple-900/50 border-l-4 border-purple-400 px-4 py-2 mb-2 rounded">
                            <div class="font-black text-lg text-purple-200">🎤 ${artistName}</div>
                            <div class="text-xs text-purple-300">${tickets.length} invitado(s) - ${tickets.filter(t => !t.used).length} disponible(s)</div>
                        </div>
                        ${tickets.map(ticket => `
                            <div class="search-result ${ticket.used ? 'used' : ''} ml-4" 
                                 onclick="window.selectTicket('${ticket.id}', ${ticket.used})">
                                <div class="result-name">
                                    ${ticket.ticketNumberFormatted ? `<span class="result-number">Nº ${ticket.ticketNumberFormatted}</span>` : ''}
                                    ${ticket.name}
                                </div>
                                ${ticket.used ? '<div class="text-red-400 font-bold mt-2">⚠️ YA INGRESÓ</div>' : '<div class="text-green-400 font-bold mt-2">✅ DISPONIBLE</div>'}
                            </div>
                        `).join('')}
                    </div>
                `).join('');
            } else {
                ui.searchResults.innerHTML = results.map(ticket => `
                    <div class="search-result ${ticket.used ? 'used' : ''}" 
                         onclick="window.selectTicket('${ticket.id}', ${ticket.used})">
                        <div class="result-name">
                            ${ticket.ticketNumberFormatted ? `<span class="result-number">Nº ${ticket.ticketNumberFormatted}</span>` : ''}
                            ${ticket.name}
                        </div>
                        ${ticket.artistName ? `<div class="text-xs text-purple-300 mt-1">🎤 ${ticket.artistName}</div>` : ''}
                        <div class="result-id">${ticket.id}</div>
                        ${ticket.used ? '<div class="text-red-400 font-bold mt-2">⚠️ YA INGRESÓ</div>' : ''}
                    </div>
                `).join('');
            }
        }

        // Seleccionar ticket de búsqueda
        window.selectTicket = async function(ticketId, isUsed) {
            if (isUsed) {
                showFeedback('warning', 'YA INGRESÓ', 'Esta persona ya entró');
                return;
            }

            ui.searchModal.classList.add('hidden');
            ui.searchInput.value = '';
            await processTicket(ticketId);
        };

        // 🔄 SINCRONIZACIÓN AUTOMÁTICA cuando vuelve internet
        async function syncOfflineData() {
            if (state.syncQueue.length === 0) return;
            
            console.log(`🔄 Sincronizando ${state.syncQueue.length} operaciones pendientes...`);
            
            const pendingOps = [...state.syncQueue];
            state.syncQueue = [];
            
            for (const op of pendingOps) {
                try {
                    if (op.action === 'markUsed') {
                        const ticketRef = doc(db, `events/${state.eventId}/tickets`, op.ticketId);
                        await updateDoc(ticketRef, op.data);
                        console.log(`✅ Sincronizado: ${op.ticketId}`);
                    }
                } catch (error) {
                    console.warn(`⚠️ Error sincronizando ${op.ticketId}, volviendo a la cola`, error);
                    state.syncQueue.push(op);
                }
            }
            
            // Actualizar localStorage con la cola restante
            localStorage.setItem(`syncQueue_${state.eventId}`, JSON.stringify(state.syncQueue));
            
            if (state.syncQueue.length === 0) {
                console.log('✅ Todas las operaciones offline sincronizadas');
            } else {
                console.log(`⚠️ ${state.syncQueue.length} operaciones aún pendientes`);
            }
        }

        // 📡 DETECTORES DE CONEXIÓN
        window.addEventListener('online', async () => {
            console.log('🟢 Conexión restaurada');
            state.isOnline = true;
            updateConnectionStatus();
            await syncOfflineData();
            updateConnectionStatus(); // Actualizar después de sincronizar
        });

        window.addEventListener('offline', () => {
            console.log('🔴 Sin conexión - Modo OFFLINE activado');
            state.isOnline = false;
            updateConnectionStatus();
        });

        // Cargar cola offline al iniciar
        function loadOfflineQueue() {
            const savedQueue = localStorage.getItem(`syncQueue_${state.eventId}`);
            if (savedQueue) {
                state.syncQueue = JSON.parse(savedQueue);
                console.log(`📴 ${state.syncQueue.length} operaciones offline pendientes cargadas`);
            }
        }

        // Event listeners
        ui.btnSearch.addEventListener('click', () => {
            ui.searchModal.classList.remove('hidden');
            ui.searchInput.focus();
        });

        ui.closeSearch.addEventListener('click', () => {
            ui.searchModal.classList.add('hidden');
            ui.searchInput.value = '';
        });

        ui.searchInput.addEventListener('input', (e) => {
            performSearch(e.target.value);
        });
        
        // Botones de filtro de búsqueda
        ui.filterAll = document.getElementById('filter-all');
        ui.filterArtist = document.getElementById('filter-artist');
        
        ui.filterAll.addEventListener('click', () => {
            state.searchMode = 'all';
            ui.filterAll.className = 'flex-1 px-4 py-2 rounded-lg bg-blue-600 text-white font-bold text-sm';
            ui.filterArtist.className = 'flex-1 px-4 py-2 rounded-lg bg-gray-700 text-gray-300 font-bold text-sm';
            ui.searchInput.placeholder = 'Ej: 1, 0045, María López, Artista...';
            performSearch(ui.searchInput.value);
        });
        
        ui.filterArtist.addEventListener('click', () => {
            state.searchMode = 'artist';
            ui.filterArtist.className = 'flex-1 px-4 py-2 rounded-lg bg-purple-600 text-white font-bold text-sm';
            ui.filterAll.className = 'flex-1 px-4 py-2 rounded-lg bg-gray-700 text-gray-300 font-bold text-sm';
            ui.searchInput.placeholder = '🎤 Escribí el nombre del artista...';
            ui.searchInput.value = '';
            ui.searchResults.innerHTML = '<div class="no-results">Escribí el nombre del artista para ver sus invitados</div>';
        });
        
        // Botón linterna
        ui.btnTorch = document.getElementById('btn-torch');
        ui.btnTorch.addEventListener('click', toggleTorch);

        ui.btnGenerate.addEventListener('click', () => {
            window.location.href = `generador_lote_puerta_express.html?eventId=${state.eventId}&eventName=${encodeURIComponent(state.eventName)}`;
        });

        ui.btnClose.addEventListener('click', async () => {
            if (confirm('¿Cerrar escáner?')) {
                if (state.scanner) {
                    await state.scanner.stop();
                }
                window.location.href = `panel_evento_SIMPLE.html?eventId=${state.eventId}&eventName=${encodeURIComponent(state.eventName)}`;
            }
        });

        // ESC para cerrar búsqueda
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !ui.searchModal.classList.contains('hidden')) {
                ui.searchModal.classList.add('hidden');
            }
        });

        // Inicializar con SOPORTE OFFLINE
        (async () => {
            console.log('🚀 Iniciando escáner con soporte OFFLINE + MULTI-ASISTENTE');
            
            // 1. Cargar cola de sincronización offline
            loadOfflineQueue();
            updateConnectionStatus();
            
            // 2. Cargar tickets (con tiempo real)
            await loadTickets();
            
            // 3. Si hay internet, sincronizar operaciones pendientes
            if (state.isOnline && state.syncQueue.length > 0) {
                await syncOfflineData();
                updateConnectionStatus();
            }
            
            // 4. Iniciar escáner
            await startScanner();
            
            console.log('✅ Escáner listo | Modo:', state.isOnline ? 'ONLINE 🟢' : 'OFFLINE 🔴');
            console.log(`📊 Total tickets: ${state.tickets.size} | Ya ingresaron: ${state.counter}`);
        })();
    </script>
</body>
</html>
