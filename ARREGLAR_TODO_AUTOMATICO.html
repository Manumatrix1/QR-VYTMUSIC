<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 ARREGLAR TODO - AUTOMÁTICO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, getDocs, doc, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        
        import { app, db, auth } from './firebase_config.js';
        
        window.db = db;
        window.auth = auth;
        window.firebaseModules = { signInWithEmailAndPassword, collection, getDocs, doc, deleteDoc, updateDoc };
    </script>

    <style>
        body { 
            background: linear-gradient(135deg, #0a0a0a 0%, #2d1b00 100%); 
        }
        .mega-glow {
            animation: megaGlow 1.5s ease-in-out infinite alternate;
        }
        @keyframes megaGlow {
            from { box-shadow: 0 0 30px #ff6600, 0 0 60px #ff6600; }
            to { box-shadow: 0 0 50px #ff9900, 0 0 100px #ff9900; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <div class="max-w-3xl w-full">
        
        <!-- Login Section -->
        <div id="loginSection" class="bg-gray-900 rounded-3xl p-10 border-4 border-orange-500 mega-glow">
            <div class="text-center mb-8">
                <h1 class="text-6xl font-black text-orange-500 mb-4">🔧 ARREGLAR TODO</h1>
                <p class="text-gray-300 text-2xl font-bold mb-2">SOLUCIÓN COMPLETA AUTOMÁTICA</p>
                <div class="bg-orange-900/30 border-2 border-orange-500 rounded-xl p-4 mt-6">
                    <p class="text-orange-300 text-lg font-semibold">✅ Elimina duplicados de tickets</p>
                    <p class="text-orange-300 text-lg font-semibold">✅ Arregla artistas sin grupo</p>
                    <p class="text-orange-300 text-lg font-semibold">✅ Todo en un solo click</p>
                </div>
            </div>

            <div class="space-y-4 mb-6">
                <input type="email" 
                       id="email" 
                       placeholder="Email de admin" 
                       class="w-full p-5 bg-gray-800 text-white rounded-xl border-2 border-gray-700 focus:border-orange-500 text-xl"
                       autocomplete="email">
                <input type="password" 
                       id="password" 
                       placeholder="Contraseña" 
                       class="w-full p-5 bg-gray-800 text-white rounded-xl border-2 border-gray-700 focus:border-orange-500 text-xl"
                       autocomplete="current-password">
            </div>

            <button onclick="arreglarTodo()" 
                    class="w-full bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-700 hover:to-red-700 text-white font-black text-3xl py-8 rounded-xl transition-all transform hover:scale-105 mega-glow">
                🔥 ARREGLAR TODO AHORA 🔥
            </button>

            <p id="loginError" class="mt-4 text-red-400 text-center font-semibold text-lg"></p>
        </div>

        <!-- Progress Section -->
        <div id="progressSection" class="hidden bg-gray-900 rounded-3xl p-10 border-4 border-blue-500 mt-6">
            <h2 class="text-4xl font-black text-blue-400 mb-6 text-center">⚡ TRABAJANDO...</h2>
            <div id="progressLog" class="space-y-1 max-h-96 overflow-y-auto bg-black rounded-xl p-6 font-mono text-sm">
                <!-- Log messages here -->
            </div>
        </div>

        <!-- Result Section -->
        <div id="resultSection" class="hidden bg-gray-900 rounded-3xl p-10 border-4 border-green-500 mt-6">
            <h2 class="text-5xl font-black text-green-400 mb-6 text-center">✅ ¡COMPLETADO!</h2>
            <div id="resultSummary" class="text-white text-2xl space-y-4">
                <!-- Summary here -->
            </div>
            <button onclick="location.reload()" 
                    class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold text-xl py-5 rounded-xl">
                🔄 Ejecutar de nuevo
            </button>
        </div>

    </div>

    <script type="module">
        const { signInWithEmailAndPassword, collection, getDocs, doc, deleteDoc, updateDoc } = window.firebaseModules;

        function log(message, type = 'info') {
            const logContainer = document.getElementById('progressLog');
            const colors = {
                info: 'text-blue-300',
                success: 'text-green-400',
                warning: 'text-yellow-300',
                error: 'text-red-400',
                highlight: 'text-orange-400'
            };
            
            const div = document.createElement('div');
            div.className = `${colors[type]}`;
            div.textContent = `${new Date().toLocaleTimeString()} | ${message}`;
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
            
            console.log(message);
        }

        window.arreglarTodo = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            if (!email || !password) {
                errorEl.textContent = '❌ Completa email y contraseña';
                return;
            }

            errorEl.textContent = '🔄 Autenticando...';

            try {
                // LOGIN
                await signInWithEmailAndPassword(window.auth, email, password);
                
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('progressSection').classList.remove('hidden');

                log('✅ Autenticación exitosa', 'success');
                log('═══════════════════════════════════════', 'highlight');
                log('🔧 INICIANDO REPARACIÓN AUTOMÁTICA', 'highlight');
                log('═══════════════════════════════════════', 'highlight');

                // ESTADÍSTICAS
                let stats = {
                    duplicadosEliminados: 0,
                    artistasArreglados: 0,
                    eventosAnalizados: 0,
                    errores: 0
                };

                // OBTENER EVENTOS
                const eventsSnap = await getDocs(collection(window.db, 'events'));
                log(`\n📊 Encontrados ${eventsSnap.size} eventos\n`, 'info');
                stats.eventosAnalizados = eventsSnap.size;

                // ═════════════════════════════════════════════════════════════
                // PARTE 1: ELIMINAR DUPLICADOS DE TICKETS
                // ═════════════════════════════════════════════════════════════
                log('═══════════════════════════════════════', 'highlight');
                log('PARTE 1/2: ELIMINANDO DUPLICADOS DE TICKETS', 'highlight');
                log('═══════════════════════════════════════\n', 'highlight');

                for (const eventDoc of eventsSnap.docs) {
                    const eventId = eventDoc.id;
                    const eventData = eventDoc.data();
                    const eventName = eventData.nombre_evento || eventData.nombre || eventId;

                    log(`📂 Evento: "${eventName}"`, 'info');

                    // Obtener tickets
                    const ticketsSnap = await getDocs(collection(window.db, `events/${eventId}/tickets`));
                    
                    if (ticketsSnap.empty) {
                        log(`   ℹ️ Sin tickets`, 'info');
                        continue;
                    }

                    // Buscar tickets de Nanci
                    const nanciTickets = [];
                    ticketsSnap.forEach(ticketDoc => {
                        const ticket = ticketDoc.data();
                        const artistName = (ticket.artistName || ticket.artist_name || ticket.prefix || '').toLowerCase();
                        const personName = (ticket.name || ticket.nombre || ticket.buyerName || '').toLowerCase();

                        if (artistName.includes('nanci') || artistName.includes('nancy') ||
                            personName.includes('nanci') || personName.includes('nancy')) {
                            nanciTickets.push({
                                id: ticketDoc.id,
                                timestamp: ticket.timestamp?.seconds || 0
                            });
                        }
                    });

                    if (nanciTickets.length === 0) {
                        log(`   ✅ No hay tickets de Nanci`, 'info');
                        continue;
                    }

                    log(`   🎯 ${nanciTickets.length} tickets de Nanci encontrados`, 'warning');

                    // Detectar duplicados por timestamp
                    nanciTickets.sort((a, b) => a.timestamp - b.timestamp);
                    
                    const groups = {};
                    nanciTickets.forEach(ticket => {
                        const timeKey = Math.floor(ticket.timestamp / 60);
                        if (!groups[timeKey]) groups[timeKey] = [];
                        groups[timeKey].push(ticket);
                    });

                    const duplicados = [];
                    for (const timeKey in groups) {
                        const group = groups[timeKey];
                        if (group.length > 1) {
                            for (let i = 1; i < group.length; i++) {
                                duplicados.push(group[i]);
                            }
                        }
                    }

                    if (duplicados.length === 0) {
                        log(`   ✅ No hay duplicados`, 'success');
                        continue;
                    }

                    log(`   🗑️ Eliminando ${duplicados.length} duplicados...`, 'warning');

                    for (const ticket of duplicados) {
                        try {
                            await deleteDoc(doc(window.db, `events/${eventId}/tickets`, ticket.id));
                            stats.duplicadosEliminados++;
                        } catch (error) {
                            stats.errores++;
                            log(`   ❌ Error: ${error.message}`, 'error');
                        }
                    }

                    log(`   ✅ ${duplicados.length} duplicados eliminados`, 'success');
                }

                // ═════════════════════════════════════════════════════════════
                // PARTE 2: ARREGLAR ARTISTAS SIN GRUPO
                // ═════════════════════════════════════════════════════════════
                log('\n═══════════════════════════════════════', 'highlight');
                log('PARTE 2/2: ARREGLANDO ARTISTAS SIN GRUPO', 'highlight');
                log('═══════════════════════════════════════\n', 'highlight');

                for (const eventDoc of eventsSnap.docs) {
                    const eventId = eventDoc.id;
                    const eventData = eventDoc.data();
                    const eventName = eventData.nombre_evento || eventData.nombre || eventId;

                    log(`📂 Evento: "${eventName}"`, 'info');

                    // Obtener artistas
                    const artistsSnap = await getDocs(collection(window.db, `events/${eventId}/artists`));
                    
                    if (artistsSnap.empty) {
                        log(`   ℹ️ Sin artistas`, 'info');
                        continue;
                    }

                    let sinGrupo = 0;
                    let arreglados = 0;

                    for (const artistDoc of artistsSnap.docs) {
                        const artist = artistDoc.data();
                        
                        // Si NO tiene campo "grupo", asignarlo automáticamente
                        if (!artist.grupo) {
                            sinGrupo++;
                            
                            try {
                                // Detectar grupo por el nombre del evento
                                let grupoAsignado = 'Generación 13'; // Default
                                
                                const eventNameLower = eventName.toLowerCase();
                                if (eventNameLower.includes('gala 1') || eventNameLower.includes('primera gala')) {
                                    grupoAsignado = 'Gala 1';
                                } else if (eventNameLower.includes('gala 2') || eventNameLower.includes('segunda gala')) {
                                    grupoAsignado = 'Gala 2';
                                } else if (eventNameLower.includes('gala 3') || eventNameLower.includes('tercera gala')) {
                                    grupoAsignado = 'Gala 3';
                                } else if (eventNameLower.includes('final')) {
                                    grupoAsignado = 'Final';
                                }
                                
                                await updateDoc(doc(window.db, `events/${eventId}/artists`, artistDoc.id), {
                                    grupo: grupoAsignado
                                });
                                
                                arreglados++;
                                stats.artistasArreglados++;
                                log(`   ✅ ${artist.nombre} → grupo: "${grupoAsignado}"`, 'success');
                                
                            } catch (error) {
                                stats.errores++;
                                log(`   ❌ Error arreglando ${artist.nombre}: ${error.message}`, 'error');
                            }
                        }
                    }

                    if (sinGrupo === 0) {
                        log(`   ✅ Todos los artistas tienen grupo`, 'success');
                    } else {
                        log(`   ✅ ${arreglados}/${sinGrupo} artistas arreglados`, 'success');
                    }
                }

                // ═════════════════════════════════════════════════════════════
                // RESUMEN FINAL
                // ═════════════════════════════════════════════════════════════
                log('\n═══════════════════════════════════════', 'highlight');
                log('✅ PROCESO COMPLETADO', 'success');
                log('═══════════════════════════════════════', 'highlight');
                log(`📊 Eventos analizados: ${stats.eventosAnalizados}`, 'info');
                log(`🗑️ Duplicados eliminados: ${stats.duplicadosEliminados}`, 'success');
                log(`🎨 Artistas arreglados: ${stats.artistasArreglados}`, 'success');
                log(`❌ Errores: ${stats.errores}`, stats.errores > 0 ? 'error' : 'info');
                log('═══════════════════════════════════════\n', 'highlight');

                // Mostrar resultado
                document.getElementById('resultSection').classList.remove('hidden');
                document.getElementById('resultSummary').innerHTML = `
                    <div class="text-center">
                        <p class="text-5xl mb-8">🎉</p>
                        <div class="bg-green-900/30 border-2 border-green-500 rounded-xl p-6 mb-4">
                            <p class="text-3xl font-bold mb-4">PROBLEMA RESUELTO</p>
                            <p class="text-xl">🗑️ Duplicados eliminados: <span class="text-green-400 font-black">${stats.duplicadosEliminados}</span></p>
                            <p class="text-xl">🎨 Artistas arreglados: <span class="text-green-400 font-black">${stats.artistasArreglados}</span></p>
                            <p class="text-xl">📊 Eventos procesados: <span class="text-green-400 font-black">${stats.eventosAnalizados}</span></p>
                        </div>
                        <p class="text-gray-400 text-lg mt-6">Ahora los reportes deberían funcionar correctamente</p>
                    </div>
                `;

            } catch (error) {
                console.error('Error:', error);
                
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    errorEl.textContent = '❌ Email o contraseña incorrectos';
                } else {
                    errorEl.textContent = `❌ Error: ${error.message}`;
                    log(`❌ ERROR FATAL: ${error.message}`, 'error');
                }
                
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('progressSection').classList.add('hidden');
            }
        };

        // Enter para ejecutar
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') arreglarTodo();
            });
        });
    </script>
</body>
</html>
