<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orden de Gala - VYT MUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, collection, doc, getDoc, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { app, db } from './firebase_config.js';
        window.db = db;
        window.fsModules = { collection, doc, getDoc, getDocs, query, orderBy };
    </script>

    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); min-height: 100vh; }
        .artist-row { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid #334155; transition: all 0.2s; }
        .artist-row:hover { border-color: #3b82f6; box-shadow: 0 4px 20px rgba(59,130,246,0.2); }
        .num-badge { background: linear-gradient(135deg, #1d4ed8, #7c3aed); min-width: 56px; }
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            .artist-row { border: 1px solid #ccc !important; background: white !important; page-break-inside: avoid; }
            .num-badge { background: #1d4ed8 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            #header { background: white !important; color: #1e3a8a !important; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div id="header" class="bg-gradient-to-r from-blue-700 via-purple-700 to-pink-700 py-6 shadow-lg no-print">
        <div class="max-w-3xl mx-auto px-4 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-white">🎵 Orden de Gala</h1>
                <p id="eventNameHeader" class="text-blue-200 text-sm mt-1"></p>
            </div>
            <button onclick="window.print()" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg font-semibold text-sm transition flex items-center gap-2">
                <i class="fas fa-print"></i> Imprimir / PDF
            </button>
        </div>
    </div>

    <!-- Print header (only visible when printing) -->
    <div class="hidden print:block text-center py-6 border-b-4 border-blue-600">
        <h1 style="font-size:28px;font-weight:bold;color:#1e3a8a;">🎵 Orden de Gala</h1>
        <p id="printSubtitle" style="color:#6b7280;font-size:14px;margin-top:4px;"></p>
    </div>

    <!-- Loading -->
    <div id="loading" class="flex items-center justify-center py-24">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-500 mx-auto mb-4"></div>
            <p class="text-gray-300">Cargando orden de gala...</p>
        </div>
    </div>

    <!-- Lista -->
    <div id="mainContent" class="hidden max-w-3xl mx-auto px-4 py-8">

        <!-- Info evento -->
        <div id="eventInfo" class="bg-blue-900/30 border border-blue-500/40 rounded-xl p-4 mb-6 text-center no-print">
            <p id="eventInfoText" class="text-blue-200 text-sm"></p>
        </div>

        <!-- Sin orden guardado -->
        <div id="noOrder" class="hidden bg-yellow-900/30 border border-yellow-500/40 rounded-xl p-6 text-center mb-6">
            <i class="fas fa-sort text-yellow-400 text-3xl mb-3"></i>
            <p class="text-yellow-300 font-semibold">El orden de la gala aún no fue configurado</p>
            <p class="text-gray-400 text-sm mt-1">El organizador debe usar el panel de Administración de Pistas para ordenar los artistas</p>
        </div>

        <!-- Artistas ordenados -->
        <div id="artistsList" class="space-y-3"></div>

        <!-- Footer -->
        <div id="listFooter" class="hidden mt-8 text-center">
            <p class="text-gray-500 text-sm">
                <i class="fas fa-clock"></i> Generado el <span id="generatedDate"></span>
            </p>
        </div>
    </div>

    <script type="module">
        const params = new URLSearchParams(window.location.search);
        const eventId = params.get('eventId');

        if (!eventId) {
            document.body.innerHTML = '<div class="flex items-center justify-center min-h-screen"><p class="text-red-400 text-xl">Falta el parámetro eventId en la URL</p></div>';
        }

        function formatTime(s) {
            if (!s && s !== 0) return '';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        async function load() {
            try {
                const { collection, doc, getDoc, getDocs } = window.fsModules;

                // Cargar evento
                const eventSnap = await getDoc(doc(window.db, 'events', eventId));
                const eventName = eventSnap.exists() ? (eventSnap.data().name || 'Evento') : 'Evento';
                document.getElementById('eventNameHeader').textContent = eventName;
                document.getElementById('eventInfoText').textContent = `${eventName} — Orden oficial de presentación`;
                document.getElementById('printSubtitle').textContent = `${eventName} — ${new Date().toLocaleDateString('es-ES', {day:'numeric',month:'long',year:'numeric'})}`;
                document.title = `Orden de Gala — ${eventName}`;

                // Cargar artistas
                let artistsRef = collection(window.db, `events/${eventId}/artists`);
                let snapshot = await getDocs(artistsRef);
                let usedCollection = `events/${eventId}/artists`;
                if (snapshot.empty) {
                    artistsRef = collection(window.db, `artistas_${eventId}`);
                    snapshot = await getDocs(artistsRef);
                    usedCollection = `artistas_${eventId}`;
                }

                let artists = [];
                snapshot.forEach(d => {
                    const data = d.data();
                    if (data.playOrder !== undefined) {
                        artists.push({
                            id: d.id,
                            nombre: data.name || data.nombre || 'Artista',
                            foto: data.photoURL || data.foto_url || '',
                            playOrder: data.playOrder
                        });
                    }
                });

                // Cargar pistas
                const tracksSnap = await getDocs(collection(window.db, `pistas_${eventId}`));
                const tracksMap = {};
                tracksSnap.forEach(d => { tracksMap[d.id] = d.data().pistas || []; });

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');

                if (artists.length === 0) {
                    document.getElementById('noOrder').classList.remove('hidden');
                    return;
                }

                // Ordenar por playOrder
                artists.sort((a, b) => a.playOrder - b.playOrder);

                const container = document.getElementById('artistsList');
                container.innerHTML = artists.map((artist, i) => {
                    const pistas = tracksMap[artist.id] || [];
                    const tracksHtml = pistas.length > 0
                        ? pistas.map(t => {
                            const icon = t.slot === 1 ? '★' : '♪';
                            const dur = t.trim_duration ? ` <span class="text-yellow-400 text-xs">✂️ ${formatTime(t.trim_duration)}</span>` : '';
                            return `<span class="inline-flex items-center gap-1 bg-gray-800 rounded px-2 py-0.5 text-xs text-gray-200 mr-1 mb-1">${icon} ${t.nombre_cancion} — <em class="text-gray-400">${t.estilo_cancion}</em>${dur}</span>`;
                        }).join('')
                        : '<span class="text-gray-500 text-xs italic">Sin pistas</span>';

                    const avatarUrl = artist.foto
                        ? artist.foto
                        : `https://ui-avatars.com/api/?name=${encodeURIComponent(artist.nombre)}&background=3b82f6&color=fff&size=64`;

                    return `
                        <div class="artist-row rounded-xl p-4 flex items-center gap-4">
                            <div class="num-badge rounded-xl h-14 w-14 flex items-center justify-center text-white font-extrabold text-2xl flex-shrink-0 shadow-lg">
                                ${i + 1}
                            </div>
                            <img src="${avatarUrl}" alt="${artist.nombre}"
                                class="w-14 h-14 rounded-full object-cover border-2 border-blue-500 flex-shrink-0"
                                onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(artist.nombre)}&background=3b82f6&color=fff&size=64'">
                            <div class="flex-1 min-w-0">
                                <p class="text-white font-bold text-lg leading-tight">${artist.nombre}</p>
                                <div class="mt-1 flex flex-wrap">${tracksHtml}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('generatedDate').textContent = new Date().toLocaleString('es-ES');
                document.getElementById('listFooter').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = `<p class="text-red-400 text-center py-12">Error al cargar: ${err.message}</p>`;
            }
        }

        // Esperar a que Firebase esté listo
        function waitAndLoad() {
            if (window.db && window.fsModules) {
                load();
            } else {
                setTimeout(waitAndLoad, 100);
            }
        }
        waitAndLoad();
    </script>
</body>
</html>
